        audio.setMusicMood("backyard");
        if (!this.checkedFirstVisit) {
          this.checkedFirstVisit = true;
          var entries = store.scrapbook.entries;
          var hasVisit = false;
          for (var i = 0; i < entries.length; i++) {
            if (entries[i].type === "milestone" && entries[i].text === "Explored the backyard for the first time!") { hasVisit = true; break; }
          }
          if (!hasVisit) {
            addScrapbookEntry("milestone", "Explored the backyard for the first time!", "heart");
          }
        }
        /* scrapbook goal */
        if (store.scrapbookGoals.completed.indexOf("backyardVisit") < 0) {
          store.scrapbookGoals.completed.push("backyardVisit");
          saveJSON("scrapbookGoals", store.scrapbookGoals);
          var bvGoal = SCRAPBOOK_GOALS.find(function(g) { return g.key === "backyardVisit"; });
          if (bvGoal) { addCoins(bvGoal.reward); addScrapbookEntry("goal", "Goal: Outdoor Explorer complete!", "bone"); }
        }
      }
      addFloatingText(text, x, y, color) {
        this.floatingTexts.push({ text: text, x: x, y: y, color: color || COLORS.gold, life: 1.5 });
      }
      earnCoins(amount) {
        addCoins(amount);
        this.coinPopup = { amount: amount, timer: 1.5 };
      }
      capturePhoto() {
        if (!spriteArt.ready) {
          this.statusText = "Please wait for images to load...";
          this.statusPulse = 1;
          return;
        }
        var captureCanvas = makeBufferCanvas(W, H);
        var cc = captureCanvas.getContext("2d");
        var tod = (store.decor.timeOfDay == null ? 1 : store.decor.timeOfDay);
        this.drawBackground(cc, tod);
        this.drawInteractiveObjects(cc);
        var obiSt = { pose: this.obi.pose, expression: "happy", tail: Math.sin(game.time * 7), bounce: this.obi.bounce, facing: this.obi.facing };
        drawObi(cc, this.obi.x, this.obi.y, 1.0, obiSt);
        drawAccessoryOverlay(cc, "obi", this.obi.x, this.obi.y, 1.0, obiSt.pose, obiSt.facing);
        var lunaSt = { pose: this.luna.pose, tail: Math.sin(game.time * 2), facing: this.luna.facing, wiggle: this.luna.wiggle, earTwitch: this.luna.earTwitch };
        drawLuna(cc, this.luna.x, this.luna.y, 0.95, lunaSt);
        drawAccessoryOverlay(cc, "luna", this.luna.x, this.luna.y, 0.95, lunaSt.pose, lunaSt.facing);
        cc.fillStyle = "rgba(122,78,54,0.3)";
        cc.font = '12px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        cc.textAlign = "right";
        cc.fillText("Annie's Cozy Day", W - 12, H - 8);
        var dataURL;
        try { dataURL = captureCanvas.toDataURL("image/png"); }
        catch(e) { this.statusText = "Couldn't capture photo."; this.statusPulse = 1; return; }
        if (isMobile) { window.open(dataURL, "_blank"); }
        else {
          var link = document.createElement("a");
          link.download = "cozy-moment-" + Date.now() + ".png";
          link.href = dataURL;
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
        }
        this.cameraFlash = 0.4;
        audio.tinyChime();
        this.statusText = "Photo saved!";
        this.statusPulse = 1;
        var thumbCanvas = makeBufferCanvas(160, 120);
        thumbCanvas.getContext("2d").drawImage(captureCanvas, 0, 0, 160, 120);
        var thumbData;
        try { thumbData = thumbCanvas.toDataURL("image/jpeg", 0.6); } catch(e) { return; }
        var photos = loadJSON("photos", []);
        photos.push({ data: thumbData, date: new Date().toDateString(), room: this.name });
        if (photos.length > 20) photos.shift();
        saveJSON("photos", photos);
        store.stats.totalPhotos++;
        saveStats();
        if (store.stats.totalPhotos === 1) {
          addScrapbookEntry("milestone", "Took the first photo!", "star");
        }
      }
      saveJoy() {
        store.pet_obi_joy = this.obi.joy;
        store.pet_luna_joy = this.luna.joy;
        saveNumber("pet_obi_joy", this.obi.joy);
        saveNumber("pet_luna_joy", this.luna.joy);
      }
      update(dt) {
        super.update(dt);
        this.statusPulse = Math.max(0, this.statusPulse - dt * 2.6);
        if (this.coinPopup) {
          this.coinPopup.timer -= dt;
          if (this.coinPopup.timer <= 0) this.coinPopup = null;
        }
        if (this.cameraFlash > 0) this.cameraFlash = Math.max(0, this.cameraFlash - dt * 2.5);
        if (this.byDecorOpen) this.byDecorFade = clamp(this.byDecorFade + dt * 5, 0, 1);
        else this.byDecorFade = clamp(this.byDecorFade - dt * 5, 0, 1);
        /* seasonal particles */
        var season = getCurrentSeason();
        if (season === "spring" && Math.random() < 0.03) {
          spawnParticleBurst(rand(100, 700), rand(-10, 20), ["#FFB7C5", "#FFDAE0", "#FFE4E9"], 1, ["heart"]);
        }
        if (season === "autumn" && Math.random() < 0.025) {
          spawnParticleBurst(rand(100, 700), rand(-10, 20), ["#D4763B", "#C5441B", "#E8A82E"], 1, ["star"]);
        }
        if (season === "summer" && ((store.decor.timeOfDay == null ? 1 : store.decor.timeOfDay)) === 3 && Math.random() < 0.04) {
          spawnParticleBurst(rand(150, 650), rand(200, 450), ["#FFFF66", "#AAFFAA"], 1, ["star"]);
        }
        /* floating texts */
        for (var fi = this.floatingTexts.length - 1; fi >= 0; fi--) {
          this.floatingTexts[fi].life -= dt;
          this.floatingTexts[fi].y -= dt * 30;
          if (this.floatingTexts[fi].life <= 0) this.floatingTexts.splice(fi, 1);
        }
        /* joy save */
        this.joySaveTimer += dt;
        if (this.joySaveTimer > 5) {
          this.joySaveTimer = 0;
          this.saveJoy();
        }
        /* update obi */
        this.updateObiBackyard(dt);
        /* update luna */
        this.updateLunaBackyard(dt);
        /* bird feeder */
        this.updateFeeder(dt);
        /* fishing micro-activity */
        if (this.fishingState) {
          this.fishingState.timer -= dt;
          if (this.fishingState.phase === "waiting") {
            this.fishingState.fishX = this.pool.x + Math.sin(game.time * 1.5) * 30;
            this.fishingState.fishY = this.pool.y - 8 + Math.cos(game.time * 2) * 6;
            if (this.fishingState.timer <= 0) {
              this.fishingState.phase = "strike";
              this.fishingState.timer = 1.2;
              this.statusText = "Now! Click the fish!";
              this.statusPulse = 1;
            }
          } else if (this.fishingState.phase === "strike") {
            if (this.fishingState.timer <= 0) {
              this.fishingState = null;
              this.statusText = "The fish got away!";
              audio.miss();
            }
          } else if (this.fishingState.phase === "caught") {
            if (this.fishingState.timer <= 0) this.fishingState = null;
          }
        }
        /* butterfly catching */
        if (store.backyardDecor.butterflyGarden && store.backyardFlowers > 0) {
          this.byButterflyTimer -= dt;
          if (this.byButterflyTimer <= 0 && this.byButterflies.length < 3) {
            this.byButterflies.push({ x: this.garden.x + rand(-40, 40), y: this.garden.y - rand(20, 50), timer: rand(8, 12), phase: rand(0, 6.28), color: ["#FF69B4", "#87CEEB", "#FFD700"][Math.floor(Math.random() * 3)] });
            this.byButterflyTimer = rand(20, 40);
          }
          for (var bi = this.byButterflies.length - 1; bi >= 0; bi--) {
            var bf = this.byButterflies[bi];
            bf.x += Math.sin(game.time * 2 + bf.phase) * 18 * dt;
            bf.y += Math.cos(game.time * 1.5 + bf.phase) * 10 * dt;
            bf.timer -= dt;
            if (bf.timer <= 0) this.byButterflies.splice(bi, 1);
          }
        }
        /* fetch with Obi */
        if (this.fetchState) {
          this.fetchState.timer -= dt;
          if (this.fetchState.phase === "thrown") {
            this.fetchState.ballX += this.fetchState.ballVX * dt;
            this.fetchState.ballY += this.fetchState.ballVY * dt;
            this.fetchState.ballVY += 400 * dt;
            if (this.fetchState.ballY > 470) {
              this.fetchState.phase = "landed";
              this.fetchState.ballY = 470;
              this.obi.targetX = this.fetchState.ballX;
            }
          } else if (this.fetchState.phase === "landed") {
            if (Math.abs(this.obi.x - this.fetchState.ballX) < 25) {
              this.fetchState.phase = "returning";
              this.fetchState.timer = 6;
              this.obi.targetX = this.obi.homeX;
              this.obi.joy = clamp(this.obi.joy + 4, 0, 100);
              var fetchCoins = Math.random() < 0.3 ? 2 : 1;
              addCoins(fetchCoins);
              this.addFloatingText("+" + fetchCoins + " coins! Good boy!", this.obi.x, this.obi.y - 50, COLORS.gold);
              this.statusText = "Obi brought the ball back!";
              this.statusPulse = 1;
              audio.tinyChime();
              spawnParticleBurst(this.obi.x, this.obi.y - 20, [COLORS.gold, COLORS.softPink], 6, ["star", "heart"]);
            }
          } else if (this.fetchState.phase === "returning") {
            if (Math.abs(this.obi.x - this.obi.homeX) < 30 || this.fetchState.timer <= 0) {
              this.fetchState = null;
              this.fetchCooldown = 3;
              this.obi.targetX = this.obi.homeX;
            }
          }
        }
        if (this.fetchCooldown > 0) this.fetchCooldown -= dt;
        /* sprinkler */
        if (this.sprinklerOn) {
          this.sprinklerTimer -= dt;
          if (this.sprinklerTimer <= 0) {
            this.sprinklerOn = false;
            this.statusText = "Sprinkler turned off.";
          }
          /* Obi runs through sprinkler — joy boost */
          if (Math.abs(this.obi.x - 350) < 60 && !this.obi.splashing) {
            if (Math.random() < dt * 0.5) {
              this.obi.joy = clamp(this.obi.joy + 1, 0, 100);
              spawnParticleBurst(this.obi.x, this.obi.y - 20, ["#87CEEB", "#B3D9FF"], 2, ["star"]);
            }
          }
          /* Luna avoids sprinkler */
          if (Math.abs(this.luna.x - 350) < 80 && !this.luna.inTree) {
            this.luna.targetX = this.luna.x < 350 ? 200 : 550;
          }
        }
        /* bug spawning and movement */
        this.bugSpawnTimer -= dt;
        if (this.bugSpawnTimer <= 0 && this.bugs.length < 4) {
          this.bugs.push({ x: rand(140, 600), y: rand(400, 470), vx: rand(-20, 20), vy: rand(-10, 10), timer: rand(5, 10), type: ["ladybug", "beetle", "ant"][Math.floor(Math.random() * 3)] });
          this.bugSpawnTimer = rand(6, 12);
        }
        for (var bugi = this.bugs.length - 1; bugi >= 0; bugi--) {
          var bug = this.bugs[bugi];
          bug.x += bug.vx * dt;
          bug.y += bug.vy * dt;
          bug.x = clamp(bug.x, 80, 720);
          bug.y = clamp(bug.y, 380, 490);
          if (Math.random() < dt * 0.5) { bug.vx = rand(-25, 25); bug.vy = rand(-12, 12); }
          bug.timer -= dt;
          if (bug.timer <= 0) this.bugs.splice(bugi, 1);
          /* Luna pounces at nearby bugs */
          if (!this.luna.inTree && !this.luna.stalking && Math.abs(this.luna.x - bug.x) < 40 && Math.abs(this.luna.y - bug.y) < 30 && Math.random() < dt * 0.3) {
            this.luna.stalking = true;
            this.luna.targetX = bug.x;
            this.luna.actionTimer = 1.5;
          }
        }
        /* ambient status messages */
        if (!this._ambientMsgTimer) this._ambientMsgTimer = rand(8, 14);
        this._ambientMsgTimer -= dt;
        if (this._ambientMsgTimer <= 0 && this.statusPulse < 0.1) {
          var ambientMsgs = ["The breeze rustles through the garden.", "A bird chirps in the tree.", "Obi sniffs the afternoon air.", "Luna watches a cloud drift by.", "The yard smells like fresh grass.", "Sunshine warms the patio."];
          this.statusText = ambientMsgs[Math.floor(Math.random() * ambientMsgs.length)];
          this._ambientMsgTimer = rand(8, 14);
        }
        /* harvest cooldown */
        if (this.harvestCooldown > 0) this.harvestCooldown -= dt;
        /* picnic cooldown */
        if (this.picnicCooldown > 0) this.picnicCooldown -= dt;
        if (this.picnicState) {
          this.picnicState.timer -= dt;
          if (this.picnicState.timer <= 0) {
            this.picnicState = null;
            this.obi.targetX = this.obi.homeX;
            this.luna.targetX = this.luna.homeX;
          }
        }
      }
      updateObiBackyard(dt) {
        var o = this.obi;
        o.bounce = Math.max(0, o.bounce - dt * 3);
        o.happyTimer = Math.max(0, o.happyTimer - dt);
        o.actionTimer -= dt;
        /* move toward target */
        if (Math.abs(o.x - o.targetX) > 4) {
          o.facing = o.targetX > o.x ? 1 : -1;
          o.x = clamp(o.x + Math.sign(o.targetX - o.x) * 60 * dt, 80, 720);
          o.pose = "run";
        } else if (o.digging) {
          o.pose = "dig";
        } else if (o.splashing) {
          o.pose = "splash";
          o.happyTimer = 0.5;
        } else {
          o.pose = "sit";
        }
        if (o.actionTimer <= 0 && !o.splashing && !o.digging) {
          o.actionTimer = rand(5, 10);
          var choice = Math.random();
          if (choice < 0.3) {
            /* wander */
            o.targetX = clamp(rand(120, 600), 120, 600);
          } else if (choice < 0.5 && store.backyardFlowers > 0) {
            /* dig up a flower */
            o.targetX = this.garden.x;
            o.digging = true;
            o.actionTimer = 3;
          } else {
            /* sniff around */
            o.targetX = clamp(rand(120, 600), 120, 600);
          }
        }
        /* finish digging */
        if (o.digging && o.actionTimer <= 0) {
          o.digging = false;
          if (store.backyardFlowers > 0) {
            o.joy = clamp(o.joy + 4, 0, 100);
            store.backyardFlowers = Math.max(0, store.backyardFlowers - 1);
            saveNumber("backyardFlowers", store.backyardFlowers);
            this.addFloatingText("Obi dug up a flower!", o.x, o.y - 60, "#8B6914");
            this.statusText = "Obi dug up a tulip! Bad boy!";
            this.statusPulse = 1;
            spawnParticleBurst(o.x, o.y - 30, ["#8B6914", "#5C7A3A"], 6, ["star"]);
            var lastSE = store.scrapbook.entries[store.scrapbook.entries.length - 1];
            if (!lastSE || lastSE.text !== "Obi dug up a flower in the garden!") addScrapbookEntry("event", "Obi dug up a flower in the garden!", "bone");
          }
        }
        /* finish splashing */
        if (o.splashing && o.actionTimer <= 0) {
          o.splashing = false;
        }
      }
      updateLunaBackyard(dt) {
        var l = this.luna;
        l.wiggle = Math.sin(game.time * 2) * 0.02;
        l.earTwitch = earSignal(game.time);
        l.actionTimer -= dt;
        if (l.inTree) {
          l.pose = "treeSit";
          l.x = this.tree.x - 30;
          l.y = this.tree.y + 40;
        } else if (l.stalking) {
          l.pose = "stalk";
        } else if (Math.abs(l.x - l.targetX) > 4) {
          l.facing = l.targetX > l.x ? 1 : -1;
          l.x = clamp(l.x + Math.sign(l.targetX - l.x) * 40 * dt, 80, 720);
          l.pose = "lounge";
        } else {
          l.pose = "sit";
        }
        if (l.actionTimer <= 0 && !l.inTree && !l.stalking) {
          l.actionTimer = rand(6, 12);
          var choice = Math.random();
          if (choice < 0.35) {
            /* climb tree */
            l.inTree = true;
            l.actionTimer = rand(8, 15);
          } else if (choice < 0.55) {
            /* stalk bugs */
            l.stalking = true;
            l.targetX = rand(200, 500);
            l.actionTimer = rand(3, 5);
          } else {
            /* wander */
            l.targetX = clamp(rand(150, 650), 150, 650);
          }
        }
        /* finish tree */
        if (l.inTree && l.actionTimer <= 0) {
          l.inTree = false;
          l.y = 480;
          l.targetY = 480;
          l.targetX = rand(200, 500);
        }
        /* finish stalking */
        if (l.stalking && l.actionTimer <= 0) {
          l.stalking = false;
          l.joy = clamp(l.joy + 2, 0, 100);
          spawnParticleBurst(l.x, l.y - 30, ["#5C7A3A"], 3, ["star"]);
        }
      }
      updateFeeder(dt) {
        if (this.feeder.filled) {
          this.feeder.birdTimer -= dt;
          if (this.feeder.birdTimer <= 0 && this.feeder.birds.length === 0) {
            /* birds arrive */
            var count = Math.floor(rand(2, 4));
            for (var i = 0; i < count; i++) {
              this.feeder.birds.push({ x: this.feeder.x + rand(-20, 20), y: this.feeder.y - 10 + rand(-10, 10), phase: rand(0, 6) });
            }
            this.luna.joy = clamp(this.luna.joy + 2, 0, 100);
            this.addFloatingText("+2 Luna joy", this.luna.x, this.luna.y - 50, "#9B7D3C");
            this.feeder.birdTimer = 0;
          } else if (this.feeder.birds.length > 0 && this.feeder.birdTimer < -8) {
            this.feeder.birds = [];
            this.feeder.filled = false;
          }
        }
      }
      getByDecorPageItems() { return BACKYARD_DECOR_ITEMS.slice(this.byDecorPage * 4, this.byDecorPage * 4 + 4); }
      byDecorPageCount() { return Math.ceil(BACKYARD_DECOR_ITEMS.length / 4); }
      getByDecorItemRect(i) { return { x: 130, y: 150 + i * 88, w: 540, h: 78 }; }
      onClick(x, y) {
        /* backyard decor panel */
        if (this.byDecorOpen) {
          if (pointInRect(x, y, panelClose("decor"))) { audio.menu(); this.byDecorOpen = false; return; }
          if (pointInRect(x, y, { x: 300, y: 530, w: 40, h: 30 }) && this.byDecorPage > 0) { this.byDecorPage--; audio.menu(); return; }
          if (pointInRect(x, y, { x: 460, y: 530, w: 40, h: 30 }) && this.byDecorPage < this.byDecorPageCount() - 1) { this.byDecorPage++; audio.menu(); return; }
          var pageItems = this.getByDecorPageItems();
          for (var i = 0; i < pageItems.length; i++) {
            if (pointInRect(x, y, this.getByDecorItemRect(i))) {
              var item = pageItems[i];
              if (!canUnlockDecorItem(item)) {
                audio.miss();
                if (item.tier && !canAccessTier(item.tier)) this.statusText = "Tier " + item.tier + " locked!";
                else if (item.achievementUnlock) this.statusText = "Unlock " + item.achievementUnlock + " first!";
                this.statusPulse = 1; return;
              }
              if (item.price && store.decorPurchased.indexOf(item.key) < 0) {
                if (store.coins < item.price) { audio.miss(); this.statusText = "Need " + item.price + " coins!"; this.statusPulse = 1; return; }
                addCoins(-item.price);
                store.decorPurchased.push(item.key);
                saveJSON("decorPurchased", store.decorPurchased);
                audio.combo();
                this.statusText = "Bought " + item.name + "!";
                this.statusPulse = 1;
              }
              store.backyardDecor[item.key] = !store.backyardDecor[item.key];
              saveBackyardDecor();
              audio.tinyChime();
              return;
            }
          }
          audio.menu(); this.byDecorOpen = false; return;
        }
        /* decor button */
        if (pointInRect(x, y, this.byDecorButton)) {
          audio.menu(); this.byDecorOpen = true; this.byDecorFade = 0; return;
        }
        /* camera */
        if (pointInRect(x, y, this.cameraButton)) {
          this.capturePhoto();
          return;
        }
        /* go inside */
        if (pointInRect(x, y, this.goInsideButton)) {
          audio.menu();
          this.saveJoy();
          transitionTo(SceneRegistry.create("hangout"));
          return;
        }
        /* bird feeder */
        if (Math.abs(x - this.feeder.x) < 40 && Math.abs(y - this.feeder.y) < 40) {
          if (!this.feeder.filled) {
            this.feeder.filled = true;
            this.feeder.birdTimer = rand(8, 15);
            this.feeder.birds = [];
            audio.tinyChime();
            this.statusText = "Feeder filled! Birds will come soon.";
            this.statusPulse = 1;
          }
          return;
        }
        /* garden — plant a flower */
        if (Math.abs(x - this.garden.x) < 50 && Math.abs(y - this.garden.y) < 40) {
          if (store.backyardFlowers < 6) {
            if (store.coins >= 3) {
              addCoins(-3);
              store.backyardFlowers++;
              saveNumber("backyardFlowers", store.backyardFlowers);
              store.stats.totalFlowersPlanted++;
              saveStats();
              if (store.stats.totalFlowersPlanted >= 20 && !store.achievements.greenThumb) {
                store.achievements.greenThumb = true; saveAchievements();
                var gtInfo = ACHIEVEMENTS.find(function(a) { return a.key === "greenThumb"; });
                if (gtInfo && gtInfo.coinBonus) addCoins(gtInfo.coinBonus);
                addScrapbookEntry("achievement", "Green Thumb unlocked!", "star");
                this.addFloatingText("Achievement!", this.garden.x, this.garden.y - 50, COLORS.gold);
              }
              this.trackWeeklyChallenge && this.trackWeeklyChallenge("flowersPlanted", 1);
              audio.tinyChime();
              this.addFloatingText("Planted!", this.garden.x, this.garden.y - 30, "#5C7A3A");
              this.statusText = "Planted a flower! (" + store.backyardFlowers + "/6)";
              this.statusPulse = 1;
            } else {
              audio.miss();
              this.statusText = "Need 3 coins to plant a flower!";
              this.statusPulse = 1;
            }
          } else {
            /* harvest full garden (with cooldown) */
            if (this.harvestCooldown && this.harvestCooldown > 0) {
              this.statusText = "Garden needs time to regrow! (" + Math.ceil(this.harvestCooldown) + "s)";
              this.statusPulse = 0.5;
            } else {
              addCoins(5);
              store.backyardFlowers = 0;
              saveNumber("backyardFlowers", 0);
              this.harvestCooldown = 30;
              this.statusText = "Harvested flowers! +5 coins";
              this.statusPulse = 1;
              this.addFloatingText("+5 coins", this.garden.x, this.garden.y - 30, COLORS.gold);
              if (audio.combo) audio.combo();
            }
          }
          return;
        }
        /* kiddie pool — fishing or splash */
        if (Math.abs(x - this.pool.x) < 50 && Math.abs(y - this.pool.y) < 40) {
          /* fishing: click during strike phase to catch */
          if (this.fishingState && this.fishingState.phase === "strike") {
            if (dist(x, y, this.fishingState.fishX, this.fishingState.fishY) < 35) {
              var fishCoins = rand(3, 6) | 0;
              addCoins(fishCoins);
              this.fishingState = { phase: "caught", timer: 1.5 };
              this.statusText = "Caught a fish! +" + fishCoins + " coins!";
              this.statusPulse = 1;
              this.addFloatingText("+" + fishCoins + " coins!", this.pool.x, this.pool.y - 30, COLORS.gold);
              audio.combo();
              spawnParticleBurst(this.pool.x, this.pool.y - 20, ["#87CEEB", COLORS.gold], 8, ["star"]);
            }
            return;
          }
          /* start fishing if not already active */
          if (!this.fishingState && !this.obi.splashing && !this.obi.digging) {
            if (Math.random() < 0.4) {
              /* fishing mini-activity */
              this.fishingState = { phase: "waiting", timer: rand(1.5, 3.5), fishX: this.pool.x, fishY: this.pool.y - 5 };
              this.statusText = "Something's moving in the pool... wait for it!";
              this.statusPulse = 0.5;
              audio.tinyChime();
            } else {
              /* splash */
              this.obi.targetX = this.pool.x;
              this.obi.splashing = true;
              this.obi.actionTimer = rand(3, 5);
              this.obi.joy = clamp(this.obi.joy + 6, 0, 100);
              this.addFloatingText("+6 Obi joy", this.obi.x, this.obi.y - 50, "#4A90D9");
              this.statusText = "Obi loves the pool!";
              this.statusPulse = 1;
              audio.combo();
              spawnParticleBurst(this.pool.x, this.pool.y - 20, ["#87CEEB", "#B3D9FF"], 8, ["star"]);
            }
          }
          return;
        }
        /* tree click — Luna climbs or comes down */
        if (Math.abs(x - this.tree.x) < 40 && y < 350 && y > 100) {
          if (this.luna.inTree) {
            this.luna.inTree = false;
            this.luna.y = 480;
            this.luna.targetY = 480;
            this.luna.targetX = rand(200, 500);
            this.luna.actionTimer = rand(5, 10);
            this.statusText = "Luna hops down from the tree.";
            this.statusPulse = 0.5;
          } else if (!this.luna.stalking) {
            this.luna.inTree = true;
            this.luna.actionTimer = rand(10, 20);
            this.luna.joy = clamp(this.luna.joy + 3, 0, 100);
            this.statusText = "Luna claims the high ground!";
            this.statusPulse = 0.5;
            this.addFloatingText("+3 joy", this.tree.x - 30, this.tree.y + 30, COLORS.softPink);
            spawnParticleBurst(this.tree.x - 30, this.tree.y + 40, [COLORS.softPink], 3, ["heart"]);
          }
          return;
        }
        /* fetch with Obi — click open ground to throw ball (avoid other interactive zones) */
        if (!this.fetchState && this.fetchCooldown <= 0 && y > 380 && y < 490 && x > 150 && x < 600
            && Math.abs(x - this.pool.x) > 60 && Math.abs(x - this.garden.x) > 60
            && Math.abs(x - this.feeder.x) > 50 && Math.abs(x - 350) > 35
            && !this.obi.splashing && !this.obi.digging) {
          this.fetchState = { phase: "thrown", timer: 8, ballX: 150, ballY: 380, ballVX: (x - 150) * 1.5, ballVY: -200 };
          this.obi.facing = x > this.obi.x ? 1 : -1;
          this.statusText = "Fetch, Obi!";
          this.statusPulse = 0.5;
          audio.tinyChime();
          return;
        }
        /* sprinkler toggle — click near center grass */
        if (Math.abs(x - 350) < 30 && Math.abs(y - 440) < 25 && !this.sprinklerOn) {
          this.sprinklerOn = true;
          this.sprinklerTimer = 15;
          this.statusText = "Sprinkler on! Obi loves it!";
          this.statusPulse = 1;
          audio.combo();
          spawnParticleBurst(350, 430, ["#87CEEB", "#B3D9FF", "#FFFFFF"], 10, ["star"]);
        }
        /* bug catching — click near bugs */
        for (var bugi = this.bugs.length - 1; bugi >= 0; bugi--) {
          var bug = this.bugs[bugi];
          if (dist(x, y, bug.x, bug.y) < 25) {
            this.bugs.splice(bugi, 1);
            var bugCoins = bug.type === "ladybug" ? 3 : bug.type === "beetle" ? 2 : 1;
            addCoins(bugCoins);
            this.addFloatingText("+" + bugCoins + " coins!", bug.x, bug.y - 20, COLORS.gold);
            this.statusText = "Caught a " + bug.type + "!";
            this.statusPulse = 0.5;
            audio.tinyChime();
            spawnParticleBurst(bug.x, bug.y, ["#5C7A3A", "#8B6914"], 4, ["star"]);
            break;
          }
        }
        /* butterfly catching */
        for (var bi = this.byButterflies.length - 1; bi >= 0; bi--) {
          var bf = this.byButterflies[bi];
          if (dist(x, y, bf.x, bf.y) < 28) {
            this.byButterflies.splice(bi, 1);
            var bfCoins = Math.random() < 0.3 ? 2 : 1;
            addCoins(bfCoins);
            this.addFloatingText("+" + bfCoins + " coins!", bf.x, bf.y - 20, COLORS.gold);
            this.statusText = "Caught a butterfly!";
            this.statusPulse = 0.5;
            audio.tinyChime();
            spawnParticleBurst(bf.x, bf.y, [bf.color, "#FFF4C0"], 6, ["star"]);
            break;
          }
        }
        /* picnic time (if picnicBlanket active) */
        if (store.backyardDecor.picnicBlanket && this.picnicCooldown <= 0 && !this.picnicState) {
          if (Math.abs(x - 350) < 50 && Math.abs(y - 430) < 30) {
            this.picnicState = { timer: 10 };
            this.picnicCooldown = 60;
            this.obi.targetX = 330;
            this.obi.targetY = 430;
            this.luna.targetX = 370;
            this.luna.targetY = 430;
            this.obi.joy = clamp(this.obi.joy + 5, 0, 100);
            this.luna.joy = clamp(this.luna.joy + 5, 0, 100);
            addCoins(2);
            this.addFloatingText("Picnic! +5 joy, +2 coins", 350, 410, COLORS.gold);
            this.statusText = "Everyone's enjoying a cozy picnic!";
            this.statusPulse = 1;
            audio.combo();
            spawnParticleBurst(350, 420, [COLORS.softPink, COLORS.gold, "#FFF4C0"], 10, ["heart", "star"]);
          }
        }
      }
      onMouseMove(x, y) {
        this.hoverKey = null;
        this.tooltip = null;
        if (this.byDecorOpen) {
          this.byDecorHover = null;
          if (pointInRect(x, y, panelClose("decor"))) this.byDecorHover = "close";
          var bPageItems = this.getByDecorPageItems();
          for (var bi = 0; bi < bPageItems.length; bi++) {
            if (pointInRect(x, y, this.getByDecorItemRect(bi))) { this.byDecorHover = bi; break; }
          }
          return;
        }
        if (pointInRect(x, y, this.byDecorButton)) this.hoverKey = "byDecor";
        else if (pointInRect(x, y, this.cameraButton)) this.hoverKey = "camera";
        else if (pointInRect(x, y, this.goInsideButton)) this.hoverKey = "inside";
        else if (Math.abs(x - this.feeder.x) < 40 && Math.abs(y - this.feeder.y) < 40) {
          this.hoverKey = "feeder";
          this.tooltip = { x: this.feeder.x, y: this.feeder.y - 40, title: "Bird Feeder", body: this.feeder.filled ? "Birds are coming..." : "Click to fill!" };
        } else if (Math.abs(x - this.garden.x) < 50 && Math.abs(y - this.garden.y) < 40) {
          this.hoverKey = "garden";
          this.tooltip = { x: this.garden.x, y: this.garden.y - 40, title: "Garden", body: store.backyardFlowers + "/6 flowers." + (store.backyardFlowers >= 6 ? " Click to harvest! +5 coins" : " 3 coins to plant.") };
        } else if (Math.abs(x - this.pool.x) < 50 && Math.abs(y - this.pool.y) < 40) {
          this.hoverKey = "pool";
          this.tooltip = { x: this.pool.x, y: this.pool.y - 40, title: "Kiddie Pool", body: this.fishingState ? "Something's in the water!" : "Click for a splash or fishing!" };
        } else if (Math.abs(x - 350) < 20 && Math.abs(y - 440) < 20) {
          this.hoverKey = "sprinkler";
          this.tooltip = { x: 350, y: 420, title: "Sprinkler", body: this.sprinklerOn ? "Sprinkler is running! (" + Math.ceil(this.sprinklerTimer) + "s)" : "Click to turn on!" };
        } else if (Math.abs(x - this.tree.x) < 50 && y > this.tree.y - 60 && y < this.tree.y + 100) {
          this.hoverKey = "tree";
          this.tooltip = { x: this.tree.x, y: this.tree.y - 60, title: "Oak Tree", body: this.luna.inTree ? "Click to call Luna down" : "Click to call Luna up!" };
        }
      }
      interactiveAt(x, y) {
        if (this.byDecorOpen) return true;
        if (pointInRect(x, y, this.byDecorButton)) return true;
        if (pointInRect(x, y, this.cameraButton)) return true;
        if (pointInRect(x, y, this.goInsideButton)) return true;
        if (Math.abs(x - this.feeder.x) < 40 && Math.abs(y - this.feeder.y) < 40) return true;
        if (Math.abs(x - this.garden.x) < 50 && Math.abs(y - this.garden.y) < 40) return true;
        if (Math.abs(x - this.pool.x) < 50 && Math.abs(y - this.pool.y) < 40) return true;
        if (Math.abs(x - this.tree.x) < 50 && y > this.tree.y - 60 && y < this.tree.y + 100) return true;
        return false;
      }
      onKeyDown(key) {
        if (key === "Escape") {
          /* C.NEW.2 — close byDecor panel first; otherwise return to
             hangout (already correct, hangout.enter sets lastVisitTimestamp). */
          if (this.byDecorOpen) {
            audio.menu();
            this.byDecorOpen = false;
            this.byDecorHover = null;
            return;
          }
          audio.menu();
          this.saveJoy();
          transitionTo(SceneRegistry.create("hangout"));
        }
      }
      draw(c) {
        var tod = (store.decor.timeOfDay == null ? 1 : store.decor.timeOfDay);
        this.drawBackground(c, tod);
        this.drawInteractiveObjects(c);
        /* draw pets */
        var obiState = { pose: this.obi.pose, expression: this.obi.happyTimer > 0 ? "excited" : "happy",

        drawObi(c, this.obi.x, this.obi.y, 1.0, obiState);
        drawAccessoryOverlay(c, "obi", this.obi.x, this.obi.y, 1.0, obiState.pose, obiState.facing);

        var lunaState = { pose: this.luna.pose, tail: Math.sin(game.time * 2), facing: this.luna.facing,
          wiggle: this.luna.wiggle, earTwitch: this.luna.earTwitch, pawBat: this.luna.pawBat || 0 };
        drawLuna(c, this.luna.x, this.luna.y, 0.95, lunaState);
        drawAccessoryOverlay(c, "luna", this.luna.x, this.luna.y, 0.95, lunaState.pose, lunaState.facing);

        /* feeder birds */
        for (var bi = 0; bi < this.feeder.birds.length; bi++) {
          var bird = this.feeder.birds[bi];

          c.translate(bird.x + Math.sin(game.time * 3 + bird.phase) * 4, bird.y + Math.cos(game.time * 2 + bird.phase) * 3);
          c.fillStyle = "#5C4434";
          c.beginPath();
          c.arc(0, 0, 5, 0, Math.PI * 2); c.fill();
          c.fillStyle = "#E8A020";
          c.beginPath(); c.moveTo(5, -1); c.lineTo(9, 0); c.lineTo(5, 1); c.closePath(); c.fill();
          /* wings */
          c.fillStyle = "#6B5B4E";
          c.beginPath(); c.ellipse(-3, -2, 6, 3, -0.3 + Math.sin(game.time * 8 + bird.phase) * 0.3, 0, Math.PI * 2); c.fill();
          c.restore();
        }

        /* fishing indicator */
        if (this.fishingState) {
          c.save();
          if (this.fishingState.phase === "waiting") {
            c.globalAlpha = 0.4 + Math.sin(game.time * 3) * 0.2;
            c.fillStyle = "#6B8F8A";
            c.beginPath(); c.ellipse(this.fishingState.fishX, this.fishingState.fishY, 8, 4, 0, 0, Math.PI * 2); c.fill();
          } else if (this.fishingState.phase === "strike") {
            c.fillStyle = "#6B8F8A";
            c.beginPath(); c.ellipse(this.fishingState.fishX, this.fishingState.fishY, 10, 5, Math.sin(game.time * 6) * 0.3, 0, Math.PI * 2); c.fill();
            c.fillStyle = "#FFDD44";
            c.font = '16px "Fredoka One", sans-serif';
            c.textAlign = "center";
            c.fillText("!", this.fishingState.fishX, this.fishingState.fishY - 16);
          } else if (this.fishingState.phase === "caught") {
            c.globalAlpha = clamp(this.fishingState.timer / 0.5, 0, 1);
            c.fillStyle = "#6B8F8A";
            c.beginPath(); c.ellipse(this.pool.x, this.pool.y - 20 - (1.5 - this.fishingState.timer) * 30, 8, 4, 0, 0, Math.PI * 2); c.fill();
          }
          c.restore();
        }
        /* backyard butterflies */
        for (var bbi = 0; bbi < this.byButterflies.length; bbi++) {
          var bbf = this.byButterflies[bbi];
          c.save();
          c.translate(bbf.x, bbf.y);
          var bWing = Math.sin(game.time * 8 + bbf.phase) * 0.6;
          c.fillStyle = bbf.color;
          c.save(); c.rotate(bWing); c.beginPath(); c.ellipse(-4, 0, 6, 3, 0, 0, Math.PI * 2); c.fill(); c.restore();
          c.save(); c.rotate(-bWing); c.beginPath(); c.ellipse(4, 0, 6, 3, 0, 0, Math.PI * 2); c.fill(); c.restore();
          c.fillStyle = "#333"; c.beginPath(); c.arc(0, 0, 1.5, 0, Math.PI * 2); c.fill();
          c.restore();
        }
        /* fetch ball */
        if (this.fetchState) {
          c.save();
          c.fillStyle = "#D04040";
          c.beginPath(); c.arc(this.fetchState.ballX, this.fetchState.ballY, 6, 0, Math.PI * 2); c.fill();
          c.fillStyle = "#FFFFFF";
          c.beginPath(); c.arc(this.fetchState.ballX - 1, this.fetchState.ballY - 2, 2, 0, Math.PI * 2); c.fill();
          c.restore();
        }
        /* sprinkler */
        if (this.sprinklerOn) {
          c.save();
          /* ground wet zone */
          c.fillStyle = "rgba(80,160,220,0.08)";
          c.beginPath(); c.ellipse(350, 445, 70, 25, 0, 0, Math.PI * 2); c.fill();
          /* water arcs — rotating fan pattern */
          c.strokeStyle = "rgba(100,180,240,0.5)"; c.lineWidth = 2.5;
          for (var si = 0; si < 7; si++) {
            var sAngle = (si - 3) * 0.4 + Math.sin(game.time * 2.5) * 0.6;
            var sLen = 50 + Math.sin(game.time * 3.5 + si) * 20;
            c.beginPath();
            c.moveTo(350, 438);
            c.quadraticCurveTo(350 + Math.sin(sAngle) * sLen * 0.5, 438 - sLen * 0.7, 350 + Math.sin(sAngle) * sLen, 445);
            c.stroke();
          }
          /* water droplets — more and spread wider */
          c.fillStyle = "rgba(100,180,240,0.55)";
          for (var sdi = 0; sdi < 14; sdi++) {
            var sdx = 350 + Math.sin(game.time * 2.2 + sdi * 0.95) * (25 + sdi * 6);
            var sdy = 425 + Math.abs(Math.sin(game.time * 2.8 + sdi * 0.7)) * 30;
            c.beginPath(); c.arc(sdx, sdy, 2.5, 0, Math.PI * 2); c.fill();
          }
          /* sparkle highlights */
          c.fillStyle = "rgba(255,255,255,0.5)";
          for (var ssi = 0; ssi < 4; ssi++) {
            var ssx = 350 + Math.sin(game.time * 1.8 + ssi * 1.5) * 40;
            var ssy = 430 + Math.cos(game.time * 2.2 + ssi * 2) * 15;

          }
          c.restore();
        }
        /* bugs */
        for (var bugi = 0; bugi < this.bugs.length; bugi++) {
          var bug = this.bugs[bugi];
          c.save();
          c.translate(bug.x, bug.y);
          if (bug.type === "ladybug") {
            c.fillStyle = "#D04040"; c.beginPath(); c.arc(0, 0, 6, 0, Math.PI * 2); c.fill();
            c.fillStyle = "#1A1A1A"; c.beginPath(); c.arc(0, -5, 3, 0, Math.PI * 2); c.fill();
            c.fillStyle = "#1A1A1A"; c.beginPath(); c.arc(-2, 1.5, 1.5, 0, Math.PI * 2); c.fill(); c.beginPath(); c.arc(2, 1.5, 1.5, 0, Math.PI * 2); c.fill();
            c.strokeStyle = "#1A1A1A"; c.lineWidth = 0.8; c.beginPath(); c.moveTo(0, -2); c.lineTo(0, 5); c.stroke();
          } else if (bug.type === "beetle") {
            c.fillStyle = "#2A5A2A"; c.beginPath(); c.ellipse(0, 0, 6, 4, 0, 0, Math.PI * 2); c.fill();
            c.fillStyle = "#1A3A1A"; c.beginPath(); c.arc(0, -4.5, 2.5, 0, Math.PI * 2); c.fill();
            c.fillStyle = "rgba(255,255,255,0.15)"; c.beginPath(); c.ellipse(-2, -1, 3, 2, -0.2, 0, Math.PI * 2); c.fill();
          } else {
            c.fillStyle = "#3A2A1A"; c.beginPath(); c.ellipse(0, 0, 5, 3, 0, 0, Math.PI * 2); c.fill();
            c.fillStyle = "#2A1A0A"; c.beginPath(); c.arc(0, -3.5, 2, 0, Math.PI * 2); c.fill();
            c.strokeStyle = "#2A1A0A"; c.lineWidth = 0.5;

        c.beginPath(); c.arc(this.cameraButton.x + 14, this.cameraButton.y + 16, 4, 0, Math.PI * 2); c.fill();
        c.fillStyle = "#3A2A1E";

        c.fillStyle = "rgba(255,248,240,0.65)";
        rr(c, 452, 59, 72, 22, 11);
        c.fill();
        c.fillStyle = COLORS.gold;
        c.beginPath(); c.arc(466, 70, 7, 0, Math.PI * 2); c.fill();
        c.fillStyle = "#FFF4C0";
        c.beginPath(); c.arc(464, 68, 3, 0, Math.PI * 2); c.fill();
        c.fillStyle = COLORS.gold;
        c.font = '13px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.textAlign = "center";
        c.fillText(store.coins, 503, 75);
        c.restore();
        /* coin popup */
        if (this.coinPopup) {

        rr(c, 122, 540, 556, 36, 18);
        c.fill();
        c.fillStyle = "#5C3D2E";
        c.textAlign = "center";
        c.font = '14px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.fillText(this.statusText, 400, 560);
        c.globalAlpha = 1;

        /* tooltip */
        /* backyard decor button */

        if (this.tooltip && this.tooltipAlpha > 0.02) drawTooltip(c, this.tooltip.x, this.tooltip.y, this.tooltip.title, this.tooltip.body, this.tooltipAlpha);

        if (this.byDecorFade > 0.01) {

          drawPanelClose(c, PANEL_STD, this.byDecorHover === "close");
          /* items */

            c.fill();

    // ═══ 14-scene-minigame-base.js ═══
    class BaseMinigameScene extends BaseScene {
      constructor(gameId, title, instruction, thresholds, duration) {
        super(gameId);
        this.gameId = gameId;
        this.displayTitle = title;
        this.instruction = instruction;
        this.thresholds = thresholds;
        this.duration = duration;
        this.phase = "instructions";
        this.phaseTime = 0;
        this.timeLeft = duration;
        this.score = 0;
        this.scorePop = 0;
        this.combo = 1;
        this.hoveredButton = null;
        this.paused = false;
        this.achievementFreeze = 0;
        this.achievementBanner = null;
        this.newBest = false;
        this.resultsStars = 0;
        this.revealedStars = 0;
        this.starTimer = 0;
        this.scoreInT = 0;
        this.personalBest = 0;
        this.playHint = null;
        this.playHintTimer = 4;
        this.challengeMode = false;
        this.challengeModifier = null;
        this.challengeStarEarned = false;
      }
      enter() {
        this.phase = "instructions";
        this.phaseTime = 0;
        this.timeLeft = this.duration;
        this.score = 0;
        this.scorePop = 0;
        this.combo = 1;
        this.hoveredButton = null;
        this.paused = false;
        this.achievementFreeze = 0;
        this.achievementBanner = null;
        this.newBest = false;
        this.resultsStars = 0;
        this.revealedStars = 0;
        this.starTimer = 0;
        this.scoreInT = 0;
        this.personalBest = store["best_" + this.gameId] || 0;
        this.challengeStarEarned = false;
        if (this.challengeMode) {
          this.challengeModifier = CHALLENGE_MODIFIERS[this.gameId] || null;
          /* scrapbook goal: first challenge attempt */
          if (store.scrapbookGoals && store.scrapbookGoals.completed.indexOf("challengeAttempt") < 0) {
            store.scrapbookGoals.completed.push("challengeAttempt");
            saveJSON("scrapbookGoals", store.scrapbookGoals);
            var caGoal = SCRAPBOOK_GOALS.find(function(g) { return g.key === "challengeAttempt"; });
            if (caGoal) addCoins(caGoal.reward);
          }
        }
        /* care bonus from pet happiness */
        this.careBonus = getCareBonus();
        if (this.careBonus.timerBonus > 0) this.timeLeft += this.careBonus.timerBonus;
        if (this.careBonus.comboStartBonus) this.combo = 2;
      }
      resultsButtons() {
        return {
          playAgain: { x: 176, y: 500, w: 180, h: 58 },
          back: { x: 444, y: 500, w: 180, h: 58 }
        };
      }
      pauseButtons() {
        return {
          resume: { x: 270, y: 312, w: 120, h: 48 },
          quit: { x: 410, y: 312, w: 120, h: 48 }
        };
      }
      startCountdown() {
        this.phase = "countdown";
        this.phaseTime = 0;
      }
      startPlay() {
        this.phase = "play";
        this.phaseTime = 0;
      }
      update(dt) {
        super.update(dt);
        this.scorePop = Math.max(0, this.scorePop - dt * 4);
        if (this.achievementBanner) {
          this.achievementBanner.time -= dt;
          if (this.achievementBanner.time <= 0) this.achievementBanner = null;
        }
        if (this.phase === "instructions") {
          this.phaseTime += dt;
          if (this.phaseTime >= 3) this.startCountdown();
        } else if (this.phase === "countdown") {
          this.phaseTime += dt;
          if (this.phaseTime >= 4) this.startPlay();
        } else if (this.phase === "play") {
          if (!this.paused) {
            if (this.achievementFreeze > 0) {
              this.achievementFreeze -= dt;
            } else {
              this.timeLeft = Math.max(0, this.timeLeft - dt);
              this.updatePlay(dt);
              /* first-play hint timer */
              if (this.playHint) {
                this.playHint.life -= dt;
                if (this.playHint.life <= 0) this.playHint = null;
              } else if (this.playHintTimer > 0) {
                this.playHintTimer -= dt;
              }
              if (this.timeLeft <= 0) this.finishGame();
            }
          }
        } else if (this.phase === "ending") {
          this.updateEnding(dt);
        } else if (this.phase === "results") {
          this.phaseTime += dt;
          this.scoreInT = Math.min(1, this.phaseTime / 0.45);
          if (this.revealedStars < this.resultsStars) {
            this.starTimer += dt;
            if (this.starTimer >= 0.3) {
              this.starTimer = 0;
              this.revealedStars++;
              audio.tinyChime();
            }
          }
        }
      }
      updatePlay() {}
      updateEnding(dt) {
        this.phaseTime += dt;
        if (this.phaseTime > 1.2) this.finishGame();
      }
      addScore(value) {
        this.score += value * (this.careBonus ? this.careBonus.scoreMultiplier : 1);
        this.scorePop = 1;
      }
      onMouseMove(x, y) {
        this.hoveredButton = null;
        if (this.phase === "results") {
          const btns = this.resultsButtons();
          if (pointInRect(x, y, btns.playAgain)) this.hoveredButton = "again";
          else if (pointInRect(x, y, btns.back)) this.hoveredButton = "back";
        } else if (this.phase === "play" && this.paused) {
          const btns = this.pauseButtons();
          if (pointInRect(x, y, btns.resume)) this.hoveredButton = "resume";
          else if (pointInRect(x, y, btns.quit)) this.hoveredButton = "quit";
        }
      }
      interactiveAt(x, y) {
        if (this.phase === "results") {
          const b = this.resultsButtons();
          return pointInRect(x, y, b.playAgain) || pointInRect(x, y, b.back);
        }
        if (this.phase === "instructions") return true;
        if (this.phase === "countdown") return pointInRect(x, y, this.pauseButtonRect());
        if (this.phase === "play" && this.paused) {
          const b = this.pauseButtons();
          return pointInRect(x, y, b.resume) || pointInRect(x, y, b.quit);
        }
        if (this.phase === "play" && pointInRect(x, y, this.pauseButtonRect())) return true;
        return this.extraInteractiveAt ? this.extraInteractiveAt(x, y) : false;
      }
      onClick(x, y) {
        if (this.phase === "instructions") {
          audio.menu();
          this.startCountdown();
          return;
        }
        if (this.phase === "results") {
          const btns = this.resultsButtons();
          if (pointInRect(x, y, btns.playAgain)) {
            audio.menu();
            transitionTo(this.createReplay());
          } else if (pointInRect(x, y, btns.back)) {
            audio.menu();
            transitionTo(SceneRegistry.create("hangout"));
          }
          return;
        }
        if (this.phase === "play" && this.paused) {
          const btns = this.pauseButtons();
          if (pointInRect(x, y, btns.resume)) {
            audio.menu();
            this.paused = false;
          } else if (pointInRect(x, y, btns.quit)) {
            audio.menu();
            transitionTo(SceneRegistry.create("hangout"));
          }
          return;
        }
        if (this.phase === "countdown" && pointInRect(x, y, this.pauseButtonRect())) {
          audio.menu();
          transitionTo(SceneRegistry.create("hangout"));
          return;
        }
        if (this.phase === "play") {
          if (pointInRect(x, y, this.pauseButtonRect())) {
            audio.menu();
            this.paused = true;
            return;
          }
          this.onGameClick(x, y);
        }
      }
      onGameClick() {}
      onKeyDown(key) {
        if (key === "Escape") {
          if (this.phase === "instructions" || this.phase === "countdown") {
            audio.menu();
            transitionTo(SceneRegistry.create("hangout"));
          } else if (this.phase === "play") {
            this.paused = !this.paused;
          }
          return;
        }
        if (this.phase === "play" && key === " ") {
          this.paused = !this.paused;
        }
      }
      calculateStars(finalScore) {
        let stars = 0;
        if (finalScore >= this.thresholds[0]) stars = 1;
        if (finalScore >= this.thresholds[1]) stars = 2;
        if (finalScore >= this.thresholds[2]) stars = 3;
        return stars;
      }
      finishGame() {
        const finalScore = Math.round(this.gameId === "cuddle" ? this.score : this.score);
        this.resultsStars = this.calculateStars(finalScore);
        this.newBest = setBest(this.gameId, finalScore);
        this.personalBest = store["best_" + this.gameId] || finalScore;
        var baseReward = 5 + this.resultsStars * 10;
        var scoreBonus = Math.floor(this.score / 100) * 2;
        var playBonus = Math.min(10, Math.floor((store.stats.totalSessions || 0) / 5));
        var upgradeBonus = hasUpgrade("luckyCharm") ? 2 : 0;
        this.coinReward = baseReward + scoreBonus + (this.newBest ? 15 : 0) + playBonus + upgradeBonus;
        addCoins(this.coinReward);
        if (this.resultsStars >= 3 && this.newBest) {
          addScrapbookEntry("milestone", "Earned 3 stars in " + this.displayTitle + "!", "star");
        }
        /* check star milestone coin rewards */
        if (this.newBest) {
          var milestoneCoins = checkStarMilestones();
          if (milestoneCoins > 0) {
            this.coinReward += milestoneCoins;
            this.milestoneText = "\u2605 Star Milestone! +" + milestoneCoins + " coins!";
          }
        }
        /* check fullHouse achievement */
        if (totalStarsEarned() >= 33 && !store.achievements.fullHouse) {
          store.achievements.fullHouse = true;
          saveAchievements();
          var fhInfo = ACHIEVEMENTS.find(function(a) { return a.key === "fullHouse"; });
          if (fhInfo && fhInfo.coinBonus) addCoins(fhInfo.coinBonus);
          addScrapbookEntry("achievement", "Full House — all 33 stars!", "star");
        }
        /* challenge star check */
        if (this.challengeMode && this.resultsStars >= 2 && !store.challengeStars[this.gameId]) {
          store.challengeStars[this.gameId] = true;
          saveJSON("challengeStars", store.challengeStars);
          this.challengeStarEarned = true;
          this.coinReward += 20;
          addCoins(20);
          addScrapbookEntry("milestone", "Challenge star earned in " + this.displayTitle + "!", "star");
          /* check challenge champion achievement */
          if (totalChallengeStars() >= 5 && !store.achievements.challengeChampion) {
            store.achievements.challengeChampion = true;
            saveAchievements();
            var ccInfo = ACHIEVEMENTS.find(function(a) { return a.key === "challengeChampion"; });
            if (ccInfo && ccInfo.coinBonus) addCoins(ccInfo.coinBonus);
            addScrapbookEntry("achievement", "Challenge Champion unlocked!", "star");
          }
        }
        this.phase = "results";
        this.phaseTime = 0;
        this.scoreInT = 0;
        this.revealedStars = 0;
        this.starTimer = 0;
        this.confettiFired = false;
      }
      createReplay() {
        var s = SceneRegistry.create(this.gameId);
        s.challengeMode = this.challengeMode;
        return s;
      }
      queueAchievement(key) {
        if (store.achievements[key]) return;
        store.achievements[key] = true;
        saveAchievements();
        const info = ACHIEVEMENTS.find((a) => a.key === key);
        if (info) {
          addScrapbookEntry("achievement", info.name + " unlocked!", "star");
          if (info.coinBonus) addCoins(info.coinBonus);
          this.achievementFreeze = Math.max(this.achievementFreeze, 0.5);
          this.achievementBanner = { name: info.name + (info.coinBonus ? " (+" + info.coinBonus + " coins)" : ""), time: 1.25, maxTime: 1.25 };
          audio.achievement();
          spawnParticleBurst(W / 2, 42, [COLORS.gold, COLORS.softPink], 12, ["star", "heart"]);
        }
      }
      drawTopHud(c, showCombo = true) {

      drawCountdown(c) {

        if (t >= 1 && t < 2) text = "2";
        else if (t >= 2 && t < 3) text = "1";
        else if (t >= 3) text = "GO!";
        const local = t % 1;
        const scale = 1 + 0.2 * (1 - local);
        c.save();
        c.fillStyle = "rgba(92,68,52,0.22)";
        c.fillRect(0, 0, W, H);

      drawPause(c) {

        c.font = '52px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.fillText("PAUSED", W / 2, 230);
        c.font = '18px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.fillText(isMobile ? "Choose an option below" : "Press Space or Esc to resume", W / 2, 262);
        const btns = this.pauseButtons();
        drawButton(c, btns.resume, "Resume", this.hoveredButton === "resume", "#7DB36C");
        drawButton(c, btns.quit, "Quit", this.hoveredButton === "quit", "#B86A58");
        c.restore();
      }
      drawResults(c, characterDraw) {
        c.save();
        c.fillStyle = "rgba(255,248,240,0.82)";
        c.fillRect(0, 0, W, H);

        /* confetti burst on 3 stars */
        if (this.resultsStars >= 3 && this.revealedStars >= 3 && !this.confettiFired) {
          this.confettiFired = true;
          const confettiColors = [COLORS.gold, COLORS.softPink, "#87CEEB", "#A8D870", "#FFB347", "#FF8FAA", "#C39BD3"];
          for (let i = 0; i < 40; i++) {
            game.particles.push({
              x: W / 2 + rand(-200, 200), y: rand(50, 200),
              vx: rand(-120, 120), vy: rand(-180, 40),
              life: rand(1.5, 3), maxLife: 3,
              size: rand(4, 8), rot: rand(0, 6.28), vr: rand(-5, 5),
              shape: Math.random() < 0.5 ? "star" : "heart",

            });
          }
          audio.achievement();
        }

        c.fillStyle = "#7A4E36";
        c.textAlign = "center";
        c.font = '38px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.fillText(this.displayTitle + " Results", W / 2, 88);

        const scoreScale = easeOutBack(clamp(this.scoreInT, 0, 1));
        c.save();
        c.translate(W / 2, 166);
        c.scale(scoreScale, scoreScale);
        c.fillStyle = "#B84B3A";
        c.font = '54px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.fillText(Math.round(this.score), 0, 0);
        c.font = '18px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.fillStyle = "#8A6045";
        c.fillText("Score", 0, 34);
        c.restore();

        c.fillStyle = "#8A6045";
        c.font = '17px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.fillText("Personal Best  \u2605  " + this.personalBest, W / 2, 210);

        c.fillStyle = COLORS.gold;
        c.font = '15px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.fillText("+" + this.coinReward + " coins", W / 2, this.newBest ? 280 : 228);
        /* F.8 — when Lucky Charm is active, surface its origin in a faint
           caps line below the coin total. Without this the +2 felt invisible. */
        if (hasUpgrade("luckyCharm")) {
          c.save();
          c.fillStyle = "rgba(122,78,54,0.55)";
          c.font = '10px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.textAlign = "center";
          c.fillText("includes +2 from Lucky Charm", W / 2, (this.newBest ? 280 : 228) + 14);
          c.restore();
        }

        if (this.newBest) {
          const bestPulse = 1 + Math.sin(game.time * 4) * 0.04;
          c.save();
          c.translate(W / 2, 246);
          c.scale(bestPulse, bestPulse);
          rr(c, -120, -21, 240, 42, 18);
          c.fillStyle = "#E2B83B";
          c.fill();
          c.strokeStyle = "rgba(255,255,255,0.4)";
          c.lineWidth = 2;
          c.stroke();
          c.fillStyle = "#FFF8F0";
          c.font = '19px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.textAlign = "center";
          c.fillText("✦ New Personal Best! ✦", 0, 6);
          c.restore();
        }

        var hasChalStar = store.challengeStars[this.gameId];
        var show4Stars = hasChalStar || this.challengeMode;
        var starCount = show4Stars ? 4 : 3;
        var starStartX = show4Stars ? W / 2 - 96 : W / 2 - 64;
        for (let i = 0; i < starCount; i++) {
          var isChallenge = i === 3;
          var revealed = isChallenge ? (hasChalStar && this.phaseTime > 1.2) : (i < this.revealedStars);
          var t = revealed ? easeOutBack(clamp((this.phaseTime - (isChallenge ? 1.2 : i * 0.3)) / 0.28, 0, 1)) : 0;
          c.save();
          c.translate(starStartX + i * 64, 310);
          c.scale(t, t);
          if (revealed) {
            drawGlowCircle(c, 0, 0, 28, isChallenge ? "rgba(255,180,0,ALPHA)" : "rgba(255,215,0,ALPHA)", isChallenge ? 0.25 : 0.15);
          }
          drawStar(c, 0, 0, isChallenge ? 20 : 22, revealed ? (isChallenge ? "#FFA500" : COLORS.gold) : "#D3C8B4");
          if (isChallenge && !hasChalStar) {
            c.globalAlpha = 0.4;
            drawStar(c, 0, 0, 20, "#D3C8B4");
            c.globalAlpha = 1;
          }
          c.restore();
        }

        /* celebration message for 3 stars */
        if (this.resultsStars >= 3 && this.revealedStars >= 3) {
          c.save();
          c.globalAlpha = clamp(this.phaseTime - 1.2, 0, 1);
          c.fillStyle = COLORS.gold;
          c.textAlign = "center";
          c.font = '16px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.fillText("Perfect score! Amazing!", W / 2, 348);
          c.restore();
        }

        /* star milestone notification */
        if (this.milestoneText && this.phaseTime > 0.8) {
          c.save();
          c.globalAlpha = clamp(this.phaseTime - 0.8, 0, 1);
          c.fillStyle = COLORS.gold;
          c.textAlign = "center";
          c.font = '15px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.fillText(this.milestoneText, W / 2, 368);
          c.restore();
        }

        characterDraw(c);

        const btns = this.resultsButtons();
        drawButton(c, btns.playAgain, "Play Again", this.hoveredButton === "again", "#7DB36C");
        drawButton(c, btns.back, "Back", this.hoveredButton === "back", "#B86A58");
        c.restore();
      }
      draw(c) {
        this.drawScene(c);
        this.drawTopHud(c, true);
        if (this.phase === "instructions") this.drawInstructionCard(c, this.drawInstructionIcon.bind(this));
        else if (this.phase === "countdown") this.drawCountdown(c);
        else if (this.phase === "play" && this.paused) this.drawPause(c);
        else if (this.phase === "results") this.drawResults(c, this.drawResultCharacter.bind(this));
        else if (this.phase === "ending") this.drawEndingOverlay(c);
        /* first-play hint */
        if (this.playHint && this.phase === "play") {
          c.save();
          c.globalAlpha = clamp(this.playHint.life / 0.5, 0, 1) * 0.85;
          c.fillStyle = "rgba(255,248,240,0.88)";
          rr(c, W/2 - 180, H - 60, 360, 34, 14);
          c.fill();
          c.fillStyle = "#7A4E36";
          c.textAlign = "center";
          c.font = '14px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.fillText(this.playHint.text, W/2, H - 38);
          c.restore();
        }
        drawAchievementBanner(c, this.achievementBanner);
      }
      drawScene() {}
      drawInstructionIcon() {}
      drawResultCharacter() {}
      drawEndingOverlay() {}
    }

    class TreatTossScene extends BaseMinigameScene {
      constructor() {
        super("treat", "Treat Toss", "Toss treats to Obi. Catches in a row build combos.", [300, 700, 1400], 60);
        this.treat = null;
        this.obiX = 120;
        this.obiPhase = 0;
        this.obiSpeed = 1;
        this.obiFacing = 1;
        this.catches = 0;
        this.goldenReady = false;
        this.happyTimer = 0;
        this.sadTimer = 0;
        this.rampStep = 0;
        this.perfectTimer = 0;
        this.goldenFlash = 0;
        this.missTimer = 0;
        this.speedUpTimer = 0;
      }
      enter() {
        super.enter();
        this.treat = null;
        this.obiX = 140;
        this.obiPhase = 0;
        this.obiSpeed = this.challengeMode ? 1.5 : 1;
        this.obiFacing = 1;
        this.catches = 0;
        this.goldenReady = false;
        this.happyTimer = 0;
        this.sadTimer = 0;
        this.rampStep = 0;
        this.perfectTimer = 0;
        this.goldenFlash = 0;
        this.missTimer = 0;
        this.speedUpTimer = 0;
      }
      extraInteractiveAt() { return true; }
      onGameClick(x) {
        if (this.treat) return;
        const spawnX = W / 2 + 22;
        const spawnY = 104;
        const flight = 0.92;
        this.treat = {
          x: spawnX,
          y: spawnY,
          vx: (x - spawnX) / flight,
          vy: 30,
          gravity: 640,
          bounced: false,
          fade: 1,
          fading: false,
          golden: this.goldenReady
        };
        if (this.goldenReady) this.goldenReady = false;
        audio.menu();
      }
      updatePlay(dt) {
        if (this.playHintTimer <= 0 && !this.playHint && this.score === 0 && !this.treat) {
          this.playHint = { text: isMobile ? "Tap anywhere to toss a treat!" : "Click anywhere to toss a treat!", life: 5 };
          this.playHintTimer = -1;
        }
        const elapsed = this.duration - this.timeLeft;
        const newRamp = Math.floor(elapsed / 15);
        if (newRamp > this.rampStep) {
          this.rampStep = newRamp;
          this.obiSpeed = Math.pow(1.15, this.rampStep) * (this.challengeMode ? 1.5 : 1.0);
          this.speedUpTimer = 1.0;
          audio.pounce();
        }

        this.perfectTimer = Math.max(0, this.perfectTimer - dt);
        this.missTimer = Math.max(0, this.missTimer - dt);
        this.speedUpTimer = Math.max(0, this.speedUpTimer - dt);
        this.goldenFlash = Math.max(0, this.goldenFlash - dt);
        this.obiPhase += dt * (1.2 * this.obiSpeed);
        const prevX = this.obiX;
        this.obiX = 400 + Math.sin(this.obiPhase) * 250;
        this.obiFacing = this.obiX >= prevX ? 1 : -1;
        this.happyTimer = Math.max(0, this.happyTimer - dt);
        this.sadTimer = Math.max(0, this.sadTimer - dt);

        if (this.treat) {
          this.treat.x += this.treat.vx * dt;
          this.treat.y += this.treat.vy * dt;
          this.treat.vy += this.treat.gravity * dt;

          const obiY = 495;
          const catchX = this.obiX;
          if (!this.treat.fading && Math.abs(this.treat.x - catchX) < 48 && Math.abs(this.treat.y - obiY) < 44) {
            let value = (this.treat.golden ? 50 : 10) * this.combo;
            const perfect = Math.abs(this.treat.x - catchX) < 16 && Math.abs(this.treat.y - obiY) < 18;
            if (perfect) {
              value += 5 * this.combo;
              this.perfectTimer = 0.8;
              spawnParticleBurst(this.obiX, 454, [COLORS.gold, "#FFF4C0"], 12, ["star"]);
            }
            this.addScore(value);
            this.catches++;
            store.stats.totalTreatCatches++;
            store.stats.bestTreatCombo = Math.max(store.stats.bestTreatCombo, this.combo);
            saveStats();
            if (store.stats.totalTreatCatches >= 30) this.queueAchievement("obiBestFriend");
            this.combo++;
            if (this.combo >= 10) this.queueAchievement("comboStar");
            if (this.combo > 1 && this.combo % 5 === 0) audio.combo();
            this.happyTimer = 0.45;
            this.treat = null;
            if (this.catches > 0 && this.catches % 20 === 0) {
              this.goldenReady = true;
              this.goldenFlash = 1.2;
            }
            audio.catch();
            if (this.combo >= 5) screenShake(2, 0.12);
            spawnParticleBurst(this.obiX, 470, [COLORS.softPink, COLORS.gold], this.combo >= 3 ? 14 : 10, ["heart", "star"]);
            return;
          }

          const groundY = 525;
          if (!this.treat.fading && this.treat.y >= groundY) {
            if (!this.treat.bounced) {
              this.treat.bounced = true;
              this.treat.y = groundY;
              this.treat.vy *= -0.38;
            } else {
              this.treat.fading = true;
              this.treat.y = groundY;
              this.treat.vx *= 0.2;
              this.treat.vy = 0;
              this.combo = 1;
              this.sadTimer = 0.6;
              this.missTimer = 0.7;
              audio.miss();
            }
          }

          if (this.treat.fading) {
            this.treat.fade -= dt * 3.3;
            if (this.treat.fade <= 0) this.treat = null;
          }
        }
      }
      drawInstructionIcon(c, x, y) {
        c.save();
        c.translate(x, y);
        c.strokeStyle = "#7A4E36";
        c.lineWidth = 3;
        rr(c, -26, -16, 52, 32, 8);
        c.stroke();

    class BathTimeScene extends BaseMinigameScene {
      constructor() {
        super("bath", "Bath Time", "Drag to scrub. Tap to rinse. Drag to dry.", [120, 280, 500], 45);
        this.currentPet = "obi";
        this.washPhase = "scrub"; // scrub → rinse → dry
        this.cleanMeter = 0;
        this.dryMeter = 0;
        this.rinseCount = 0;
        this.rinsesNeeded = 5;
        this.bubbles = [];
        this.petsDone = 0;
        this.transitionTimer = 0;
        this.shakeTimer = 0;
        this.phaseStartTime = 0;
        this.petHitbox = { x: 310, y: 300, w: 180, h: 160 };
        this.tubHitbox = { x: 280, y: 380, w: 240, h: 80 };
      }
      updatePlay(dt) {
        this.shakeTimer = Math.max(0, this.shakeTimer - dt);

        // Transition between pets
        if (this.transitionTimer > 0) {
          this.transitionTimer -= dt;
          if (this.transitionTimer <= 0) {
            this.currentPet = "luna";
            this.washPhase = "scrub";
            this.cleanMeter = 0;
            this.dryMeter = 0;
            this.rinseCount = 0;
            this.bubbles = [];
            this.phaseStartTime = this.phaseTime;
          }
          return;
        }

        // Update bubbles
        for (let i = this.bubbles.length - 1; i >= 0; i--) {
          const b = this.bubbles[i];
          b.y += b.vy * dt;
          b.life -= dt;
          if (b.life <= 0) this.bubbles.splice(i, 1);
        }

        const mx = game.mouse.x, my = game.mouse.y;
        const overPet = pointInRect(mx, my, this.petHitbox);

        if (this.washPhase === "scrub") {
          if (this.challengeMode && !(game.mouse.down && overPet) && this.cleanMeter > 0) {
            this.cleanMeter = clamp(this.cleanMeter - dt * 12, 0, 100);
          }
          if (game.mouse.down && overPet) {
            this.cleanMeter = clamp(this.cleanMeter + dt * 35, 0, 100);
            this.addScore(dt * 30);
            // Spawn bubbles
            if (Math.random() < dt * 12) {
              this.bubbles.push({ x: mx + rand(-20, 20), y: my + rand(-10, 10), size: rand(4, 10), life: rand(2, 4), vy: rand(-8, -3) });
            }
          }
          if (this.cleanMeter >= 100) {
            const elapsed = this.phaseTime - this.phaseStartTime;
            this.addScore(35 + Math.max(0, Math.round(15 - elapsed * 1.5)));
            audio.tinyChime();
            this.washPhase = "rinse";
            this.phaseStartTime = this.phaseTime;
            this.playHint = { life: 99, text: "Rinse! " + (isMobile ? "Tap" : "Click") + " the tub (" + this.rinseCount + "/" + this.rinsesNeeded + ")" };
          } else {
            this.playHint = { life: 99, text: "Scrub! " + Math.round(this.cleanMeter) + "%" };
          }
        } else if (this.washPhase === "rinse") {
          this.playHint = { life: 99, text: "Rinse! " + (isMobile ? "Tap" : "Click") + " the tub (" + this.rinseCount + "/" + this.rinsesNeeded + ")" };
        } else if (this.washPhase === "dry") {
          if (game.mouse.down && overPet) {
            this.dryMeter = clamp(this.dryMeter + dt * 30, 0, 100);
            this.addScore(dt * 25);
          }
          if (this.dryMeter >= 100) {
            const elapsed = this.phaseTime - this.phaseStartTime;
            this.addScore(35 + Math.max(0, Math.round(15 - elapsed * 1.5)));
            audio.combo();
            this.petsDone++;
            if (this.petsDone === 1) {
              this.transitionTimer = 1.5;
              this.playHint = { life: 99, text: "Great! Now Luna's turn..." };
            } else {
              // Both done! Combo bonus
              this.addScore(40);
              this.playHint = { life: 99, text: "Both pets squeaky clean!" };
              spawnParticleBurst(400, 350, [COLORS.gold, "#87CEEB", COLORS.softPink], 16, ["star", "heart"]);
              screenShake(4, 0.3);
              if (this.score >= 200) this.queueAchievement("squeakyClean");
            }
          } else {
            this.playHint = { life: 99, text: "Dry! " + Math.round(this.dryMeter) + "%" };
          }
        }
      }
      onGameClick(x, y) {
        if (this.transitionTimer > 0) return;
        if (this.washPhase === "rinse" && pointInRect(x, y, this.tubHitbox)) {
          this.rinseCount++;
          spawnParticleBurst(400, 380, ["#6CB4EE", "#A0D4FF"], 6, ["star"]);
          this.shakeTimer = 0.3;
          audio.tinyChime();
          // Remove some bubbles
          const toRemove = Math.min(this.bubbles.length, Math.ceil(this.bubbles.length / (this.rinsesNeeded - this.rinseCount + 1)));
          this.bubbles.splice(0, toRemove);
          if (this.rinseCount >= this.rinsesNeeded) {
            const elapsed = this.phaseTime - this.phaseStartTime;
            this.addScore(35 + Math.max(0, Math.round(15 - elapsed * 1.5)));
            audio.tinyChime();
            this.washPhase = "dry";
            this.phaseStartTime = this.phaseTime;
          }
        }
      }
      drawScene(c) {
        // Bathroom background
        const wallG = c.createLinearGradient(0, 0, 0, H * 0.6);

        c.fillStyle = wallG;

        c.fillStyle = "#E8E8E8";

        c.strokeStyle = "rgba(180,190,200,0.3)";
        c.lineWidth = 1;
        for (let tx = 0; tx < W; tx += 40) { c.beginPath(); c.moveTo(tx, 0); c.lineTo(tx, H); c.stroke(); }
        for (let ty = 0; ty < H; ty += 40) { c.beginPath(); c.moveTo(0, ty); c.lineTo(W, ty); c.stroke(); }

        // Shelf with bottles
        c.fillStyle = "#B0A090";
        rr(c, 580, 60, 160, 12, 4); c.fill();
        const bottleColors = ["#D04040", "#40A0D0", "#D0D040"];

        }
        // Towel rack
        c.strokeStyle = "#A09080"; c.lineWidth = 3;
        c.beginPath(); c.moveTo(40, 120); c.lineTo(40, 250); c.stroke();
        c.beginPath(); c.moveTo(30, 130); c.lineTo(50, 130); c.stroke();
        c.beginPath(); c.moveTo(30, 200); c.lineTo(50, 200); c.stroke();
        c.fillStyle = "#E8B8A0"; rr(c, 24, 132, 32, 65, 4); c.fill();
        c.fillStyle = "#A8D8E8"; rr(c, 28, 202, 28, 45, 4); c.fill();
        // Mirror
        c.fillStyle = "rgba(200,215,225,0.5)";
        rr(c, 70, 40, 80, 100, 16); c.fill();
        c.strokeStyle = "#B0A090"; c.lineWidth = 3;
        rr(c, 70, 40, 80, 100, 16); c.stroke();
        c.fillStyle = "rgba(255,255,255,0.15)";
        c.beginPath(); c.ellipse(95, 70, 20, 30, -0.2, 0, Math.PI * 2); c.fill();
        // Bath mat
        c.fillStyle = "#D8C0B0";
        c.beginPath(); c.ellipse(400, 500, 80, 20, 0, 0, Math.PI * 2); c.fill();
        c.fillStyle = "#C8B0A0";
        c.beginPath(); c.ellipse(400, 500, 60, 14, 0, 0, Math.PI * 2); c.fill();
        // Rubber duck
        c.fillStyle = "#FFD700";
        c.beginPath(); c.arc(320, 490, 8, 0, Math.PI * 2); c.fill();
        c.fillStyle = "#FFA500"; c.beginPath(); c.moveTo(328, 488); c.lineTo(335, 490); c.lineTo(328, 492); c.closePath(); c.fill();
        c.fillStyle = "#333"; c.beginPath(); c.arc(325, 486, 1.5, 0, Math.PI * 2); c.fill();

        // Tub
        c.save();
        c.translate(400, 420);
        // Tub body
        const tubG = c.createLinearGradient(-120, -40, -120, 40);
        tubG.addColorStop(0, "#C0C8D0");
        tubG.addColorStop(0.5, "#A0A8B0");
        tubG.addColorStop(1, "#808890");
        c.fillStyle = tubG;
        c.beginPath();
        c.ellipse(0, 0, 120, 45, 0, 0, Math.PI * 2);
        c.fill();
        // Water surface
        c.fillStyle = "rgba(100,180,240,0.45)";
        c.beginPath();
        c.ellipse(0, -5, 105, 35, 0, 0, Math.PI * 2);
        c.fill();
        // Rim highlight
        c.strokeStyle = "rgba(255,255,255,0.4)";
        c.lineWidth = 2;
        c.beginPath();
        c.ellipse(0, -8, 115, 40, 0, Math.PI, Math.PI * 2);
        c.stroke();
        c.restore();

        // Pet
        if (this.transitionTimer <= 0) {
          const shake = this.shakeTimer > 0 ? Math.sin(game.time * 30) * 3 : 0;
          if (this.currentPet === "obi") {
            drawObi(c, 400 + shake, 390, 1.1, { pose: "bath", expression: "happy", bounce: this.shakeTimer > 0 ? 0.05 : 0, facing: 1 });
          } else {
            drawLuna(c, 400 + shake, 385, 1.0, { pose: "bath", facing: 1, wiggle: this.shakeTimer > 0 ? 0.1 : 0 });
          }
        } else {
          // Transition: show text
          c.fillStyle = COLORS.dark;
          c.textAlign = "center";
          c.font = '22px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.fillText("Luna's turn!", W / 2, H / 2 - 20);
        }

        // Bubbles
        for (const b of this.bubbles) {
          c.save();
          c.globalAlpha = clamp(b.life / 2, 0, 0.7);

          bg.addColorStop(0, "rgba(255,255,255,0.8)");
          bg.addColorStop(0.5, "rgba(180,220,255,0.4)");
          bg.addColorStop(1, "rgba(180,220,255,0)");
          c.fillStyle = bg;
          c.beginPath(); c.arc(b.x, b.y, b.size, 0, Math.PI * 2); c.fill();

        // Phase meter

        else if (this.washPhase === "dry") { meter = this.dryMeter; label = "DRY"; }
        c.save();
