  <!--
    Annie's Cozy Day — implementation plan

    Architecture plan:
    1) Build a fixed 800x600 canvas app with one requestAnimationFrame loop, one shared input layer,
       one shared particle system, one shared audio manager, and localStorage helpers using the
       "anniesCozyDay_" prefix for every saved value.
    2) Define reusable drawing functions for Annie, Obi, and Luna first. Every screen uses these
       functions only; no inline character rendering. Pose and expression are controlled through the
       state argument so the same characters can be reused on title, hub, gameplay, and results.
    3) Create scene classes for Title, Hub, and the three minigames. Minigames share a common base
       scene that handles the required flow: crossfade arrival from hub, instruction card, countdown,
       gameplay, pause overlay, results screen, replay, and hub return.
    4) Finish Tier 1 completely before Tier 2 content is enabled: title screen, hub, Treat Toss,
       Laser Chase, full navigation loop, procedural audio with mute persistence, score tracking,
       and personal best persistence.
    5) Add Tier 2 after Tier 1 logic is complete: Cuddle Pile, achievements with saved progress and
       hub badges, plus richer idle animation states across all screens.
    6) Add polish last: crossfades, pulsing prompts, bounce-in score text, staggered results stars,
       hover glows, ambient hearts/stars, and achievement banners.
    7) Final self-review target: no undefined variables, no dead-end navigation,
       no broken game loop transitions, and no missing pause/results wiring.
  -->

    var BOND_XP_RATES = { pet: { xp: 5, cap: 3 }, brush: { xp: 8, cap: 2 }, treat: { xp: 3, cap: 4 }, toy: { xp: 6, cap: 3 }, feed: { xp: 4, cap: 2 }, water: { xp: 4, cap: 2 }, game: { xp: 10, cap: 3 }, visit: { xp: 5, cap: 1 } };
    function getBondLevel(pet) { return store.bond[pet] ? store.bond[pet].level : 1; }
    function getBondXPForLevel(level) { return level * level * 50; }
    function getBondProgress(pet) {
      var b = store.bond[pet]; if (!b) return 0;
      var curThresh = getBondXPForLevel(b.level);
      var nextThresh = getBondXPForLevel(b.level + 1);
      if (b.level >= 10) return 1;

    /* C.B3 — raw XP grant that runs the level-up loop. Used by the
       awardBondXP daily-action path AND by gift/event grants that
       previously did `b.xp += amount; saveBond()` and skipped levels. */
    function applyBondXPRaw(pet, amount) {
      var b = store.bond[pet]; if (!b || b.level >= 10) return 0;
      b.xp += amount;
      var leveled = false;
      while (b.level < 10 && b.xp >= getBondXPForLevel(b.level + 1)) { b.level++; leveled = true; }

    function decorLockState(item) {
      if (item.achievementUnlock && !store.achievements[item.achievementUnlock]) {
        return { kind: "achievement", value: item.achievementUnlock };
      }
      if (item.streakUnlock && store.careStreak.count < item.streakUnlock) {
        return { kind: "streak", value: item.streakUnlock };
      }
      if (item.stars > 0 && totalStarsEarned() < item.stars) {
        return { kind: "stars", value: item.stars, current: totalStarsEarned() };
      }
      if (item.season && item.season !== getCurrentSeason()) {
        return { kind: "season", value: item.season };

      if (item.price && (store.decorPurchased || []).indexOf(item.key) < 0) {

      /* weighted random selection */

    function easeOutBack(t) {
      const c1 = 1.70158;

      return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
    }
    function easeOutQuad(t) { return 1 - (1 - t) * (1 - t); }

    function rr(c, x, y, w, h, r) {
      const radius = Math.min(r, w * 0.5, h * 0.5);
      c.beginPath();
      c.moveTo(x + radius, y);
      c.arcTo(x + w, y, x + w, y + h, radius);
      c.arcTo(x + w, y + h, x, y + h, radius);

    function drawStar(c, x, y, r, color) {
      c.save();
      c.translate(x, y);
      c.fillStyle = color;
      c.beginPath();
      for (let i = 0; i < 10; i++) {
        const ang = -Math.PI / 2 + i * Math.PI / 5;
        const rad = i % 2 === 0 ? r : r * 0.45;
        const px = Math.cos(ang) * rad;
        const py = Math.sin(ang) * rad;
        if (i === 0) c.moveTo(px, py);
        else c.lineTo(px, py);
      }
      c.closePath();
      c.fill();
      c.restore();
    }
    function drawBone(c, x, y, w, h, color) {
      c.save();

      rr(c, -w * 0.45, -h * 0.28, w * 0.9, h * 0.56, h * 0.2);
      c.fill();

      c.beginPath();

      c.arc(-w * 0.35, h * 0.25, h * 0.25, 0, Math.PI * 2);
      c.arc(w * 0.35, -h * 0.25, h * 0.25, 0, Math.PI * 2);

    function wrapText(c, text, x, y, maxWidth, lineHeight) {
      const words = text.split(" ");
      let line = "";
      for (let i = 0; i < words.length; i++) {
        const test = line + words[i] + " ";
        if (c.measureText(test).width > maxWidth && line) {
          c.fillText(line.trim(), x, y);

        } else {

        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 50 * dt;
        p.rot += p.vr * dt;
        if (p.life <= 0) game.particles.splice(i, 1);

      g = Math.min(255, Math.round(g + (255 - g) * pct));
      b = Math.min(255, Math.round(b + (255 - b) * pct));
      return "#" + ((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
    }

       For "tr"/"br": widths[0] is the rightmost; subsequent widths grow leftward.
       For "tl"/"bl": widths[0] is the leftmost; subsequent widths grow rightward.
       Each pill spaced HUD_GRID.pillGap apart. Returns array of rects, same shape as placePill. */
    function placePillStack(side, slot, widths, h) {
      var rects = [];
      if (!widths || !widths.length) return rects;
      var first = placePill(side, slot, widths[0], h);
      rects.push(first);
      for (var i = 1; i < widths.length; i++) {
        var prev = rects[i - 1];
        var x = (side === "tr" || side === "br")
          ? prev.x - HUD_GRID.pillGap - widths[i]
          : prev.x + prev.w + HUD_GRID.pillGap;
        rects.push({ x: x, y: prev.y, w: widths[i], h: prev.h });
      }
      return rects;
    }

    function drawButton(c, r, label, hovered, fill = COLORS.warmRed, textColor = "#fff", selected = false) {
      c.save();
      const ey = selected ? r.y - 2 : r.y;
      const effFill = selected ? "#7A4E36" : fill;
      const shadowY = hovered ? 4 : 6;
      c.fillStyle = "rgba(92,68,52,0.18)";
      rr(c, r.x, ey + shadowY, r.w, r.h, 18);
      c.fill();
      if (hovered && !selected) {
        drawGlowCircle(c, r.x + r.w / 2, ey + r.h / 2, Math.max(r.w, r.h) * 0.95, "rgba(255,215,0,ALPHA)", 0.18);
      }
      const grad = c.createLinearGradient(r.x, ey, r.x, ey + r.h);
      if (selected) {
        grad.addColorStop(0, lightenColor(effFill, 0.08));
        grad.addColorStop(1, effFill);
      } else {
        grad.addColorStop(0, hovered ? lightenColor(effFill, 0.2) : effFill);
        grad.addColorStop(1, hovered ? effFill : darkenColor(effFill, 0.1));
      }
      c.fillStyle = grad;
      rr(c, r.x, ey, r.w, r.h, 18);
      c.fill();
      if (selected) {
        c.strokeStyle = "rgba(255,248,240,0.85)";
        c.lineWidth = 3;
        rr(c, r.x - 2, ey - 2, r.w + 4, r.h + 4, 20);
        c.stroke();
      } else {
        c.strokeStyle = "rgba(255,255,255,0.65)";
        c.lineWidth = 2;
        c.stroke();
        c.fillStyle = "rgba(255,255,255,0.14)";
        rr(c, r.x + 4, ey + 4, r.w - 8, r.h * 0.4, 14);
        c.fill();
      }
      c.fillStyle = textColor;
      c.font = '20px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
      c.textAlign = "center";
      c.textBaseline = "middle";
      c.fillText(label, r.x + r.w / 2, ey + r.h / 2 + 1);
      c.restore();
    }

    /* drawPanelFrame (Phase A.3) — unified scrim + cream rounded card + optional title.
       opts: { x, y, w, h, title?, radius?=28 }
       Replaces hand-coded panel frames in HangoutScene (decor/wardrobe/scrapbook/menu) and
       BackyardScene (decor) once those panels migrate in B.3 / D.1 / D.3 / D.5. */
    function drawPanelFrame(c, opts) {
      var radius = (opts.radius != null) ? opts.radius : 28;
      c.save();
      c.fillStyle = "rgba(40,28,18,0.55)";
      c.fillRect(0, 0, W, H);
      rr(c, opts.x, opts.y, opts.w, opts.h, radius);
      c.fillStyle = "rgba(255,248,240,0.97)";
      c.fill();
      c.strokeStyle = "rgba(146,104,72,0.2)";
      c.lineWidth = 3;
      c.stroke();
      if (opts.title) {
        c.fillStyle = "#7A4E36";
        c.textAlign = "center";
        c.textBaseline = "alphabetic";
        c.font = '28px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.fillText(opts.title, opts.x + opts.w / 2, opts.y + 40);
      }
      c.restore();
    }

    /* drawPanelTabs (Phase A.4) — segmented pill row anchored to panel.x+24, panel.y+60.
       tabs: [{key, label?}] — equal-width tabs filling (panel.w - 48) with 6px gaps.
       Returns [{key, rect}] for hit-testing; pair with panelTabHit() in click handlers. */
    function drawPanelTabs(c, panel, tabs, activeKey) {
      var rects = [];
      if (!tabs || !tabs.length) return rects;
      var startX = panel.x + 24;
      var y = panel.y + 60;
      var h = 26;
      var gap = 6;
      var avail = panel.w - 48;
      var w = Math.floor((avail - gap * (tabs.length - 1)) / tabs.length);
      c.save();
      for (var i = 0; i < tabs.length; i++) {
        var t = tabs[i];
        var rect = { x: startX + i * (w + gap), y: y, w: w, h: h };
        var active = (t.key === activeKey);
        rr(c, rect.x, rect.y, rect.w, rect.h, 10);
        c.fillStyle = active ? "#A05A3C" : "rgba(122,78,54,0.08)";
        c.fill();
        if (!active) {
          c.strokeStyle = "rgba(146,104,72,0.18)";
          c.lineWidth = 1;
          c.stroke();
        }
        c.fillStyle = active ? "#FFF8F0" : "#7A4E36";
        c.textAlign = "center";
        c.textBaseline = "middle";
        c.font = '13px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.fillText(t.label || t.key, rect.x + rect.w / 2, rect.y + rect.h / 2 + 1);
        rects.push({ key: t.key, rect: rect });
      }
      c.restore();
      return rects;
    }

    function panelTabHit(panel, tabs, x, y) {
      if (!tabs || !tabs.length) return null;
      var startX = panel.x + 24;
      var ty = panel.y + 60;
      var h = 26;
      var gap = 6;
      var avail = panel.w - 48;
      var w = Math.floor((avail - gap * (tabs.length - 1)) / tabs.length);
      if (y < ty || y > ty + h) return null;
      for (var i = 0; i < tabs.length; i++) {
        var rx = startX + i * (w + gap);
        if (x >= rx && x <= rx + w) return tabs[i].key;
      }
      return null;
    }

    /* drawPanelClose (Phase A.3) — unified close-button circle anchored to a panel.
       Center at (panel.x + panel.w - 22, panel.y + 22). Reads hovered to swell + tint.
       Returns the hit circle {cx, cy, r} so the click handler can read the same source. */
    function drawPanelClose(c, panel, hovered) {
      var cx = panel.x + panel.w - 22;
      var cy = panel.y + 22;
      var r = hovered ? 18 : 16;
      c.save();
      if (hovered) drawGlowCircle(c, cx, cy, 24, "rgba(180,80,60,ALPHA)", 0.2);
      c.fillStyle = hovered ? "rgba(200,70,50,0.95)" : "rgba(140,100,70,0.55)";
      c.beginPath(); c.arc(cx, cy, r, 0, Math.PI * 2); c.fill();
      c.strokeStyle = "#FFF8F0";
      c.lineWidth = hovered ? 3 : 2.5;
      c.beginPath(); c.moveTo(cx - 6, cy - 6); c.lineTo(cx + 6, cy + 6); c.stroke();
      c.beginPath(); c.moveTo(cx + 6, cy - 6); c.lineTo(cx - 6, cy + 6); c.stroke();
      c.restore();
      return { cx: cx, cy: cy, r: r };
    }

    /* Phase B.3 — standard hangout/backyard panel frame. All current panels
       (decor, wardrobe, scrapbook, backyard decor) share this rect.
       Future divergent panels can register their own frame in panelClose. */
    const PANEL_STD = { x: 100, y: 70, w: 600, h: 480 };
    /* V9 — settings panel uses the standard panel frame */
    const SETTINGS_PANEL = { x: 130, y: 90, w: 540, h: 420 };
    /* Phase D.1 — Game Menu uses a wider/taller frame to fit 6 cards × 720 wide. */
    const MENU_PANEL = { x: 40, y: 60, w: 720, h: 540 };
    /* Phase D.3 — Wardrobe panel matches Game Menu width but is shorter. */
    const WARDROBE_PANEL = { x: 40, y: 60, w: 720, h: 520 };
    const WARDROBE_TABS = [
      { key: "obi", label: "Obi" },
      { key: "luna", label: "Luna" },
      { key: "annie", label: "Annie" }
    ];
    /* Phase D.5 — Scrapbook panel; panel.y = 50 so drawPanelTabs (panel.y+60)
       lands at the original tab row y=110, preserving all content offsets. */
    const SCRAPBOOK_PANEL = { x: 40, y: 50, w: 720, h: 530 };
    const SCRAPBOOK_TABS = [
      { key: "photos", label: "Photos" },
      { key: "milestones", label: "Milestones" },
      { key: "stats", label: "Stats" },
      { key: "goals", label: "Goals" },
      { key: "tasks", label: "Tasks" }
    ];

    /* drawLockChip (Phase B.5) — small chip top-right of a card rect indicating
       why a card is gated. kind ∈ {"stars","coins","achievement","season","streak"}.
       value: required value for the gate. current?: optional progress (used for stars). */
    function drawLockChip(c, rect, kind, value, current) {
      var fillColor, textColor, label, dotColor;
      if (kind === "stars") {
        label = (current != null ? current : 0) + " / " + value;
        fillColor = "rgba(255,215,0,0.18)"; textColor = "#8A6045"; dotColor = "#E8A020";
      } else if (kind === "coins") {
        label = String(value);
        fillColor = "rgba(255,200,80,0.22)"; textColor = "#8A6045"; dotColor = "#E8A020";
      } else if (kind === "achievement") {
        var aLabel = String(value);
        if (aLabel.length > 12) aLabel = aLabel.slice(0, 12);
        label = aLabel;
        fillColor = "rgba(180,130,200,0.18)"; textColor = "#6B3F8C"; dotColor = "#9B7DBD";
      } else if (kind === "streak") {
        label = value + "d";
        fillColor = "rgba(255,107,53,0.20)"; textColor = "#A0501C"; dotColor = "#FF6B35";
      } else if (kind === "season") {
        label = String(value).charAt(0).toUpperCase() + String(value).slice(1);
        fillColor = "rgba(125,179,108,0.22)"; textColor = "#5C8A4A"; dotColor = "#7DB36C";
      } else {
        return;
      }
      c.save();
      c.font = '11px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
      var textW = c.measureText(label).width;
      var iconW = 14;
      var pad = 8;
      var chipW = Math.ceil(textW + iconW + pad * 2);
      var chipH = 22;
      var x = rect.x + rect.w - chipW - 8;
      var y = rect.y + 8;
      rr(c, x, y, chipW, chipH, 11);
      c.fillStyle = fillColor;
      c.fill();
      c.strokeStyle = "rgba(146,104,72,0.25)";
      c.lineWidth = 1;
      c.stroke();
      // Icon
      var ix = x + pad;
      var iy = y + chipH / 2;
      if (kind === "stars") {
        drawStar(c, ix + 5, iy, 5, dotColor);
      } else {
        c.fillStyle = dotColor;
        c.beginPath(); c.arc(ix + 5, iy, kind === "streak" ? 4 : 5, 0, Math.PI * 2); c.fill();
      }
      // Label
      c.fillStyle = textColor;
      c.textAlign = "left";
      c.textBaseline = "middle";
      c.fillText(label, x + pad + iconW, y + chipH / 2 + 1);
      c.restore();
    }

    /* panelClose (Phase B.3) — hit rect for the close button of a named panel.
       Argument can be either a panel-key string (defaults to PANEL_STD) or a
       panel rect {x,y,w,h}. Mirrors the geometry drawPanelClose uses for
       rendering, so the click handler and renderer always agree. */
    function panelClose(panelOrKey) {
      var p = (typeof panelOrKey === "string" || panelOrKey == null) ? PANEL_STD : panelOrKey;
      var cx = p.x + p.w - 22;
      var cy = p.y + 22;
      return { x: cx - 18, y: cy - 18, w: 36, h: 36 };
    }

    /* drawKeyGlyph (Phase A.5) — small rounded "key cap" used inside intro modal meta lines
       (e.g. ← / → for Cuddle Pile, "Esc" for the universal back-out hint). */
    function drawKeyGlyph(c, x, y, char, w, h) {
      if (w == null) w = 22;
      if (h == null) h = 20;
      c.save();
      rr(c, x - w / 2, y - h / 2, w, h, 4);
      c.fillStyle = "rgba(255,248,240,0.95)";
      c.fill();
      c.strokeStyle = "rgba(92,68,52,0.45)";
      c.lineWidth = 1.5;
      c.stroke();
      c.fillStyle = "#5C4434";
      c.textAlign = "center";
      c.textBaseline = "middle";
      c.font = 'bold 13px ' + HUD_MONO;
      c.fillText(char, x, y + 1);
      c.restore();
    }

    /* drawIntroModal (Phase A.5) — unified minigame intro modal.
       opts: { eyebrow?, title, body, iconFn?(c,x,y), challengeText?, bonusText?, metaText? }
       Drop-in replacement for BaseMinigameScene.drawInstructionCard once G.1 wires
       the canary (Bath Time) and then the batch. Card position (145,150,510,260)
       and INTRO_SCRIM match the existing drawInstructionCard so visual diff is 0
       for the title + body region. */
    function drawIntroModal(c, opts) {
      c.save();
      c.fillStyle = INTRO_SCRIM;
      c.fillRect(0, 0, W, H);
      rr(c, 145, 150, 510, 260, 24);
      c.fillStyle = "rgba(255,248,240,0.97)";
      c.fill();
      c.strokeStyle = "rgba(92,68,52,0.18)";
      c.lineWidth = 2;
      c.stroke();
      // eyebrow: small grey caps with letter-spacing (e.g. "TIER 2  ·  60s")
      if (opts.eyebrow) {
        c.fillStyle = "#A89684";
        c.textAlign = "center";
        c.textBaseline = "alphabetic";
        if ("letterSpacing" in c) c.letterSpacing = "0.18em";
        c.font = '11px ' + HUD_MONO;
        c.fillText(String(opts.eyebrow).toUpperCase(), W / 2, 178);
        if ("letterSpacing" in c) c.letterSpacing = "0px";
      }
      // title (display)
      c.fillStyle = "#7A4E36";
      c.textAlign = "center";
      c.textBaseline = "alphabetic";
      c.font = '32px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
      c.fillText(opts.title || "", W / 2, opts.eyebrow ? 214 : 198);
      // body (one sentence — wrap allowed but copy should be ≤ 8 words)
      c.font = '20px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
      wrapText(c, opts.body || "", W / 2, 252, 410, 30);
      // icon callback (same signature as drawInstructionCard)
      if (opts.iconFn) opts.iconFn(c, W / 2, 320);
      var nextY = 350;
      if (opts.challengeText) {
        c.fillStyle = "#FFA500";
        c.font = '16px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.fillText("★ CHALLENGE: " + opts.challengeText + " ★", W / 2, nextY);
        nextY += 20;
      }
      if (opts.bonusText) {
        c.fillStyle = "#7DB36C";
        c.font = '13px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.fillText(opts.bonusText, W / 2, nextY);
        nextY += 18;
      }
      // meta line (single thin sentence bottom)
      var meta = (opts.metaText != null) ? opts.metaText : "Tap to start  ·  Esc to cuddle instead";
      c.fillStyle = "#A06B4F";
      c.font = '15px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
      c.fillText(meta, W / 2, nextY + 8);
      c.restore();
    }

    /* drawCharacterUnderModal (Phase A.7) — framing transform applied during the
       intro `instructions` phase so characters drawn at normal hangout y-coords
       compose neatly below the modal frame (y=150-410).
       Scales 0.85 around canvas center, then shifts +60 down. Caller is responsible
       for c.save() / c.restore() around this and the character draws. Not yet called
       from any scene — wired in G.1+ as part of per-minigame intro polish. */
    function drawCharacterUnderModal(c) {
      c.translate(W / 2, H / 2 + 60);
      c.scale(0.85, 0.85);
      c.translate(-W / 2, -H / 2);
    }

    function drawTooltip(c, x, y, title, body, alpha = 1) {
      c.save();
      c.globalAlpha = alpha;
      /* dynamic sizing */
      c.font = '18px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
      var titleW = c.measureText(title).width;
      c.font = '13px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
      var bodyW = body ? c.measureText(body).width : 0;
      var w = Math.max(Math.max(titleW, bodyW) + 40, 120);
      var h = Math.max(30 + (body ? 18 : 0) + 16, 50);
      /* clamp box to canvas */
      var clampedX = clamp(x, w / 2 + 10, 800 - w / 2 - 10);
      var boxLeft = clampedX - w / 2;
      /* auto-flip: render below anchor if box would clip top of canvas */
      var flipBelow = (y - h) < 4;
      var pointerGap = 12;
      var boxTop = flipBelow ? y + pointerGap : y - h;
      /* shadow */
      c.fillStyle = "rgba(60,40,25,0.15)";
      rr(c, boxLeft + 3, boxTop + 3, w, h, 14);
      c.fill();
      /* main box */
      rr(c, boxLeft, boxTop, w, h, 14);
      c.fillStyle = "rgba(82,58,42,0.94)";
      c.fill();
      /* top highlight */
      c.fillStyle = "rgba(255,255,255,0.06)";
      rr(c, boxLeft + 4, boxTop + 4, w - 8, h * 0.35, 12);
      c.fill();
      /* text */
      c.fillStyle = "#FFF8F0";
      c.textAlign = "center";
      c.font = '18px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
      c.fillText(title, clampedX, boxTop + 24);
      c.font = '13px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
      c.fillStyle = "rgba(255,248,240,0.85)";
      wrapText(c, body, clampedX, boxTop + 44, w - 30, 16);
      /* pointer — always points at original anchor, clamped to box bounds */
      var pointerX = clamp(x, boxLeft + 14, boxLeft + w - 14);
      c.fillStyle = "rgba(82,58,42,0.94)";
      c.beginPath();
      if (flipBelow) {
        c.moveTo(pointerX - 8, y + pointerGap);
        c.quadraticCurveTo(pointerX, y, pointerX + 8, y + pointerGap);
      } else {
        c.moveTo(pointerX - 8, y);
        c.quadraticCurveTo(pointerX, y + 12, pointerX + 8, y);
      }
      c.closePath();
      c.fill();
      c.restore();
    }

    function drawSpeakerIcon(c, x, y, muted, hovered) {
      c.save();
      drawHudChip(c, x, y, hovered);
      c.translate(x + 14, y + 14);
      c.strokeStyle = "#3A2A1E";
      c.lineWidth = 2;
      c.beginPath();
      c.moveTo(-6, -4);
      c.lineTo(-2, -4);
      c.lineTo(4, -10);
      c.lineTo(4, 10);
      c.lineTo(-2, 4);
      c.lineTo(-6, 4);
      c.stroke();
      if (!muted) {
        c.beginPath();
        c.arc(5, 0, 5, -0.7, 0.7);
        c.stroke();
        c.beginPath();
        c.arc(5, 0, 9, -0.8, 0.8);
        c.stroke();
      } else {
        c.strokeStyle = "#B86A58";
        c.beginPath();
        c.moveTo(7, -7);
        c.lineTo(13, 7);
        c.moveTo(13, -7);
        c.lineTo(7, 7);
        c.stroke();
      }
      c.restore();
    }

    function drawBadgeIcon(c, icon, x, y, color) {
      c.save();
      c.translate(x, y);
      c.fillStyle = color;
      c.strokeStyle = "#fff";
      c.lineWidth = 1.5;
      if (icon === "bone") {
        drawBone(c, 0, 0, 18, 10, color);
      } else if (icon === "star") {
        drawStar(c, 0, 0, 8, color);
      } else if (icon === "catEye") {
        c.beginPath();
        c.ellipse(0, 0, 10, 6, 0, 0, Math.PI * 2);
        c.fill();
        c.stroke();
        c.strokeStyle = "#2E7D32";
        c.beginPath();
        c.moveTo(0, -4);
        c.lineTo(0, 4);
        c.stroke();
      } else if (icon === "paw") {
        c.beginPath();
        c.arc(0, 2, 6, 0, Math.PI * 2);
        c.fill();
        [-6, -1, 4, 9].forEach((dx) => {
          c.beginPath();
          c.arc(dx, -7, 3, 0, Math.PI * 2);
          c.fill();
        });
      } else if (icon === "couch") {
        rr(c, -10, -2, 20, 8, 4);
        c.fill();
        rr(c, -13, -8, 26, 8, 5);
        c.fill();
      } else if (icon === "heart") {
        drawHeart(c, 0, 6, 0.45, color);
      }
      c.restore();
    }

    function drawWaterDrop(c, x, y, s, color) {
      c.save();
      c.translate(x, y);
      c.scale(s, s);
      c.fillStyle = color || "#6CB4EE";
      c.beginPath();
      c.moveTo(0, -6);
      c.quadraticCurveTo(5, 0, 4, 4);
      c.quadraticCurveTo(0, 8, -4, 4);
      c.quadraticCurveTo(-5, 0, 0, -6);
      c.closePath();
      c.fill();
      c.restore();
    }

    function drawMoodIcon(c, mood, x, y) {
      if (mood === "hungry") drawBone(c, x, y, 10, 5, "#A07050");
      else if (mood === "thirsty") drawWaterDrop(c, x, y, 0.8, "#6CB4EE");
      else if (mood === "sleepy") {
        c.save();
        c.fillStyle = "#9B8EC2";
        c.font = '9px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.textAlign = "center";
        c.textBaseline = "middle";
        c.fillText("Zzz", x, y);
        c.restore();
      } else if (mood === "playful") drawStar(c, x, y, 5, COLORS.gold);
      else if (mood === "cuddly") drawHeart(c, x, y + 3, 0.22, COLORS.softPink);
    }

    function drawAchievementBanner(c, banner) {
      if (!banner) return;
      const t = clamp(banner.time / banner.maxTime, 0, 1);
      const slide = 1 - easeOutQuad(Math.min(1, (banner.maxTime - banner.time) / 0.2));
      const y = lerp(24, -84, slide);
      c.save();
      c.translate(W / 2, y);
      rr(c, -180, 0, 360, 64, 16);
      c.fillStyle = "rgba(92,68,52,0.96)";
      c.fill();
      c.strokeStyle = "rgba(255,255,255,0.4)";
      c.lineWidth = 2;
      c.stroke();
      drawStar(c, -145, 32, 12, COLORS.gold);
      c.fillStyle = COLORS.cream;
      c.textAlign = "left";
      c.font = '16px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
      c.fillText("Achievement Unlocked!", -120, 23);
      c.font = '20px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
      c.fillText(banner.name, -120, 46);
      c.restore();
    }


    // ═══ 09-sprites.js ═══
    const SPRITE_ATLAS_URI = "assets/cozy-sprites-atlas.webp";

    const SPRITE_FRAME_BOXES = {
      "annie": {
            "stand": { "x": 8, "y": 8, "w": 462, "h": 974 },

    function getAccessoryOffset(pet, key, pose) {
      var hidden = ["sleeping", "bath", "shake", "splash", "dig"];
      if (hidden.indexOf(pose) >= 0) return null;
      var slot = null;
      var list = ACCESSORIES[pet];
      for (var i = 0; i < list.length; i++) { if (list[i].key === key) { slot = list[i].slot; break; } }
      if (!slot) return null;
      /* Offsets are relative to pet anchor (feet position).
         renderSize = how wide to draw the accessory in pixels. */
      if (pet === "obi") {
        if (slot === "head") {
          var dy = -72, dx = 0, sz = 22, rot = 0;
          if (pose === "run" || pose === "side") { dy = -56; dx = 6; rot = 0.05; }
          else if (pose === "sniff") { dy = -48; dx = 10; rot = 0.15; sz = 20; }
          else if (pose === "eat" || pose === "drink") { dy = -46; dx = 8; rot = 0.12; sz = 20; }
          return { dx: dx, dy: dy, size: sz, rot: rot };
        }
        if (slot === "neck") {
          var dy = -58, dx = 2, sz = 30, rot = 0;
          if (pose === "run" || pose === "side") { dy = -42; dx = 8; rot = 0.1; }
          else if (pose === "sniff") { dy = -38; dx = 12; rot = 0.2; sz = 28; }
          else if (pose === "eat" || pose === "drink") { dy = -36; dx = 10; rot = 0.15; sz = 28; }
          else if (pose === "carryToy") { dy = -44; dx = 6; rot = 0.05; }
          return { dx: dx, dy: dy, size: sz, rot: rot };
        }
        if (slot === "body") {
          var dy = -48, dx = 0, sz = 50, rot = 0;
          if (pose === "run" || pose === "side") { dy = -36; dx = 4; }
          else if (pose === "sniff" || pose === "eat" || pose === "drink") { dy = -32; rot = 0.1; }
          return { dx: dx, dy: dy, size: sz, rot: rot };
        }
      } else if (pet === "annie") {
        /* annie */
        if (slot === "head") {
          var dy = -120, dx = 0, sz = 30, rot = 0;
          if (pose === "sit" || pose === "kneel") { dy = -108; }
          else if (pose === "walk" || pose === "walkSide") { dy = -118; dx = 4; }
          else if (pose === "cheer") { dy = -124; }
          return { dx: dx, dy: dy, size: sz, rot: rot };
        }
        if (slot === "wrist") {
          var dy = -60, dx = 20, sz = 22, rot = 0;
          if (pose === "sit") { dy = -50; dx = 18; }
          else if (pose === "kneel") { dy = -46; dx = 20; }
          else if (pose === "cheer") { dy = -70; dx = 24; }
          return { dx: dx, dy: dy, size: sz, rot: rot };
        }
        return null;
      } else {
        /* luna */
        if (slot === "head") {
          var dy = -68, dx = 0, sz = 34, rot = 0;
          if (pose === "lounge") { dy = -48; dx = 4; sz = 30; }
          else if (pose === "groom") { dy = -56; dx = -4; rot = -0.1; sz = 30; }
          else if (pose === "treeSit") { dy = -54; dx = 2; sz = 30; }
          else if (pose === "stalk") { dy = -28; dx = 8; rot = 0.15; sz = 28; }
          else if (pose === "eat" || pose === "drink") { dy = -34; dx = 8; rot = 0.2; sz = 28; }
          return { dx: dx, dy: dy, size: sz, rot: rot };
        }
        if (slot === "neck") {
          var dy = -54, dx = 0, sz = 36, rot = 0;
          if (pose === "lounge") { dy = -38; dx = 4; sz = 32; }
          else if (pose === "stalk") { dy = -22; dx = 6; rot = 0.1; sz = 30; }
          else if (pose === "eat" || pose === "drink") { dy = -28; dx = 8; rot = 0.15; sz = 30; }
          return { dx: dx, dy: dy, size: sz, rot: rot };
        }
        if (slot === "body") {
          var dy = -42, dx = 0, sz = 60, rot = 0;
          if (pose === "lounge") { dy = -30; dx = 4; sz = 55; }
          else if (pose === "stalk") { dy = -18; dx = 6; rot = 0.1; sz = 50; }
          else if (pose === "eat" || pose === "drink") { dy = -24; dx = 8; rot = 0.15; sz = 52; }
          return { dx: dx, dy: dy, size: sz, rot: rot };
        }
      }
      return null;
    }

    function drawAccessoryOverlay(c, pet, x, y, scale, pose, facing, equippedOverride) {
      var equipped = (equippedOverride !== undefined) ? equippedOverride : store.wardrobe.equipped[pet];
      if (!equipped || typeof equipped !== "object") return;
      if (!spriteArt.ready) return;
      var mainAccFrames = spriteArt.frames.accessories || {};
      var slots = Object.keys(equipped);
      for (var si = 0; si < slots.length; si++) {
        var key = equipped[slots[si]];
        if (!key) continue;
        var off = getAccessoryOffset(pet, key, pose);
        if (!off) continue;
        /* look up frame from main atlas first, then accessory atlas */
        var frame = mainAccFrames[key];
        var atlasImg = spriteArt.image;
        if (!frame && ACCESSORY_ATLAS_FRAMES[key]) {
          frame = ACCESSORY_ATLAS_FRAMES[key];
          atlasImg = spriteArt.accessoryImage;
        }
        if (!frame || !atlasImg) continue;
        var f = facing || 1;
        var ax = x + off.dx * scale * f;
        var ay = y + off.dy * scale;
        var renderW = off.size * scale;
        var aspect = frame.h / frame.w;
        var renderH = renderW * aspect;
        c.save();
        c.translate(ax, ay);
        c.rotate(off.rot * f);
        c.scale(f, 1);
        c.drawImage(atlasImg, frame.x, frame.y, frame.w, frame.h,
          -renderW / 2, -renderH / 2, renderW, renderH);
        c.restore();
      }
    }

      ag.addColorStop(1, "rgba(255,236,177,0)");
      ex.fillStyle = ag;
      ex.fillRect(0, 0, W, H);
      sceneCache.laserBase = ec;
    }


    function drawTreatBackdrop(c) {
      if (!sceneCache.treatBase) buildStaticCaches();
      c.drawImage(sceneCache.treatBase, 0, 0);
      c.save();
      c.globalAlpha = 0.24;
      c.translate((game.time * 12) % 220, 0);
      c.fillStyle = "rgba(255,255,255,0.9)";
      for (let i = -1; i < 5; i++) {
        c.beginPath();
        c.arc(i * 220 + 80, 138 + (i % 2) * 18, 24, 0, Math.PI * 2);
        c.arc(i * 220 + 104, 146 + (i % 2) * 18, 16, 0, Math.PI * 2);
        c.fill();
      }
      c.restore();
    }

    function drawLaserBackdrop(c) {
      if (!sceneCache.laserBase) buildStaticCaches();
      c.drawImage(sceneCache.laserBase, 0, 0);
      drawGlowCircle(c, 702, 100, 86, "rgba(255,236,177,ALPHA)", 0.12);
    }

    function drawAimPreview(c, sx, sy, tx, flight = 0.92) {
      c.save();
      c.fillStyle = "rgba(255,255,255,0.75)";
      for (let i = 0; i < 12; i++) {
        const t = (i + 1) / 13 * flight;
        const px = sx + ((tx - sx) / flight) * t;
        const py = sy + 30 * t + 0.5 * 640 * t * t;
        c.beginPath();
        c.arc(px, py, 3 + i * 0.08, 0, Math.PI * 2);
        c.fill();
      }
      c.restore();
    }

    function drawTitleBg(c) {
      if (!sceneCache.titleBase) buildStaticCaches();
      c.drawImage(sceneCache.titleBase, 0, 0);

      /* layered bokeh lights - slow parallax */
      c.save();
      for (let layer = 0; layer < 3; layer++) {
        const speed = 0.08 + layer * 0.06;
        const baseSize = 30 + layer * 20;
        const alpha = 0.05 - layer * 0.012;
        for (let i = 0; i < 5; i++) {
          const bx = ((game.time * speed * 40 + i * 170 + layer * 90) % (W + 100)) - 50;
          const by = 80 + i * 100 + layer * 30 + Math.sin(game.time * 0.4 + i * 1.5 + layer) * 25;
          const bs = baseSize + Math.sin(game.time * 0.6 + i * 2) * 8;
          const bg = c.createRadialGradient(bx, by, 0, bx, by, bs);
          bg.addColorStop(0, `rgba(255,220,160,${alpha + 0.02})`);
          bg.addColorStop(0.5, `rgba(255,200,140,${alpha})`);
          bg.addColorStop(1, "rgba(255,200,140,0)");
          c.fillStyle = bg;
          c.beginPath();
          c.arc(bx, by, bs, 0, Math.PI * 2);
          c.fill();
        }
      }
      c.restore();

      /* floating hearts and stars */
      for (const a of game.ambient) {
        c.save();
        c.globalAlpha = 0.28 + 0.14 * Math.sin(game.time * 1.2 + a.phase);
        c.translate(0, Math.sin(game.time * 0.8 + a.phase) * 2);
        if (a.shape === "heart") drawHeart(c, a.x, a.y, a.size / 14, a.color);
        else drawStar(c, a.x, a.y, a.size, a.color);
        c.restore();
      }

      /* warm spotlight behind character area */
      const spotG = c.createRadialGradient(400, 400, 40, 400, 400, 240);
      spotG.addColorStop(0, "rgba(255,240,210,0.12)");
      spotG.addColorStop(0.6, "rgba(255,230,200,0.05)");
      spotG.addColorStop(1, "rgba(255,230,200,0)");
      c.fillStyle = spotG;
      c.fillRect(100, 200, 600, 350);
    }

    function drawLivingRoom(c, mode = "hub") {
      if (!sceneCache.livingRoomBase) buildStaticCaches();
      c.drawImage(sceneCache.livingRoomBase, 0, 0);

      /* animated window sky — time-of-day aware */
      const tod = (store.decor.timeOfDay == null ? 1 : store.decor.timeOfDay);
      c.save();
      c.beginPath();
      rr(c, 66, 52, 120, 152, 5);
      c.clip();
      if (tod === 0) {
        const skyG = c.createLinearGradient(66, 52, 66, 204);
        skyG.addColorStop(0, "#FFB088");
        skyG.addColorStop(0.5, "#FFCDA8");
        skyG.addColorStop(1, "#FFE8C8");
        c.fillStyle = skyG;
        c.fillRect(66, 52, 120, 152);
      } else if (tod === 2) {
        const skyG = c.createLinearGradient(66, 52, 66, 204);
        skyG.addColorStop(0, "#C87848");
        skyG.addColorStop(0.4, "#D89060");
        skyG.addColorStop(1, "#A87098");
        c.fillStyle = skyG;
        c.fillRect(66, 52, 120, 152);
      } else if (tod === 3) {
        c.fillStyle = "#1A1E38";
        c.fillRect(66, 52, 120, 152);
        c.fillStyle = "#FFFFFF";
        const starPositions = [[82,68],[110,72],[140,60],[95,90],[160,80],[130,100],[75,110],[150,95],[108,118],[170,65]];
        for (const [sx,sy] of starPositions) {
          c.globalAlpha = 0.4 + Math.sin(game.time * 1.5 + sx * 0.1) * 0.3;
          c.beginPath(); c.arc(sx, sy, 1.2, 0, Math.PI * 2); c.fill();
        }
        c.globalAlpha = 1;
        c.fillStyle = "#E8E4D8";
        c.beginPath(); c.arc(155, 72, 12, 0, Math.PI * 2); c.fill();
        c.fillStyle = "#1A1E38";
        c.beginPath(); c.arc(160, 68, 10, 0, Math.PI * 2); c.fill();
      } else {
        const skyShift = Math.sin(game.time * 0.05) * 0.08;
        const skyG = c.createLinearGradient(66, 52, 66, 204);
        skyG.addColorStop(0, `rgba(${135 + skyShift * 40},${206 + skyShift * 20},${235},1)`);
        skyG.addColorStop(1, `rgba(${200 + skyShift * 30},${230 + skyShift * 10},255,1)`);
        c.fillStyle = skyG;
        c.fillRect(66, 52, 120, 152);
        c.fillStyle = "rgba(255,255,255,0.7)";
        for (let i = 0; i < 3; i++) {
          const cx = 66 + ((game.time * (6 + i * 2) + i * 55) % 160) - 20;
          const cy = 68 + i * 40 + Math.sin(game.time * 0.3 + i * 2) * 4;
          c.beginPath();
          c.ellipse(cx, cy, 18 + i * 4, 8 + i * 2, 0, 0, Math.PI * 2);
          c.fill();
          c.beginPath();
          c.ellipse(cx + 12, cy + 2, 12 + i * 2, 6 + i, 0, 0, Math.PI * 2);
          c.fill();
        }
      }
      /* weather tint overlay on window */
      var wd = getWeatherData();
      if (wd.windowTint) {
        c.fillStyle = wd.windowTint;
        c.fillRect(66, 52, 120, 152);
      }
      c.restore();

      /* warm light rays from window */
      c.save();
      c.globalAlpha = 0.04 + 0.015 * Math.sin(game.time * 0.8);
      c.fillStyle = "rgba(255,240,180,1)";
      c.beginPath();
      c.moveTo(66, 52);
      c.lineTo(190, 52);
      c.lineTo(380, 480);
      c.lineTo(120, 480);
      c.closePath();
      c.fill();
      /* secondary softer ray */
      c.globalAlpha = 0.025 + 0.01 * Math.sin(game.time * 0.6 + 1);
      c.beginPath();
      c.moveTo(100, 80);
      c.lineTo(170, 80);
      c.lineTo(320, 470);
      c.lineTo(200, 470);
      c.closePath();
      c.fill();
      c.restore();

      /* time-of-day room lighting overlay */
      if (tod === 0) {
        c.save(); c.globalAlpha = 0.06;
        c.fillStyle = "#FFE0A0"; c.fillRect(0, 0, W, H);
        c.restore();
      } else if (tod === 2) {
        c.save(); c.globalAlpha = 0.08;
        c.fillStyle = "#E8A050"; c.fillRect(0, 0, W, H);
        c.restore();
      } else if (tod === 3) {
        c.save(); c.globalAlpha = 0.38;
        c.fillStyle = "#141828"; c.fillRect(0, 0, W, H);
        c.restore();
        if (store.decor.lampOn !== false) {
          drawGlowCircle(c, 216, 160, 200, "rgba(255,220,140,ALPHA)", 0.25);
        }
      }

      /* seasonal window effects */
      var seasonNow = getCurrentSeason();
      if (seasonNow === "winter") {
        c.save(); c.globalAlpha = 0.12;
        var frostGrad = c.createRadialGradient(126, 130, 30, 126, 130, 90);
        frostGrad.addColorStop(0, "rgba(200,220,240,0)");
        frostGrad.addColorStop(1, "rgba(200,220,240,1)");
        c.fillStyle = frostGrad;
        c.fillRect(62, 48, 128, 160);
        c.restore();
      }
      if (seasonNow === "spring") {
        c.save(); c.globalAlpha = 0.04;
        c.fillStyle = "#FFE0F0";
        c.fillRect(0, 0, W, H);
        c.restore();
      }

      /* animated lamp glow - conditional on lamp state + time-of-day */
      const lampOn = store.decor.lampOn !== false;
      const todMult = tod === 3 ? 1.6 : tod === 2 ? 1.3 : tod === 0 ? 0.7 : 1.0;
      const lampFlicker = (0.08 + 0.025 * Math.sin(game.time * 1.2) + 0.01 * Math.sin(game.time * 4.7) + 0.005 * Math.sin(game.time * 11.3)) * todMult;
      const lampAlpha = lampOn ? lampFlicker : lampFlicker * 0.05;
      const glowColors = [
        ["rgba(255,232,160,ALPHA)", "rgba(255,220,140,ALPHA)"],
        ["rgba(255,210,230,ALPHA)", "rgba(255,200,220,ALPHA)"],
        ["rgba(255,200,140,ALPHA)", "rgba(255,190,120,ALPHA)"],
        ["rgba(200,215,255,ALPHA)", "rgba(190,205,245,ALPHA)"],
        ["rgba(255,225,170,ALPHA)", "rgba(245,215,155,ALPHA)"]
      ][store.decor.roomPreset || 0] || ["rgba(255,232,160,ALPHA)", "rgba(255,220,140,ALPHA)"];
      drawGlowCircle(c, 216, 146, 96, glowColors[0], lampAlpha);
      drawGlowCircle(c, 216, 160, 50, glowColors[1], lampAlpha * 0.6);
      if (!lampOn) {
        c.save();
        c.globalAlpha = 0.35;
        c.fillStyle = "#000";
        c.beginPath();
        c.ellipse(216, 160, 20, 30, 0, 0, Math.PI * 2);
        c.fill();
        c.globalAlpha = 0.06;
        c.fillRect(0, 0, W / 2, H);
        c.restore();
      }

      /* steam from mug on side table */
      c.save();
      c.globalAlpha = 0.18;
      for (let i = 0; i < 3; i++) {
        const st = (game.time * 0.6 + i * 1.2) % 3.6;
        const sy = 314 - st * 14;
        const sx = 246 + Math.sin(game.time * 1.5 + i * 2.1) * 4;
        const sa = clamp(1 - st / 3.6, 0, 1) * (st > 0.2 ? 1 : st / 0.2);
        c.globalAlpha = sa * 0.15;
        c.fillStyle = "rgba(255,255,255,0.9)";
        c.beginPath();
        c.ellipse(sx, sy, 3 + st * 1.5, 2 + st, 0, 0, Math.PI * 2);
        c.fill();
      }
      c.restore();

      /* dust motes floating in light rays */
      if (mode === "hub") {
        c.save();
        for (let i = 0; i < 8; i++) {
          const mt = (game.time * 0.15 + i * 1.7) % 6;
          const mx = 100 + i * 30 + Math.sin(game.time * 0.3 + i * 0.9) * 20;
          const my = 120 + mt * 60 + Math.sin(game.time * 0.5 + i * 1.3) * 8;
          if (my > 460) continue;
          /* only show motes in the light ray area */
          const inRay = mx > 80 && mx < 340 && my > 80;
          if (!inRay) continue;
          const mAlpha = 0.25 + 0.15 * Math.sin(game.time * 2 + i * 0.7);
          c.globalAlpha = mAlpha * clamp(1 - (my - 380) / 80, 0.2, 1);
          c.fillStyle = "#FFF8E0";
          c.beginPath();
          c.arc(mx, my, 1.5 + Math.sin(game.time + i) * 0.5, 0, Math.PI * 2);
          c.fill();
        }
        c.restore();
      }

      /* dynamic decorations */
      const d = store.decor;
      if (d.fairyLights) {
        c.save();
        /* string with natural sag */
        c.strokeStyle = "rgba(180,160,110,0.55)";
        c.lineWidth = 1.5;
        c.beginPath();
        c.moveTo(50, 228);
        for (let i = 1; i < 16; i++) {
          const px = 50 + i * 47;
          const py = 224 + Math.sin(i * 0.8) * 7 + Math.sin(i * 0.3) * 3;
          c.lineTo(px, py);
        }
        c.stroke();
        /* bulbs with glow */
        for (let i = 0; i < 16; i++) {
          const lx = 50 + i * 47;
          const ly = 224 + Math.sin(i * 0.8) * 7 + Math.sin(i * 0.3) * 3;
          const bulbColor = ["#FFD700","#FF8FAA","#87CEEB","#A8D870","#FFB347"][i % 5];
          const pulse = Math.sin(game.time * 2.5 + i * 1.1);
          /* outer glow */
          c.globalAlpha = 0.25 + pulse * 0.12;
          c.fillStyle = bulbColor;
          c.beginPath(); c.arc(lx, ly + 5, 14, 0, Math.PI * 2); c.fill();
          /* bulb body */
          c.globalAlpha = 0.85 + pulse * 0.15;
          c.beginPath(); c.arc(lx, ly + 5, 5.5, 0, Math.PI * 2); c.fill();
          /* highlight */
          c.globalAlpha = 0.5 + pulse * 0.2;
          c.fillStyle = "rgba(255,255,255,0.7)";
          c.beginPath(); c.arc(lx - 1, ly + 3, 1.5, 0, Math.PI * 2); c.fill();
        }
        c.restore();
      }
      if (d.plant2) {
        c.save();
        c.translate(236, 324);
        /* pot shadow */
        c.fillStyle = "rgba(0,0,0,0.06)";
        c.beginPath(); c.ellipse(0, 14, 14, 4, 0, 0, Math.PI * 2); c.fill();
        /* pot body */
        c.fillStyle = "#A07050";
        rr(c, -10, 0, 20, 14, 4);
        c.fill();
        /* pot rim */
        c.fillStyle = "#B08060";
        rr(c, -12, -2, 24, 5, 3);
        c.fill();
        /* foliage layers */
        c.fillStyle = "#4A9848";
        c.beginPath(); c.ellipse(0, -8, 15, 15, 0, 0, Math.PI * 2); c.fill();
        c.fillStyle = "#5EAA56";
        c.beginPath(); c.ellipse(-5, -14, 11, 11, -0.3, 0, Math.PI * 2); c.fill();
        c.fillStyle = "#6CBC64";
        c.beginPath(); c.ellipse(5, -12, 9, 9, 0.2, 0, Math.PI * 2); c.fill();
        /* flowers */
        c.fillStyle = "#FF8090";
        c.beginPath(); c.arc(4, -20, 4.5, 0, Math.PI * 2); c.fill();
        c.beginPath(); c.arc(-9, -13, 3.5, 0, Math.PI * 2); c.fill();
        c.beginPath(); c.arc(8, -10, 3, 0, Math.PI * 2); c.fill();
        /* flower centers */
        c.fillStyle = "#FFD080";
        c.beginPath(); c.arc(4, -20, 1.5, 0, Math.PI * 2); c.fill();
        c.beginPath(); c.arc(-9, -13, 1.2, 0, Math.PI * 2); c.fill();
        c.restore();
      }
      if (d.petBed) {
        c.save();
        c.translate(520, 466);
        /* shadow */
        c.fillStyle = "rgba(0,0,0,0.10)";
        c.beginPath(); c.ellipse(0, 12, 46, 12, 0, 0, Math.PI * 2); c.fill();
        /* sofa back */
        c.fillStyle = "#9C6B6B";
        rr(c, -40, -18, 80, 14, 6); c.fill();
        /* sofa arms */
        c.fillStyle = "#A87878";
        rr(c, -44, -14, 12, 24, 5); c.fill();
        rr(c, 32, -14, 12, 24, 5); c.fill();
        /* sofa seat cushion */
        c.fillStyle = "#D4A0A0";
        rr(c, -36, -4, 72, 16, 8); c.fill();
        /* cushion gradient */
        var bedGrad = c.createLinearGradient(0, -4, 0, 12);
        bedGrad.addColorStop(0, "rgba(255,255,255,0.2)");
        bedGrad.addColorStop(1, "rgba(0,0,0,0.05)");
        c.fillStyle = bedGrad;
        rr(c, -36, -4, 72, 16, 8); c.fill();
        /* pillow */
        c.fillStyle = "#E8C0B8";
        c.beginPath(); c.ellipse(-16, 0, 14, 8, -0.1, 0, 0, Math.PI * 2); c.fill();
        c.beginPath(); c.ellipse(16, 0, 14, 8, 0.1, 0, 0, Math.PI * 2); c.fill();
        /* highlight */
        c.fillStyle = "rgba(255,255,255,0.2)";
        rr(c, -32, -3, 30, 6, 4); c.fill();
        /* sofa border */
        c.strokeStyle = "rgba(120,70,70,0.2)";
        c.lineWidth = 1;
        rr(c, -44, -18, 88, 30, 6); c.stroke();
        c.restore();
      }
      /* cozy blanket on couch back */
      if (d.cozyBlanket) {
        c.save();
        c.translate(400, 268);
        c.fillStyle = "#C4A088";
        c.beginPath();
        c.moveTo(-60, -4);
        c.quadraticCurveTo(-40, 8, -20, 2);
        c.quadraticCurveTo(0, -4, 20, 2);
        c.quadraticCurveTo(40, 8, 60, -2);
        c.lineTo(55, 24);
        c.quadraticCurveTo(30, 30, 0, 26);
        c.quadraticCurveTo(-30, 30, -55, 24);
        c.closePath();
        c.fill();
        c.strokeStyle = "rgba(160,120,90,0.3)";
        c.lineWidth = 1;
        c.stroke();
        c.fillStyle = "rgba(255,255,255,0.12)";
        c.beginPath();
        c.moveTo(-40, 0); c.quadraticCurveTo(-10, -4, 20, 2); c.lineTo(15, 14); c.quadraticCurveTo(-10, 10, -40, 14); c.closePath();
        c.fill();
        c.restore();
      }
      /* window herbs */
      if (d.windowPlant) {
        const herbX = [72, 110, 148];
        for (let hi = 0; hi < 3; hi++) {
          c.save();
          c.translate(herbX[hi], 196);
          c.fillStyle = "#906840";
          rr(c, -6, -2, 12, 8, 3); c.fill();
          c.fillStyle = "#4A9848";
          c.beginPath(); c.ellipse(0, -8, 7, 8, 0, 0, Math.PI * 2); c.fill();
          c.fillStyle = "#5EAA56";
          c.beginPath(); c.ellipse(-3, -12, 4, 5, -0.3, 0, Math.PI * 2); c.fill();
          c.beginPath(); c.ellipse(3, -11, 4, 5, 0.3, 0, Math.PI * 2); c.fill();
          c.restore();
        }
      }
      /* photo wall */
      if (d.photoWall) {
        const frameY = [100, 140, 170];
        for (let fi = 0; fi < 3; fi++) {
          c.save();
          c.translate(548, frameY[fi]);
          /* V6 — drop shadow under frame */
          c.fillStyle = "rgba(60,40,25,0.22)";
          rr(c, -14, -9, 32, 24, 2); c.fill();
          c.fillStyle = "#8B7355";
          rr(c, -16, -12, 32, 24, 2); c.fill();
          /* V6 — top edge cream highlight */
          c.fillStyle = "rgba(255,248,240,0.4)";
          c.fillRect(-15, -12, 30, 1);
          c.fillStyle = "#FFF8E8";
          rr(c, -13, -9, 26, 18, 1); c.fill();
          c.fillStyle = "rgba(180,150,120,0.3)";
          c.beginPath(); c.arc(-2, 0, 5, 0, Math.PI * 2); c.fill();
          c.restore();
        }
      }
      /* ── Phase 4 decorations ── */
      if (d.floorCushion) {
        c.fillStyle = "#E8A898";
        c.beginPath(); c.ellipse(340, 488, 22, 10, 0.1, 0, Math.PI * 2); c.fill();
        c.fillStyle = "rgba(255,255,255,0.2)";
        c.beginPath(); c.ellipse(336, 486, 8, 4, 0, 0, Math.PI * 2); c.fill();
      }
      if (d.corkBoard) {
        /* V6 — drop shadow */
        c.fillStyle = "rgba(60,40,25,0.22)";
        rr(c, 474, 113, 52, 42, 3); c.fill();
        c.fillStyle = "#B89060";
        rr(c, 472, 110, 52, 42, 3); c.fill();
        /* V6 — top edge highlight */
        c.fillStyle = "rgba(255,248,240,0.32)";
        c.fillRect(473, 110, 50, 1);
        c.fillStyle = "#D4A870";
        rr(c, 475, 113, 46, 36, 2); c.fill();
        /* pins */
        c.fillStyle = "#D04040"; c.beginPath(); c.arc(485, 122, 2.5, 0, Math.PI * 2); c.fill();
        c.fillStyle = "#4090D0"; c.beginPath(); c.arc(500, 130, 2.5, 0, Math.PI * 2); c.fill();
        c.fillStyle = "#40B040"; c.beginPath(); c.arc(510, 120, 2.5, 0, Math.PI * 2); c.fill();
        /* notes */
        c.fillStyle = "#FFFAC0"; rr(c, 481, 125, 14, 16, 1); c.fill();
        c.fillStyle = "#C0E8FF"; rr(c, 498, 133, 16, 12, 1); c.fill();
      }
      if (d.bookStack) {
        var bkColors = ["#8B4040", "#40608B", "#6B8B40", "#8B6B40"];
        for (var bi = 0; bi < 4; bi++) {
          c.fillStyle = bkColors[bi];
          rr(c, 236, 360 - bi * 8, 28, 7, 2); c.fill();
        }
      }
      if (d.hangingPlant) {
        /* macrame hanger from ceiling */
        c.strokeStyle = "#C8B8A0"; c.lineWidth = 1.5;
        c.beginPath(); c.moveTo(560, 0); c.lineTo(560, 60); c.stroke();
        c.beginPath(); c.moveTo(555, 50); c.quadraticCurveTo(560, 65, 565, 50); c.stroke();
        c.fillStyle = "#6B8B40";
        c.beginPath(); c.arc(560, 54, 12, 0, Math.PI * 2); c.fill();
        c.fillStyle = "#8BAB50";
        c.beginPath(); c.arc(556, 48, 6, 0, Math.PI * 2); c.fill();
        c.beginPath(); c.arc(565, 50, 5, 0, Math.PI * 2); c.fill();
      }
      if (d.candles) {
        /* 3 candles on side table — animated glow handled by time */
        for (var ci = 0; ci < 3; ci++) {
          var cx = 240 + ci * 12;
          c.fillStyle = "#FFF0D0"; rr(c, cx - 3, 320, 6, 14, 2); c.fill();
          c.fillStyle = "#FF9020";
          var flicker = Math.sin(game.time * 6 + ci * 2) * 1.5;
          c.beginPath(); c.arc(cx, 318 + flicker, 3, 0, Math.PI * 2); c.fill();
          c.fillStyle = "rgba(255,180,60,0.15)";
          c.beginPath(); c.arc(cx, 320, 10 + flicker, 0, Math.PI * 2); c.fill();
        }
      }
      if (d.wallClock) {
        /* V6 — drop shadow */
        c.fillStyle = "rgba(60,40,25,0.22)";
        c.beginPath(); c.arc(552, 183, 24, 0, Math.PI * 2); c.fill();
        c.fillStyle = "#E8D8C0";
        c.beginPath(); c.arc(550, 180, 24, 0, Math.PI * 2); c.fill();
        c.strokeStyle = "#8B7355"; c.lineWidth = 2;
        c.beginPath(); c.arc(550, 180, 24, 0, Math.PI * 2); c.stroke();
        /* hour hand */
        var hr = (game.time * 0.001) % (Math.PI * 2);
        c.strokeStyle = "#5C4434"; c.lineWidth = 2;
        c.beginPath(); c.moveTo(550, 180); c.lineTo(550 + Math.sin(hr) * 12, 180 - Math.cos(hr) * 12); c.stroke();
        /* minute hand */
        var mn = (game.time * 0.01) % (Math.PI * 2);
        c.lineWidth = 1.5;
        c.beginPath(); c.moveTo(550, 180); c.lineTo(550 + Math.sin(mn) * 17, 180 - Math.cos(mn) * 17); c.stroke();
        /* second hand */
        var secAngle = (game.time % 60) / 60 * Math.PI * 2;
        c.strokeStyle = "#C0392B"; c.lineWidth = 0.8;

        c.fillStyle = "#5C4434"; c.beginPath(); c.arc(550, 180, 2, 0, Math.PI * 2); c.fill();
      }

        c.fillStyle = "#E8A84C"; rr(c, 316, 473, 12, 5, 2); c.fill();

      if (d.garland > 0) {

          ["#FFB6C1", "#FFD700", "#87CEEB"],

          ["#B8D8F0", "#E8E8F0", "#D0D8E8"]

        c.beginPath(); c.moveTo(300, 36); c.quadraticCurveTo(400, 50, 500, 36); c.stroke();
        for (var gi = 0; gi < 8; gi++) {

      if (d.musicBox) {

        c.fillStyle = "#FFD700";
        c.beginPath(); c.arc(257, 326, 2, 0, Math.PI * 2); c.fill();
        /* sparkle particles */

      if (d.familyPortrait) {
        /* V6 — drop shadow */

        rr(c, 342, 93, 44, 36, 3); c.fill();
        c.fillStyle = "#C8A872";
        rr(c, 340, 90, 44, 36, 3); c.fill();
        /* V6 — top edge highlight */
        c.fillStyle = "rgba(255,248,240,0.4)";
        c.fillRect(341, 90, 42, 1);
        c.fillStyle = "#FFE8D8";
        rr(c, 344, 94, 36, 28, 2); c.fill();
        /* tiny silhouettes */

        c.fillStyle = "#FAFAFA"; c.beginPath(); c.arc(350, 112, 4, 0, Math.PI * 2); c.fill();
        c.fillStyle = "#9B7D3C"; c.beginPath(); c.arc(366, 112, 3.5, 0, Math.PI * 2); c.fill();
      }

      if (d.couchPillows > 0) {

        c.beginPath(); c.ellipse(352, 310, 14, 10, -0.2, 0, Math.PI * 2); c.fill();
        c.beginPath(); c.ellipse(448, 308, 12, 9, 0.15, 0, Math.PI * 2); c.fill();
      }

      const rugColors = ["rgba(216,194,168,1)", "rgba(168,198,148,1)", "rgba(185,170,210,1)", "rgba(210,175,168,1)"];
      if (d.rugColor > 0) {
        c.save();
        c.globalAlpha = 0.22;
        c.fillStyle = rugColors[d.rugColor];
        c.beginPath(); c.ellipse(400, 470, 220, 55, 0, 0, Math.PI * 2); c.fill();
        /* rug texture highlight */

        c.fillStyle = "#FFFFFF";
        c.beginPath(); c.ellipse(400, 465, 180, 40, 0, 0, Math.PI * 2); c.fill();
        c.restore();
      }

      /* Golden Room collection */
      if (d.goldenCurtains) {
        c.fillStyle = "rgba(218,180,80,0.3)";
        c.fillRect(56, 40, 20, 180); c.fillRect(186, 40, 20, 180);
        c.fillStyle = "#D4B050"; c.fillRect(56, 40, 20, 10); c.fillRect(186, 40, 20, 10);

      if (d.chandelier) {
        c.save(); c.translate(400, 20);
        c.strokeStyle = "rgba(218,180,80,0.5)"; c.lineWidth = 1;
        c.beginPath(); c.moveTo(0, 0); c.lineTo(0, 18); c.stroke();
        for (var chi = 0; chi < 5; chi++) {

          c.strokeStyle = "rgba(218,180,80,0.4)";
          c.beginPath(); c.moveTo(0, 18); c.lineTo(chx, 32); c.stroke();
          c.fillStyle = "rgba(255,240,180," + (0.4 + Math.sin(game.time * 3 + chi) * 0.15) + ")";
          c.beginPath(); c.arc(chx, 34, 3, 0, Math.PI * 2); c.fill();
        }
        c.restore();
      }
      if (d.silkPillows) {
        c.fillStyle = "#C8A8D0"; c.beginPath(); c.ellipse(370, 298, 18, 10, -0.2, 0, Math.PI * 2); c.fill();
        c.fillStyle = "#D0B8D8"; c.beginPath(); c.ellipse(430, 300, 16, 9, 0.15, 0, Math.PI * 2); c.fill();
        c.fillStyle = "rgba(255,255,255,0.2)"; c.beginPath(); c.ellipse(368, 294, 8, 4, -0.2, 0, Math.PI * 2); c.fill();

      if (d.royalThrone) {

        c.fillStyle = "#B08020"; rr(c, -22, -24, 44, 8, 3); c.fill();

        c.fillStyle = "#D8A840"; c.beginPath(); c.ellipse(0, -10, 14, 8, 0, 0, Math.PI * 2); c.fill();
        c.fillStyle = "#FFD700"; c.beginPath(); c.arc(0, -28, 4, 0, Math.PI * 2); c.fill();
        c.restore();

      /* room style preset tint — applied after all room elements */

        c.save(); c.globalCompositeOperation = "multiply";

        c.fillStyle = "rgba(235,210,180,0.14)"; c.fillRect(0, 340, W, H - 340);
        c.restore();

        c.fillStyle = "rgba(190,200,220,0.12)"; c.fillRect(0, 340, W, H - 340);
        c.restore();

      if (mode === "cuddle") {

    // ═══ 11-scene-base.js ═══
    class BaseScene {
      constructor(name) {
        this.name = name;
        this.tooltip = null;
        this.tooltipAlpha = 0;
      }
      enter() {}
      update(dt) {
        this.tooltipAlpha += ((this.tooltip ? 1 : 0) - this.tooltipAlpha) * dt * 10;
      }
      draw(c) {}
      onClick() {}
      onKeyDown() {}
      onMouseMove() {}
      interactiveAt() { return false; }
      hoveredLabel() { return null; }
    }


    // ═══ 12-scene-title.js ═══
    class TitleScene extends BaseScene {
      constructor() {
        super("title");
        this.startButton = { x: W / 2 - 140, y: 500, w: 280, h: 56 };
        this.hoverStart = false;
        /* live character state */
        this.annie = { x: 400, y: 380, state: "idle", timer: rand(3, 6), facing: 1 };
        this.obi   = { x: 240, y: 440, state: "wander", timer: rand(1, 3), vx: 0, facing: 1, targetX: 240 };
        this.luna  = { x: 560, y: 420, state: "sit", timer: rand(2, 5), vx: 0, facing: -1, targetX: 560 };
        this.interaction = null;  /* { type, timer } */
        this.subtitleIndex = Math.floor(Math.random() * TITLE_SUBTITLES.length);
        this.subtitleTimer = 6;
      }
      enter() {
        this.annie.timer = rand(2, 4);
        this.obi.timer = rand(1, 3);
        this.luna.timer = rand(2, 4);
      }
      pickAnnieState() {
        const r = Math.random();
        if (r < 0.25) return { state: "idle", timer: rand(3, 6) };
        if (r < 0.45) return { state: "cheer", timer: rand(1.5, 2.5) };
        if (r < 0.6) return { state: "laugh", timer: rand(2, 3.5) };
        if (r < 0.78) return { state: "kneel", timer: rand(2, 3.5) };
        return { state: "walk", timer: rand(2.5, 4), targetX: 400 + rand(-100, 100) };
      }
      pickObiState() {
        const r = Math.random();
        if (r < 0.25) {
          const tx = rand(100, 700);
          return { state: "wander", timer: rand(2, 4), targetX: tx, facing: tx > this.obi.x ? 1 : -1 };
        }
        if (r < 0.42) return { state: "sit", timer: rand(2, 5) };
        if (r < 0.55) return { state: "sniff", timer: rand(2, 3.5), targetX: this.obi.x + rand(-60, 60), facing: Math.random() < 0.5 ? 1 : -1 };
        if (r < 0.66) return { state: "nap", timer: rand(3, 5) };
        if (r < 0.8) return { state: "sniffLuna", timer: rand(2.5, 4), targetX: this.luna.x - 40, facing: 1 };
        /* run toward Annie */
        return { state: "approach", timer: rand(1.5, 2.5), targetX: this.annie.x - 50, facing: 1 };
      }
      pickLunaState() {
        const r = Math.random();
        if (r < 0.2) return { state: "sit", timer: rand(2, 5) };
        if (r < 0.38) {
          const tx = rand(100, 700);
          return { state: "wander", timer: rand(2, 3.5), targetX: tx, facing: tx > this.luna.x ? 1 : -1 };
        }
        if (r < 0.5) return { state: "groom", timer: rand(2.5, 4) };
        if (r < 0.62) return { state: "nap", timer: rand(3, 5) };
        if (r < 0.74) return { state: "bellyUp", timer: rand(2, 4) };
        if (r < 0.86) return { state: "batObi", timer: rand(2, 3.5), targetX: this.obi.x + 35, facing: -1 };
        /* pounce at something */
        return { state: "pounce", timer: rand(0.6, 1.2), targetX: this.luna.x + (Math.random() < 0.5 ? -80 : 80) };
      }
      update(dt) {
        super.update(dt);
        this.hoverStart = pointInRect(game.mouse.x, game.mouse.y, this.startButton) && spriteArt.ready;
        this.subtitleTimer -= dt;
        if (this.subtitleTimer <= 0) {
          this.subtitleIndex = (this.subtitleIndex + 1) % TITLE_SUBTITLES.length;
          this.subtitleTimer = 6;
        }
        const a = this.annie, o = this.obi, l = this.luna;

        /* Annie */
        a.timer -= dt;
        if (a.state === "walk" && a.targetX !== undefined) {
          const dir = Math.sign(a.targetX - a.x);
          a.x += dir * 50 * dt;
          a.facing = dir || a.facing;
          if (Math.abs(a.x - a.targetX) < 8) { a.x = a.targetX; a.state = "idle"; a.timer = rand(2, 4); }
        }
        a.x = clamp(a.x || 400, 200, 600);
        if (a.timer <= 0) Object.assign(a, this.pickAnnieState());

        /* Obi */
        o.timer -= dt;
        if (o.state === "wander" || o.state === "approach" || o.state === "sniff" || o.state === "sniffLuna") {
          const speed = o.state === "approach" ? 110 : o.state === "sniff" ? 30 : o.state === "sniffLuna" ? 70 : 60;
          if (o.state === "sniffLuna") o.targetX = l.x - 40;
          const dir = Math.sign(o.targetX - o.x);
          o.x += dir * speed * dt;
          o.facing = dir || o.facing;
          if (Math.abs(o.x - o.targetX) < 8) {
            if (o.state === "sniffLuna") { o.x = o.targetX; o.state = "sniffLunaIdle"; o.timer = rand(1.5, 2.5); }
            else { o.x = o.targetX; o.state = "sit"; o.timer = rand(1, 3); }
          }
        }
        if (o.timer <= 0) Object.assign(o, this.pickObiState());
        o.x = clamp(o.x, 80, 720);

        /* Luna */
        l.timer -= dt;
        if (l.state === "wander" || l.state === "batObi") {
          const speed = l.state === "batObi" ? 55 : 45;
          if (l.state === "batObi") l.targetX = o.x + 35;
          const dir = Math.sign(l.targetX - l.x);
          l.x += dir * speed * dt;
          l.facing = dir || l.facing;
          if (Math.abs(l.x - l.targetX) < 8) {
            if (l.state === "batObi") { l.x = l.targetX; l.state = "batObiIdle"; l.timer = rand(1, 2); }
            else { l.x = l.targetX; l.state = "sit"; l.timer = rand(1.5, 3); }
          }
        } else if (l.state === "pounce") {
          const dir = Math.sign(l.targetX - l.x);
          l.x += dir * 200 * dt;
          l.facing = dir || l.facing;
        }
        if (l.timer <= 0) Object.assign(l, this.pickLunaState());
        l.x = clamp(l.x, 80, 720);

        /* interaction sparkles */
        if (o.state === "approach" && Math.abs(o.x - a.x) < 60) {
          if (Math.random() < dt * 3) spawnParticleBurst(o.x, o.y - 30, [COLORS.softPink], 1, ["heart"]);
        }
        if (l.state === "pounce" && l.timer < 0.3) {
          if (Math.random() < dt * 4) spawnParticleBurst(l.x, l.y - 20, [COLORS.gold], 1, ["star"]);
        }
        /* Obi sniffing Luna */
        if (o.state === "sniffLunaIdle" && Math.abs(o.x - l.x) < 60) {
          if (Math.random() < dt * 2.5) spawnParticleBurst((o.x + l.x) / 2, Math.min(o.y, l.y) - 30, [COLORS.softPink, COLORS.gold], 1, ["heart"]);
        }
        /* Luna batting at Obi */
        if (l.state === "batObiIdle" && Math.abs(l.x - o.x) < 60) {
          if (Math.random() < dt * 3) spawnParticleBurst((o.x + l.x) / 2, Math.min(o.y, l.y) - 25, [COLORS.gold, "#FFF4C0"], 2, ["star"]);
        }
      }
      onMouseMove(x, y) {
        this.hoverStart = pointInRect(x, y, this.startButton) && spriteArt.ready;
      }
      interactiveAt(x, y) {
        return spriteArt.ready && pointInRect(x, y, this.startButton);
      }
      onClick(x, y) {
        if (spriteArt.ready && pointInRect(x, y, this.startButton)) {
          audio.menu();
          transitionTo(SceneRegistry.create("hangout"));
        }
      }
      draw(c) {
        drawTitleBg(c);
        drawGlowCircle(c, 400, 340, 220, "rgba(255,255,255,ALPHA)", 0.10);

        const a = this.annie, o = this.obi, l = this.luna;

        /* draw characters sorted by Y for natural overlap */
        const chars = [
          { type: "obi", y: o.y },
          { type: "annie", y: a.y },
          { type: "luna", y: l.y }
        ].sort((a, b) => a.y - b.y);

        for (const ch of chars) {
          if (ch.type === "obi") {
            const isMoving = o.state === "wander" || o.state === "approach" || o.state === "sniffLuna";
            const pose = o.state === "nap" ? "sleeping" : (o.state === "sniff" || o.state === "sniffLuna" || o.state === "sniffLunaIdle") ? "sniff" : isMoving ? "run" : "sit";
            drawObi(c, o.x, o.y, 1.20, {
              pose,
              expression: o.state === "approach" ? "excited" : "happy",
              tail: Math.sin(game.time * (isMoving ? 10 : o.state === "sniffLunaIdle" ? 12 : 6)) * 0.9,
              bounce: isMoving ? 0.08 * Math.sin(game.time * 12) : 0.04 * Math.sin(game.time * 3),
              facing: o.facing
            });
          } else if (ch.type === "annie") {
            let pose = "idle";
            if (a.state === "cheer") pose = "cheer";
            else if (a.state === "laugh") pose = "laugh";
            else if (a.state === "kneel") pose = "kneel";
            else if (a.state === "walk") pose = "walk";
            drawAnnie(c, a.x, a.y, 1.50, {
              pose,
              breath: Math.sin(game.time * 2.1),
              blink: blinkSignal(game.time, 0.6),
              hairSway: Math.sin(game.time * 1.35),
              facing: a.facing || 1
            });
          } else {
            const isPounce = l.state === "pounce";
            const isMoving = l.state === "wander" || l.state === "batObi";
            let lunaPose = "sit";
            if (isPounce) lunaPose = "pounce";
            else if (isMoving) lunaPose = "topdown";
            else if (l.state === "groom") lunaPose = "groom";
            else if (l.state === "nap") lunaPose = "sleeping";
            else if (l.state === "bellyUp") lunaPose = "bellyUp";
            else if (l.state === "batObi" || l.state === "batObiIdle") lunaPose = "pounce";
            drawLuna(c, l.x, l.y, 1.16, {
              pose: lunaPose,
              tail: Math.sin(game.time * (isPounce ? 8 : l.state === "batObiIdle" ? 6 : 1.6)),
              earTwitch: earSignal(game.time),
              blink: blinkSignal(game.time + 1.4, 0.42),
              pounceStretch: isPounce ? 0.9 : (l.state === "batObiIdle" ? 0.4 : 0),
              pawBat: l.state === "batObiIdle" ? (0.5 + Math.sin(game.time * 6) * 0.5) : 0,
              wiggle: isPounce ? game.time * 3 % 1 : 0,
              facing: l.facing
            });
          }
        }

        /* title text with glow and layered shadow */
        c.save();
        c.textAlign = "center";
        /* warm glow behind title */
        drawGlowCircle(c, W / 2, 88, 200, "rgba(255,240,210,ALPHA)", 0.1);
        /* deep shadow */
        c.fillStyle = "rgba(92,58,32,0.2)";
        c.font = '50px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.fillText("Annie's Cozy Day", W / 2 + 3, 96);
        /* light outline */
        c.strokeStyle = "rgba(255,248,240,0.5)";
        c.lineWidth = 6;
        c.font = '50px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.strokeText("Annie's Cozy Day", W / 2, 92);
        /* main title */
        c.fillStyle = "#7A4E36";
        c.fillText("Annie's Cozy Day", W / 2, 92);
        /* subtitle with softer style */
        c.fillStyle = "rgba(122,78,54,0.7)";
        c.font = '23px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.fillText("A Cozy Minigame Collection", W / 2, 128);
        c.restore();

        const pulse = 1 + 0.06 * Math.sin(game.time * 3);
        c.save();
        c.translate(W / 2, 528);
        c.scale(pulse, pulse);
        var startLabel;
        if (spriteArt.ready) { startLabel = isMobile ? "Tap to Start" : "Click to Start"; }
        else { startLabel = "Loading Cozy Art" + ".".repeat(Math.floor(game.time * 2) % 4); }
        drawButton(c, { x: -140, y: -28, w: 280, h: 56 }, startLabel, this.hoverStart, "#B84B3A");
        c.restore();

        c.save();
        const subFade = Math.min(clamp(this.subtitleTimer / 0.8, 0, 1), clamp((6 - this.subtitleTimer) / 0.8, 0, 1));
        c.globalAlpha = subFade * 0.85;
        c.fillStyle = "#7A4E36";
        c.font = '16px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.textAlign = "center";
        c.fillText(TITLE_SUBTITLES[this.subtitleIndex], W / 2, 574);
        c.restore();

        /* F.4 — care-streak surfacing on the title screen. Only renders
           when streak >= 1; warm orange when streak >= 7, gold when >= 30. */
        var _tsStreak = (store.careStreak && store.careStreak.count) || 0;
        if (_tsStreak >= 1) {
          c.save();
          c.textAlign = "center";
          c.font = '13px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          var _tsColor = _tsStreak >= 30 ? "#E8A020" : _tsStreak >= 7 ? "#D17B3A" : "rgba(160,120,90,0.85)";
          c.fillStyle = _tsColor;
          c.fillText("🔥 " + _tsStreak + "-day care streak", W / 2, 480);
          c.restore();
        }
      }
    }

    function getCurrentFavorite(pet) {
      const weekNumber = Math.floor(Date.now() / (7 * 24 * 60 * 60 * 1000));

      updateAmbientEvents(dt) {
        if (this.ambientEvent) {
          this.ambientEvent.timer -= dt;
          if (this.ambientEvent.type === "butterfly") {
            for (const bf of this.ambientEvent.data) {
              bf.x += Math.sin(game.time * 2.5 + bf.phase) * 20 * dt;
              bf.y += Math.cos(game.time * 1.8 + bf.phase) * 12 * dt;
              if (bf.x < 80) bf.x += (80 - bf.x) * 0.1;
              if (bf.x > 170) bf.x -= (bf.x - 170) * 0.1;
              if (bf.y < 62) bf.y += (62 - bf.y) * 0.1;
              if (bf.y > 190) bf.y -= (bf.y - 190) * 0.1;
            }
          }
          if (this.ambientEvent.timer <= 0) {
            this.ambientEvent = null;
            var careLevel = ((this.obi.joy || 50) + (this.luna.joy || 50)) / 200;
            this.ambientEventCooldown = rand(60, 180) * (1.3 - careLevel * 0.6);
          }
          this._persistAmbient();
          return;
        }
        this.ambientEventCooldown -= dt;
        if (this.ambientEventCooldown <= 0) {
          var weather = store.weather.current || "sunny";
          var r = Math.random();
          /* weather-aware spawning + visitors */
          if (r < 0.15) {
            this.spawnVisitorEvent();
          } else if (weather === "rain" && r < 0.6) {
            this.spawnRainEvent();
          } else if (weather === "snow" && r < 0.5) {
            this.spawnSnowEvent();
          } else if ((weather === "sunny" || weather === "golden") && r < 0.55) {
            this.spawnButterflyEvent();
          } else if (r < 0.7) {
            this.spawnBirdEvent();
          } else if (r < 0.85) {
            this.spawnRainEvent();
          } else {
            this.spawnPackageEvent();
          }
        }
        this._persistAmbient();
      }
      _persistAmbient() {
        persistedHangoutAmbient = {
          event: this.ambientEvent,
          cooldown: this.ambientEventCooldown,
          savedAt: Date.now()
        };
      }
      spawnButterflyEvent() {
        const count = Math.floor(rand(1, 4));
        const data = [];

          if (visitor.joyEffect.luna) this.luna.joy = clamp(this.luna.joy + visitor.joyEffect.luna, 0, 100);

            c.fillStyle = "#7CB342"; c.beginPath(); c.arc(v.drawX - 2, v.drawY - 12, 1.5, 0, Math.PI * 2); c.fill();
            c.beginPath(); c.arc(v.drawX + 4, v.drawY - 12, 1.5, 0, Math.PI * 2); c.fill();

      drawThoughtBubble(c, x, y, bubble) {
