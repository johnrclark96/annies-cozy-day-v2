          const pulse = 0.7 + 0.3 * Math.sin(game.time * 4);
          const intensity = clamp((Math.abs(this.balance) - 30) / 70, 0, 1);
          const r = Math.floor(200 + 55 * intensity);
          const g2 = Math.floor(120 - 80 * intensity);
          const b = Math.floor(40 - 20 * intensity);
          c.save();
          c.globalAlpha = arrowAlpha * pulse;
          c.fillStyle = `rgb(${r},${g2},${b})`;
          if (this.balance < -30) {
            /* hint right */
            drawGlowCircle(c, 740, 300, 40, `rgba(${r},${g2},${b},ALPHA)`, 0.15);
            c.beginPath(); c.moveTo(720, 280); c.lineTo(760, 300); c.lineTo(720, 320); c.closePath(); c.fill();
            if (isMobile) {
              c.font = '16px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
              c.textAlign = "center";
              c.fillText("\u25BA", 740, 260);
            }
          } else {
            /* hint left */
            drawGlowCircle(c, 60, 300, 40, `rgba(${r},${g2},${b},ALPHA)`, 0.15);
            c.beginPath(); c.moveTo(80, 280); c.lineTo(40, 300); c.lineTo(80, 320); c.closePath(); c.fill();
            if (isMobile) {
              c.font = '16px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
              c.textAlign = "center";
              c.fillText("\u25C4", 60, 260);
            }
          }
          c.restore();
        }
      }
      drawEndingOverlay(c) {
        if (this.winState) {
          /* Phase E.5 — soft fade-in for the hero shot text, hold, then a
             short fade-out so the transition to results crossfades softly.
             phaseTime runs 0 → 2.3 (results trigger). */
          var _pt = this.phaseTime || 0;
          var _fadeIn = clamp(_pt / 0.6, 0, 1);
          var _fadeOut = 1 - clamp((_pt - 2.0) / 0.3, 0, 1);
          var _heroAlpha = _fadeIn * _fadeOut;
          c.save();
          c.globalAlpha = _heroAlpha;
          c.fillStyle = "rgba(255,248,240,0.32)";
          c.fillRect(0, 0, W, H);
          c.fillStyle = "#B84B3A";
          c.textAlign = "center";
          c.font = '42px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.fillText("Maximum Cozy!", W / 2, 120);
          c.font = '18px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.fillStyle = "#7A4E36";
          c.fillText("Everyone drifts into the happiest little cuddle nap.", W / 2, 154);
          c.restore();
        }
      }
      drawResultCharacter(c) {
        drawAnnie(c, 400, 416, 1.3, {
          pose: "sit",
          breath: Math.sin(game.time * 2),
          blink: blinkSignal(game.time, 0.6),
          hairSway: Math.sin(game.time * 1.1)
        });
        drawObi(c, 308, 426, 0.9, { pose: "sit", expression: "happy", tail: Math.sin(game.time * 8) });
        drawLuna(c, 500, 418, 0.88, { pose: "sit", tail: Math.sin(game.time * 2), earTwitch: earSignal(game.time) });
      }
    }

    SceneRegistry.register("cuddle", () => new CuddlePileScene());


    // ═══ 18-scene-obi-walk.js ═══
    /* ═══════════════════════════════════════════════════════
       Obi's Walk — side-scrolling walk through the neighborhood
       ═══════════════════════════════════════════════════════ */
    class ObiWalkScene extends BaseMinigameScene {
      constructor() {
        super("walk", "Obi's Walk", "Stop Obi from chasing squirrels into the road.", [200, 450, 800], 45);
        this.scrollX = 0;
        this.obiY = 440;
        this.obiPose = "run";
        this.obiSniffTimer = 0;
        this.items = [];
        this.squirrels = [];
        this.collected = [];
        this.nextItemX = 500;
        this.missFlash = 0;
      }
      enter() {
        super.enter();
        this.scrollX = 0;
        this.obiPose = "run";
        this.obiSniffTimer = 0;
        this.items = [];
        this.squirrels = [];
        this.collected = [];
        this.nextItemX = 500;
        this.missFlash = 0;
        this.fillItems();
      }
      fillItems() {
        while (this.items.length < 4) {
          const types = ["hydrant", "bush", "mailbox", "flower", "bone"];
          const type = types[Math.floor(Math.random() * types.length)];
          const points = type === "bone" ? 30 : type === "flower" ? 20 : 15;
          this.items.push({ type, x: this.nextItemX, points, found: false, fade: 0 });
          this.nextItemX += rand(180, 280);
        }
        /* occasional squirrel */
        if (this.squirrels.length < 1 && Math.random() < 0.3) {
          this.squirrels.push({ x: this.nextItemX + rand(60, 140), y: rand(360, 420), caught: false, missed: false, timer: 2.5, fade: 1 });
        }
      }
      extraInteractiveAt() { return true; }
      onGameClick(x, y) {
        /* check squirrels first - generous hitbox */
        for (const sq of this.squirrels) {
          if (!sq.caught && !sq.missed && Math.abs(x - (sq.x - this.scrollX)) < 52 && Math.abs(y - sq.y) < 52) {
            sq.caught = true;
            this.addScore(25 * this.combo);
            this.combo++;
            audio.targetHit();
            spawnParticleBurst(x, y - 10, [COLORS.gold, "#FFF4C0"], 8, ["star"]);
            return;
          }
        }
        /* check items - generous hitbox for mobile */
        for (const it of this.items) {
          const ix = it.x - this.scrollX;
          if (!it.found && Math.abs(x - ix) < 56 && y > 340 && y < 490) {
            it.found = true;
            this.obiSniffTimer = 0.7;
            this.obiPose = "sniff";
            this.addScore(it.points * this.combo);
            this.combo++;
            audio.catch();
            this.collected.push({ x: ix, y: this.obiY - 40, text: "+" + (it.points * (this.combo - 1)), life: 1.2 });
            spawnParticleBurst(ix, this.obiY - 30, [COLORS.softPink, COLORS.gold], 6, ["heart", "star"]);
            return;
          }
        }
      }
      updatePlay(dt) {
        /* slow scroll while sniffing for better feel */
        const baseSpeed = (120 + (this.duration - this.timeLeft) * 1.5) * (this.challengeMode ? 1.4 : 1.0);
        const speed = this.obiSniffTimer > 0 ? baseSpeed * 0.25 : baseSpeed;
        this.scrollX += speed * dt;
        this.missFlash = Math.max(0, this.missFlash - dt * 3);

        /* obi sniff timer */
        if (this.obiSniffTimer > 0) {
          this.obiSniffTimer -= dt;
          if (this.obiSniffTimer <= 0) this.obiPose = "run";
        }

        /* remove off-screen items */
        this.items = this.items.filter(it => it.x - this.scrollX > -100);
        this.fillItems();

        /* update squirrels */
        for (let i = this.squirrels.length - 1; i >= 0; i--) {
          const sq = this.squirrels[i];
          if (sq.caught) {
            sq.fade -= dt * 3;
            if (sq.fade <= 0) this.squirrels.splice(i, 1);
          } else if (sq.missed) {
            /* squirrel runs away */
            sq.x -= 200 * dt;
            sq.y -= 80 * dt;
            sq.fade -= dt * 1.5;
            if (sq.fade <= 0) this.squirrels.splice(i, 1);
          } else if (sq.x - this.scrollX < -60) {
            this.squirrels.splice(i, 1);
          } else if (!sq.missed && sq.x - this.scrollX < 200) {
            sq.timer -= dt;
            if (sq.timer <= 0) {
              sq.missed = true;
              this.combo = 1;
              this.missFlash = 1;
              audio.miss();
            }
          }
        }

        /* floating score text */
        for (let i = this.collected.length - 1; i >= 0; i--) {
          this.collected[i].life -= dt;
          this.collected[i].y -= 30 * dt;
          if (this.collected[i].life <= 0) this.collected.splice(i, 1);
        }

        if (this.score >= 300) this.queueAchievement("goodWalker");
      }
      drawInstructionIcon(c, x, y) {
        drawBone(c, x, y, 26, 12, "#7A4E36");
      }
      drawScene(c) {
        /* sky */
        const skyG = c.createLinearGradient(0, 0, 0, 280);
        skyG.addColorStop(0, "#87CEEB");
        skyG.addColorStop(1, "#C8E8F8");
        c.fillStyle = skyG;
        c.fillRect(0, 0, W, 280);

        /* sun */
        c.fillStyle = "rgba(255,245,200,0.5)";
        c.beginPath(); c.arc(680, 60, 40, 0, Math.PI * 2); c.fill();

        /* clouds */
        c.fillStyle = "rgba(255,255,255,0.7)";
        for (let i = 0; i < 4; i++) {
          const cx = ((i * 260 + 100 - this.scrollX * 0.15) % (W + 200)) - 100;
          c.beginPath();
          c.ellipse(cx, 70 + i * 30, 50 + i * 10, 20, 0, 0, Math.PI * 2);
          c.ellipse(cx + 30, 65 + i * 30, 35, 16, 0, 0, Math.PI * 2);
          c.fill();
        }

        /* distant houses */
        const houseColors = ["#E8D4BC", "#D4BC9C", "#F0DCC8", "#DCCAB4", "#E0C8B0"];
        const roofColors = ["#C0392B", "#8E44AD", "#2980B9", "#27AE60", "#D35400"];
        for (let i = 0; i < 8; i++) {
          const hx = ((i * 140 + 40 - this.scrollX * 0.35) % (W + 300)) - 150;
          const hw = 80 + (i % 3) * 20;
          const hh = 70 + (i % 4) * 15;
          c.fillStyle = houseColors[i % houseColors.length];
          c.fillRect(hx, 260 - hh, hw, hh);
          c.fillStyle = roofColors[i % roofColors.length];
          c.beginPath();
          c.moveTo(hx - 8, 260 - hh);
          c.lineTo(hx + hw / 2, 260 - hh - 30);
          c.lineTo(hx + hw + 8, 260 - hh);
          c.closePath();
          c.fill();
          /* windows */
          c.fillStyle = "rgba(180,220,255,0.6)";
          c.fillRect(hx + 12, 260 - hh + 18, 14, 14);
          c.fillRect(hx + hw - 26, 260 - hh + 18, 14, 14);
          /* door */
          c.fillStyle = "#8B6B4A";
          rr(c, hx + hw / 2 - 8, 260 - 36, 16, 36, 3);
          c.fill();
        }

        /* trees */
        for (let i = 0; i < 6; i++) {
          const tx = ((i * 190 + 80 - this.scrollX * 0.45) % (W + 300)) - 100;
          c.fillStyle = "#8B6B4A";
          c.fillRect(tx + 10, 240, 10, 40);
          c.fillStyle = "#5B8C3E";
          c.beginPath(); c.arc(tx + 15, 230, 28 + (i % 3) * 6, 0, Math.PI * 2); c.fill();
          c.fillStyle = "#6EA84A";
          c.beginPath(); c.arc(tx + 10, 222, 20 + (i % 2) * 5, 0, Math.PI * 2); c.fill();
        }

        /* ground */
        c.fillStyle = "#78B84A";
        c.fillRect(0, 260, W, 40);
        /* sidewalk */
        c.fillStyle = "#D8D0C4";
        c.fillRect(0, 300, W, 160);
        /* sidewalk lines */
        c.strokeStyle = "rgba(180,170,155,0.3)";
        c.lineWidth = 2;
        for (let i = 0; i < 14; i++) {
          const lx = ((i * 70 - this.scrollX * 0.98) % (W + 70));
          c.beginPath(); c.moveTo(lx, 300); c.lineTo(lx, 460); c.stroke();
        }
        /* curb */
        c.fillStyle = "#C0B8A8";
        c.fillRect(0, 296, W, 6);

        /* draw items on sidewalk */
        for (const it of this.items) {
          const ix = it.x - this.scrollX;
          if (ix < -60 || ix > W + 60) continue;
          c.save();
          c.translate(ix, 420);
          if (it.found) {
            c.globalAlpha = 0.3;
            /* sparkle marker where item was */
            drawStar(c, 0, -10, 8, COLORS.gold);
          } else {
            /* draw item based on type */
            if (it.type === "hydrant") {
              c.fillStyle = "#D44040";
              rr(c, -10, -40, 20, 40, 4); c.fill();
              c.fillStyle = "#B83030";
              c.fillRect(-14, -32, 28, 6);
              c.fillRect(-6, -44, 12, 8);
            } else if (it.type === "bush") {
              c.fillStyle = "#4A8C30";
              c.beginPath(); c.ellipse(0, -18, 28, 22, 0, 0, Math.PI * 2); c.fill();
              c.fillStyle = "#5AA040";
              c.beginPath(); c.ellipse(-8, -24, 18, 16, 0, 0, Math.PI * 2); c.fill();
            } else if (it.type === "mailbox") {
              c.fillStyle = "#4A78B8";
              c.fillRect(-4, -40, 8, 40);
              rr(c, -16, -56, 32, 22, 6); c.fill();
              c.fillStyle = "#3A68A0";
              c.fillRect(-12, -42, 24, 4);
            } else if (it.type === "flower") {
              c.fillStyle = "#5A8A38";
              c.fillRect(-2, -24, 4, 24);
              c.fillStyle = "#FF8FAA";
              for (let p = 0; p < 5; p++) {
                const a = p * Math.PI * 2 / 5;
                c.beginPath(); c.arc(Math.cos(a) * 8, -30 + Math.sin(a) * 8, 5, 0, Math.PI * 2); c.fill();
              }
              c.fillStyle = "#FFD700";
              c.beginPath(); c.arc(0, -30, 4, 0, Math.PI * 2); c.fill();
            } else if (it.type === "bone") {
              drawGlowCircle(c, 0, -16, 20, "rgba(255,215,0,ALPHA)", 0.2);
              drawBone(c, 0, -16, 22, 10, "#FFD700");
            }
            /* sniff indicator - pulsing ? */
            if (ix > 60 && ix < 340) {
              const pulse = 0.7 + Math.sin(game.time * 5) * 0.3;
              c.globalAlpha = pulse;
              c.fillStyle = "#FFF8F0";
              c.strokeStyle = "#8A6045";
              c.lineWidth = 2;
              c.font = '20px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
              c.textAlign = "center";
              c.strokeText("?", 0, -56);
              c.fillText("?", 0, -56);
            }
          }
          c.restore();
        }

        /* draw squirrels */
        for (const sq of this.squirrels) {
          const sx = sq.x - this.scrollX;
          if (sx < -60 || sx > W + 60) continue;
          c.save();
          c.globalAlpha = sq.fade;
          c.translate(sx, sq.y);
          if (sq.caught) {
            c.globalAlpha = sq.fade * 0.5;
            drawStar(c, 0, -10, 10, COLORS.gold);
          } else {
            /* draw squirrel */
            c.fillStyle = "#A0704C";
            c.beginPath(); c.ellipse(0, -8, 14, 10, 0, 0, Math.PI * 2); c.fill(); /* body */
            c.fillStyle = "#8C604A";
            c.beginPath(); c.arc(-12, -14, 7, 0, Math.PI * 2); c.fill(); /* head */
            c.fillStyle = "#000";
            c.beginPath(); c.arc(-14, -16, 2, 0, Math.PI * 2); c.fill(); /* eye */
            /* bushy tail */
            c.fillStyle = "#B08060";
            c.beginPath();
            c.moveTo(10, -12);
            c.quadraticCurveTo(22, -32, 12, -36);
            c.quadraticCurveTo(4, -28, 8, -10);
            c.fill();
            /* warning indicator */
            if (!sq.caught && !sq.missed && sq.timer < 1.5) {
              const urgency = 1 - sq.timer / 1.5;
              c.fillStyle = `rgba(220,60,40,${0.5 + urgency * 0.5})`;
              c.font = '18px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
              c.textAlign = "center";
              c.fillText("!", 0, -36);
            }
          }
          c.restore();
        }

        /* warm glow behind Annie and Obi */
        drawGlowCircle(c, 210, 400, 140, "rgba(255,240,200,ALPHA)", 0.08);

        /* Annie upper body holding leash */
        drawAnnie(c, 160, 340, 0.9, {
          pose: "upper",
          breath: Math.sin(game.time * 2.5),
          blink: blinkSignal(game.time, 0.5),
          hairSway: Math.sin(game.time * 1.8),
          armRaise: 0.3
        });

        /* leash line */
        c.strokeStyle = "#8B6B4A";
        c.lineWidth = 2;
        c.beginPath();
        c.moveTo(190, 320);
        c.quadraticCurveTo(220, 380 + Math.sin(game.time * 3) * 4, 248, this.obiY - 30);
        c.stroke();

        /* Obi */
        drawObi(c, 260, this.obiY, 1.0, {
          pose: this.obiPose,
          expression: this.obiSniffTimer > 0 ? "excited" : "happy",
          tail: Math.sin(game.time * (this.obiPose === "run" ? 12 : 4)) * 0.9,
          bounce: this.obiPose === "run" ? 0.06 * Math.sin(game.time * 14) : 0,
          facing: 1
        });

        /* floating score text */
        for (const ft of this.collected) {
          c.save();
          c.globalAlpha = clamp(ft.life, 0, 1);
          c.fillStyle = COLORS.gold;
          c.strokeStyle = "#5C3D2E";
          c.lineWidth = 3;
          c.font = '20px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.textAlign = "center";
          c.strokeText(ft.text, ft.x, ft.y);
          c.fillText(ft.text, ft.x, ft.y);
          c.restore();
        }

        /* miss flash */
        if (this.missFlash > 0) {
          c.fillStyle = `rgba(200,40,20,${this.missFlash * 0.12})`;
          c.fillRect(0, 0, W, H);
        }
      }
      drawResultCharacter(c) {
        drawAnnie(c, 340, 410, 1.1, { pose: "cheer", breath: Math.sin(game.time * 2), blink: blinkSignal(game.time, 0.5), hairSway: Math.sin(game.time * 1.2) });
        drawObi(c, 460, 420, 1.2, { pose: "sit", expression: "excited", tail: Math.sin(game.time * 10), bounce: 0.06 * Math.sin(game.time * 8) });
      }
    }

    SceneRegistry.register("walk", () => new ObiWalkScene());


    // ═══ 19-scene-luna-nap.js ═══
    /* ═══════════════════════════════════════════════════════
       Luna's Nap Spot — place cushions in drifting sunbeams
       ═══════════════════════════════════════════════════════ */
    class LunaNapScene extends BaseMinigameScene {
      constructor() {
        super("nap", "Luna's Nap Spot", "Place cushions in the sun. Move them to follow the light.", [250, 550, 1000], 60);
        this.beams = [];
        this.cushions = [];
        this.luna = { x: 400, y: 350, targetX: 400, targetY: 350, napping: false, napTimer: 0, facing: 1 };
        this.scoreRate = 0;
        this.napParticleTimer = 0;
        this.maxCushions = 3;
      }
      enter() {
        super.enter();
        this.beams = [];
        this.cushions = [];
        this.luna = { x: 400, y: 350, targetX: 400, targetY: 350, napping: false, napTimer: 0, facing: 1 };
        this.scoreRate = 0;
        this.napParticleTimer = 0;
        this.spawnBeams();
      }
      spawnBeams() {
        this.beams = [];
        const count = 2 + Math.floor((this.duration - this.timeLeft) / 20);
        for (let i = 0; i < Math.min(count, 4); i++) {
          this.beams.push({
            x: rand(120, W - 120),
            y: rand(200, 450),
            w: rand(90, 140),
            h: rand(100, 160),
            vx: rand(-15, 15),
            vy: rand(-5, 5),
            phase: rand(0, Math.PI * 2),
            life: rand(8, 14)
          });
        }
      }
      extraInteractiveAt() { return true; }
      onGameClick(x, y) {
        if (y < 100) return;
        /* place or remove cushion */
        /* check if clicking an existing cushion to pick it up */
        for (let i = this.cushions.length - 1; i >= 0; i--) {
          if (dist(x, y, this.cushions[i].x, this.cushions[i].y) < 30) {
            this.cushions.splice(i, 1);
            audio.menu();
            return;
          }
        }
        if (this.cushions.length >= this.maxCushions) {
          /* remove oldest with visual feedback */
          const old = this.cushions.shift();
          spawnParticleBurst(old.x, old.y - 6, ["rgba(200,170,210,0.6)"], 3, ["star"]);
        }
        this.cushions.push({ x, y, warmth: 0 });
        audio.tinyChime();
        spawnParticleBurst(x, y - 10, ["#FFF4C0"], 4, ["star"]);
      }
      updatePlay(dt) {
        if (this.playHintTimer <= 0 && !this.playHint && this.cushions.length === 0) {
          this.playHint = { text: isMobile ? "Tap the golden sunbeams on the floor to place cushions for Luna!" : "Click the golden sunbeams on the floor to place cushions for Luna!", life: 8 };
          this.playHintTimer = -1;
        }
        /* update sunbeams */
        for (let i = this.beams.length - 1; i >= 0; i--) {
          const b = this.beams[i];
          var beamSpeedMult = this.challengeMode ? 2.0 : 1.0;
          b.x += (b.vx * dt + Math.sin(game.time * 0.5 + b.phase) * 8 * dt) * beamSpeedMult;
          b.y += (b.vy * dt + Math.cos(game.time * 0.3 + b.phase) * 4 * dt) * beamSpeedMult;
          b.x = clamp(b.x, 60, W - 60);
          b.y = clamp(b.y, 150, 480);
          b.life -= dt;
          if (b.life <= 0) {
            this.beams.splice(i, 1);
          }
        }
        /* respawn beams */
        const targetCount = 2 + Math.floor((this.duration - this.timeLeft) / 18);
        while (this.beams.length < Math.min(targetCount, 4)) {
          this.beams.push({
            x: rand(120, W - 120),
            y: rand(200, 450),
            w: rand(90, 140),
            h: rand(100, 160),
            vx: rand(-15, 15),
            vy: rand(-5, 5),
            phase: rand(0, Math.PI * 2),
            life: rand(8, 14)
          });
        }

        /* calculate cushion warmth */
        for (const cu of this.cushions) {
          cu.warmth = 0;
          for (const b of this.beams) {
            const dx = Math.abs(cu.x - b.x) / (b.w * 0.5);
            const dy = Math.abs(cu.y - b.y) / (b.h * 0.5);
            if (dx < 1 && dy < 1) {
              cu.warmth += (1 - dx) * (1 - dy);
            }
          }
        }

        /* find best cushion */
        let bestCushion = null;
        let bestWarmth = 0.2;
        for (const cu of this.cushions) {
          if (cu.warmth > bestWarmth) { bestWarmth = cu.warmth; bestCushion = cu; }
        }

        /* Luna behavior */
        if (bestCushion) {
          this.luna.targetX = bestCushion.x;
          this.luna.targetY = bestCushion.y;
          const d = dist(this.luna.x, this.luna.y, bestCushion.x, bestCushion.y);
          if (d < 20 && bestCushion.warmth > 0.3) {
            if (!this.luna.napping) {
              this.luna.napping = true;
              this.luna.napTimer = 0;
            }
            this.luna.napTimer += dt;
            this.scoreRate = bestCushion.warmth * 3;
            this.addScore(this.scoreRate * dt * 10);
            this.napParticleTimer -= dt;
            if (this.napParticleTimer <= 0) {
              this.napParticleTimer = 0.8;
              spawnParticleBurst(this.luna.x, this.luna.y - 30, [COLORS.softPink, "#FFF4C0"], 2, ["heart"]);
            }
          } else {
            this.luna.napping = false;
            this.luna.napTimer = 0;
            this.scoreRate = 0;
          }
        } else {
          this.luna.targetX = 400 + Math.sin(game.time * 0.8) * 100;
          this.luna.targetY = 350;
          this.luna.napping = false;
          this.luna.napTimer = 0;
          this.scoreRate = 0;
        }

        /* move Luna */
        if (!this.luna.napping) {
          const dx = this.luna.targetX - this.luna.x;
          const dy = this.luna.targetY - this.luna.y;
          const d = Math.hypot(dx, dy);
          if (d > 3) {
            const speed = 90;
            this.luna.x += dx / d * speed * dt;
            this.luna.y += dy / d * speed * dt;
            this.luna.facing = dx >= 0 ? 1 : -1;
          }
        }
        this.luna.x = clamp(this.luna.x, 60, W - 60);
        this.luna.y = clamp(this.luna.y, 160, 500);

        if (this.score >= 400) this.queueAchievement("napMaster");
      }
      drawInstructionIcon(c, x, y) {
        drawHeart(c, x, y, 1.2, COLORS.softPink);
      }
      drawScene(c) {
        drawLivingRoom(c);
        c.fillStyle = "rgba(255,250,240,0.04)";
        c.fillRect(0, 0, W, H);

        /* sunbeams with dust motes */
        for (const b of this.beams) {
          const fadeEdge = clamp(b.life / 2, 0, 1);
          c.save();
          /* warm glow area */
          c.globalAlpha = 0.65 * fadeEdge;
          const g = c.createRadialGradient(b.x, b.y - b.h * 0.3, 10, b.x, b.y, Math.max(b.w, b.h) * 0.7);
          g.addColorStop(0, "rgba(255,235,150,1)");
          g.addColorStop(0.4, "rgba(255,225,120,0.6)");
          g.addColorStop(1, "rgba(255,210,80,0)");
          c.fillStyle = g;
          c.fillRect(b.x - b.w, b.y - b.h, b.w * 2, b.h * 2);

          /* beam shaft from top — visible light column */
          c.globalAlpha = 0.30 * fadeEdge;
          c.fillStyle = "rgba(255,235,140,1)";
          c.beginPath();
          c.moveTo(b.x - b.w * 0.25, 0);
          c.lineTo(b.x + b.w * 0.25, 0);
          c.lineTo(b.x + b.w * 0.55, b.y + b.h * 0.4);
          c.lineTo(b.x - b.w * 0.55, b.y + b.h * 0.4);
          c.closePath();
          c.fill();

          /* bright center spot on floor */
          c.globalAlpha = 0.45 * fadeEdge;
          c.fillStyle = "rgba(255,240,160,0.8)";
          c.beginPath();
          c.ellipse(b.x, b.y, b.w * 0.45, b.h * 0.25, 0, 0, Math.PI * 2);
          c.fill();

          /* floating dust motes in beam */
          c.globalAlpha = 0.75 * fadeEdge;
          c.fillStyle = "rgba(255,245,200,0.95)";
          for (let m = 0; m < 7; m++) {
            const mx = b.x + Math.sin(game.time * 0.7 + m * 2.3 + b.phase) * b.w * 0.4;
            const my = b.y + Math.cos(game.time * 0.5 + m * 1.7 + b.phase) * b.h * 0.35 - b.h * 0.15;
            const mr = 2.0 + Math.sin(game.time * 1.5 + m) * 1.0;
            c.beginPath(); c.arc(mx, my, mr, 0, Math.PI * 2); c.fill();
          }
          c.restore();
        }

        /* pulsing "place here" hint on brightest beam when no cushions */
        if (this.cushions.length === 0 && this.beams.length > 0) {
          var brightest = this.beams[0];
          for (var bi = 1; bi < this.beams.length; bi++) { if (this.beams[bi].life > brightest.life) brightest = this.beams[bi]; }
          c.save();
          c.globalAlpha = 0.5 + Math.sin(game.time * 4) * 0.3;
          c.fillStyle = "#FFF8F0";
          c.font = '14px "Fredoka One", sans-serif';
          c.textAlign = "center";
          c.fillText(isMobile ? "\u25BC Tap here!" : "\u25BC Click here!", brightest.x, brightest.y - 20);
          c.restore();
        }

        /* cushions with warmth indicators */
        for (const cu of this.cushions) {
          c.save();
          c.translate(cu.x, cu.y);
          const warm = clamp(cu.warmth, 0, 1);
          /* cushion shadow */
          c.fillStyle = "rgba(0,0,0,0.08)";
          c.beginPath(); c.ellipse(2, 6, 28, 10, 0, 0, Math.PI * 2); c.fill();
          /* cushion body - shifts from cool purple to warm golden */
          if (warm > 0.3) {
            const r = Math.round(200 + warm * 55);
            const g = Math.round(180 + warm * 60);
            const b = Math.round(160 + warm * 40);
            c.fillStyle = `rgb(${r},${g},${b})`;
          } else {
            c.fillStyle = "#C8ACD8";
          }
          c.beginPath(); c.ellipse(0, 0, 26, 14, 0, 0, Math.PI * 2); c.fill();
          /* cushion highlight */
          c.fillStyle = "rgba(255,255,255,0.3)";
          c.beginPath(); c.ellipse(-4, -4, 14, 7, -0.3, 0, Math.PI * 2); c.fill();
          /* warmth glow */
          if (warm > 0.2) {
            c.globalAlpha = warm * 0.35;
            drawGlowCircle(c, 0, 0, 34, "rgba(255,230,150,ALPHA)", 0.3);
          } else {
            /* cool indicator - subtle pulse to hint "move me" */
            c.globalAlpha = 0.15 + Math.sin(game.time * 3) * 0.08;
            c.strokeStyle = "#9880B0";
            c.lineWidth = 1.5;
            c.setLineDash([4, 4]);
            c.beginPath(); c.ellipse(0, 0, 30, 18, 0, 0, Math.PI * 2); c.stroke();
            c.setLineDash([]);
          }
          c.restore();
        }

        /* Luna */
        drawLuna(c, this.luna.x, this.luna.y, 1.05, {
          pose: this.luna.napping ? "sleeping" : (dist(this.luna.x, this.luna.y, this.luna.targetX, this.luna.targetY) > 10 ? "topdown" : "sit"),
          tail: Math.sin(game.time * (this.luna.napping ? 0.8 : 2.2)),
          earTwitch: earSignal(game.time),
          blink: this.luna.napping ? true : blinkSignal(game.time + 1.2, 0.45),
          facing: this.luna.facing
        });

        /* cozy meter display */
        if (this.scoreRate > 0 && this.luna.napping) {
          c.save();
          c.globalAlpha = 0.8;
          c.fillStyle = "#FFF8F0";
          c.strokeStyle = "#8A6045";
          c.lineWidth = 2;
          c.font = '14px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.textAlign = "center";
          const cozyLabel = this.scoreRate > 2 ? "Maximum Cozy!" : this.scoreRate > 1 ? "Very Cozy!" : "Cozy!";
          c.strokeText(cozyLabel, this.luna.x, this.luna.y - 60);
          c.fillText(cozyLabel, this.luna.x, this.luna.y - 60);
          c.restore();
        }

        /* active score rate display */
        if (this.phase === "play") {
          c.save();
          c.fillStyle = "rgba(255,248,240,0.85)";
          rr(c, W/2 - 80, 70, 160, 28, 10);
          c.fill();
          c.fillStyle = this.scoreRate > 2 ? "#E8A020" : this.scoreRate > 0.5 ? "#7DB36C" : "#A09080";
          c.font = '14px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.textAlign = "center";
          if (this.luna.napping) {
            c.fillText("+" + (this.scoreRate * 10).toFixed(0) + " pts/sec", W/2, 89);
          } else if (this.cushions.length > 0) {
            c.fillText("Luna is looking...", W/2, 89);
          } else {
            c.fillText("Place a cushion!", W/2, 89);
          }
          c.restore();
        }

        /* HUD hint */
        c.fillStyle = "rgba(92,68,52,0.5)";
        c.font = '13px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
        c.textAlign = "center";
        c.fillText("Cushions: " + this.cushions.length + " / " + this.maxCushions + "  •  " + (isMobile ? "Tap" : "Click") + " to place or pick up", W / 2, 580);
      }
      drawResultCharacter(c) {
        drawLuna(c, 400, 410, 1.4, { pose: "sleeping", tail: Math.sin(game.time * 0.8), earTwitch: 0, blink: true });
      }
    }

    // ═══ Luna's Wild Wand — Flappy-Bird-inspired wand toy minigame ═══
    class WildWandScene extends BaseMinigameScene {
      constructor() {
        super("wildwand", "Luna's Wild Wand", "Tap to wiggle the wand. Lead Luna through the gaps.", [100, 250, 500], 90);
        this.scrollSpeed = 120;
        this.obstacles = [];

        this.scrollX = 0;
        this.scorePopups = [];
        this.lure.fuzz = [];

      }
      extraInteractiveAt() { return true; }
      drawTopHud(c) {
        c.save();
        var timePill = placePill("tl", 0, 130);
        var scorePill = placePill("tr", 0, 132, 72);
        c.fillStyle = "rgba(255,248,240,0.88)";
        rr(c, timePill.x, timePill.y, timePill.w, timePill.h, 12); c.fill();
        rr(c, scorePill.x, scorePill.y, scorePill.w, scorePill.h, 12); c.fill();
        /* pause button */
        var pb = this.pauseButtonRect();
        var pbH = pointInRect(game.mouse.x, game.mouse.y, pb);
        c.fillStyle = pbH ? "rgba(92,68,52,0.92)" : "rgba(92,68,52,0.68)";
        rr(c, pb.x, pb.y, pb.w, pb.h, 12); c.fill();
        c.fillStyle = COLORS.cream;
        c.fillRect(pb.x + 13, pb.y + 10, 4, 16);
        c.fillRect(pb.x + 21, pb.y + 10, 4, 16);
        /* elapsed time instead of countdown */

        drawHudTime(c, timePill.x + 12, timePill.y + 12, elapsed);
        /* score */
        c.save();
        var ss = 1 + this.scorePop * 0.2;
        c.translate(scorePill.x + scorePill.w - 12, scorePill.y + 12);
        c.scale(ss, ss);
        drawHudScore(c, 0, 0, Math.round(this.score));
        c.restore();
        /* combo */
        if (this.phase === "play" && this.combo > 1) {
          c.fillStyle = "#A05A3C";
          c.textAlign = "center";
          c.font = '13px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.fillText("Combo x" + this.combo, scorePill.x + scorePill.w / 2, scorePill.y + 64);
        }
        c.restore();
      }
      onGameClick() {}
      onMouseMove(x, y) {
        super.onMouseMove(x, y);
        if (this.phase === "play" && !this.paused && !this.gameOver) {
          this.anchor.x = clamp(x, 80, 280);
          this.anchor.y = clamp(y, 60, H - 60);
        }
      }
      updatePlay(dt) {
        if (this.gameOver) {
          this.gameOverTimer += dt;
          if (this.gameOverTimer > 1.5) this.finishGame();
          return;
        }
        var elapsed = this.duration - this.timeLeft;
        /* difficulty ramp */
        this.scrollSpeed = 100 + elapsed * 0.8;
        var gapSize = Math.max(110, 180 - elapsed * 0.6);
        if (this.challengeMode) gapSize = Math.max(85, gapSize * 0.75);
        /* scroll world */
        this.scrollX += this.scrollSpeed * dt;
        /* spawn obstacles */
        this.obstacleTimer -= dt;
        if (this.obstacleTimer <= 0) {
          var gapY = rand(100 + gapSize / 2, H - 60 - gapSize / 2);
          var obstType = ["shelf", "cushions", "scratcher", "blanketfort"][Math.floor(rand(0, 4))];
          this.obstacles.push({
            x: W + 40,
            gapY: gapY,
            baseGapY: gapY,
            gapSize: gapSize,
            baseGapSize: gapSize,
            passed: false,
            type: obstType,
            w: 50,
            bobbing: Math.random() < 0.15,
            bobPhase: rand(0, Math.PI * 2),
            narrowing: elapsed > 60 && Math.random() < 0.15
          });
          var spawnInterval = Math.max(1.6, 3.0 - elapsed * 0.02);
          this.obstacleTimer = spawnInterval;
        }
        /* move obstacles */
        for (var i = this.obstacles.length - 1; i >= 0; i--) {
          var ob = this.obstacles[i];
          ob.x -= this.scrollSpeed * dt;
          /* bobbing gaps */
          if (ob.bobbing) ob.gapY = ob.baseGapY + Math.sin(game.time * 2 + ob.bobPhase) * 18;
          /* narrowing gaps */
          if (ob.narrowing) {
            var progress = 1 - (ob.x / W);
            ob.gapSize = Math.max(70, ob.baseGapSize - progress * 25);
          }
          /* check if Luna passed this obstacle */
          if (!ob.passed && ob.x + ob.w / 2 < this.luna.x) {
            ob.passed = true;
            this.passed++;
            var pts = 10 * this.combo;
            this.addScore(pts);
            this.combo++;
            if (this.combo > 1 && this.combo % 5 === 0) { audio.combo(); this.scorePopups.push({ x: this.luna.x, y: this.luna.y - 55, text: "x" + this.combo + " Combo!", life: 1.2 }); }
            if (this.score >= 500) this.queueAchievement("wandMaster");
            /* milestone celebrations */
            if (this.passed === 10) { this.scorePopups.push({ x: W/2, y: H/2, text: "Nice!", life: 1.5 }); spawnParticleBurst(W/2, H/2, [COLORS.gold, "#FFF4C0"], 15, ["star"]); }
            else if (this.passed === 25) { this.scorePopups.push({ x: W/2, y: H/2, text: "Amazing!", life: 1.5 }); spawnParticleBurst(W/2, H/2, [COLORS.gold, COLORS.softPink, "#87CEEB"], 25, ["star", "heart"]); }
            else if (this.passed === 50) { this.scorePopups.push({ x: W/2, y: H/2, text: "LEGENDARY!", life: 2.0 }); spawnParticleBurst(W/2, H/2, [COLORS.gold, COLORS.softPink, "#87CEEB", "#A8D870"], 40, ["star", "heart"]); audio.combo(); }
            audio.tinyChime();
            spawnParticleBurst(ob.x + ob.w, ob.gapY, [COLORS.gold, "#FFF4C0"], 6, ["star"]);
            this.scorePopups.push({ x: ob.x + ob.w, y: ob.gapY, text: "+" + pts, life: 1.0 });
            /* near miss bonus */
            var lunaDistFromEdge = Math.min(Math.abs(this.luna.y - (ob.gapY - gapSize / 2)), Math.abs(this.luna.y - (ob.gapY + gapSize / 2)));
            if (lunaDistFromEdge < 20) {
              this.addScore(5 * this.combo);
              this.nearMissTimer = 0.6;
              spawnParticleBurst(this.luna.x, this.luna.y, ["#FF69B4"], 4, ["heart"]);
              this.scorePopups.push({ x: this.luna.x + 20, y: this.luna.y - 20, text: "Close! +" + (5 * this.combo), life: 0.8 });
              audio.pounce();
              screenShake(3, 0.15);
            }
          }
          /* remove off-screen */
          if (ob.x < -60) this.obstacles.splice(i, 1);
        }
        /* update anchor from mouse */
        this.anchor.x = clamp(game.mouse.x, 80, 280);
        this.anchor.y = clamp(game.mouse.y, 60, H - 60);
        /* lure physics — pendulum/spring from anchor */
        var stringLen = 70;
        var springK = 6.0;
        var damping = 1.8;
        var gravity = 400;
        var dx = this.anchor.x - this.lure.x;
        var dy = (this.anchor.y + stringLen) - this.lure.y;
        var d = Math.hypot(dx, dy);
        /* spring force toward rest position below anchor */
        this.lure.vx += dx * springK * dt;
        this.lure.vy += dy * springK * dt;
        /* gravity */
        this.lure.vy += gravity * dt;
        /* damping */
        this.lure.vx *= Math.max(0, 1 - damping * dt);
        this.lure.vy *= Math.max(0, 1 - damping * dt);
        /* constrain max distance from anchor */
        this.lure.x += this.lure.vx * dt;
        this.lure.y += this.lure.vy * dt;
        var ldx = this.lure.x - this.anchor.x;
        var ldy = this.lure.y - this.anchor.y;
        var ld = Math.hypot(ldx, ldy);
        var maxLen = 85;
        if (ld > maxLen) {
          this.lure.x = this.anchor.x + ldx / ld * maxLen;
          this.lure.y = this.anchor.y + ldy / ld * maxLen;
          /* dampen velocity when string taut */
          this.lure.vx *= 0.7;
          this.lure.vy *= 0.7;
        }
        this.lure.x = clamp(this.lure.x, 40, W - 40);
        this.lure.y = clamp(this.lure.y, 40, H - 40);
        /* Luna chases the lure */
        var chaseX = this.lure.x;
        var chaseY = this.lure.y;
        var cdx = chaseX - this.luna.x;
        var cdy = chaseY - this.luna.y;
        var cd = Math.hypot(cdx, cdy);
        var chaseSpeed = 420;
        var chaseDamping = 2.2;
        if (cd > 5) {
          this.luna.vx += (cdx / cd) * chaseSpeed * dt;
          this.luna.vy += (cdy / cd) * chaseSpeed * dt;
        }
        /* strong gravity on Luna — she falls when lure is above */
        this.luna.vy += 120 * dt;
        /* cat wobble — occasional twitch, not constant vibration */
        if (Math.random() < dt * 8) {
          this.luna.vx += rand(-15, 15);
          this.luna.vy += rand(-10, 10);
        }
        /* pounce burst — when close to lure, sudden speed spike */
        if (cd < 30 && cd > 5 && Math.random() < dt * 2) {
          this.luna.vx += (cdx / cd) * 80;
          this.luna.vy += (cdy / cd) * 80;
        }
        /* damping */
        this.luna.vx *= Math.max(0, 1 - chaseDamping * dt);
        this.luna.vy *= Math.max(0, 1 - chaseDamping * dt);
        this.luna.x += this.luna.vx * dt;
        this.luna.y += this.luna.vy * dt;
        /* keep Luna in bounds */
        if (this.luna.y < 50) { this.luna.y = 50; this.luna.vy = Math.max(0, this.luna.vy); }
        if (this.luna.y > H - 30) { this.luna.y = H - 30; this.luna.vy = Math.min(0, this.luna.vy); }
        this.luna.x = clamp(this.luna.x, 80, 320);
        this.luna.facing = this.luna.vx >= 0 ? 1 : -1;
        this.luna.excitement = clamp(cd / 80, 0, 1);
        this.nearMissTimer = Math.max(0, this.nearMissTimer - dt);
        /* update score popups */
        for (var spi = this.scorePopups.length - 1; spi >= 0; spi--) {
          this.scorePopups[spi].life -= dt;
          this.scorePopups[spi].y -= 35 * dt;
          if (this.scorePopups[spi].life <= 0) this.scorePopups.splice(spi, 1);
        }
        /* collision detection — Luna vs obstacles */
        for (var oi = 0; oi < this.obstacles.length; oi++) {
          var ob = this.obstacles[oi];
          var inXRange = this.luna.x > ob.x - 10 && this.luna.x < ob.x + ob.w + 10;
          if (inXRange) {
            var inGap = this.luna.y > ob.gapY - ob.gapSize / 2 + 8 && this.luna.y < ob.gapY + ob.gapSize / 2 - 8;
            if (!inGap) {
              /* COLLISION */
              this.gameOver = true;
              this.gameOverTimer = 0;
              audio.miss();
              screenShake(6, 0.3);
              spawnParticleBurst(this.luna.x, this.luna.y, ["#FF6B6B", "#FFB3B3"], 12, ["star"]);
              this.luna.vx = 0;
              this.luna.vy = 0;
              return;
            }
          }
        }
      }
      drawScene(c) {
        /* cozy room background — scrolling wallpaper */
        var bgColors = ["#F5E6D3", "#EDE0D0", "#F0E2CE"];
        c.fillStyle = bgColors[0];
        c.fillRect(0, 0, W, H);
        /* scrolling floor pattern */
        c.fillStyle = "#E8D5BD";
        c.fillRect(0, H - 40, W, 40);
        c.strokeStyle = "rgba(180,160,130,0.3)";
        c.lineWidth = 1;
        for (var fi = 0; fi < 20; fi++) {
          var fx = ((fi * 50 - this.scrollX * 0.3) % (W + 100)) - 50;
          c.beginPath(); c.moveTo(fx, H - 40); c.lineTo(fx, H); c.stroke();
        }
        /* scrolling window in background */
        var winX = ((500 - this.scrollX * 0.15) % (W + 200)) - 100;
        c.fillStyle = "#B8E0F0";
        rr(c, winX, 30, 100, 80, 6);
        c.fill();
        c.strokeStyle = "#C8A882";
        c.lineWidth = 4;
        rr(c, winX, 30, 100, 80, 6);
        c.stroke();
        c.strokeStyle = "#C8A882";
        c.lineWidth = 2;
        c.beginPath(); c.moveTo(winX + 50, 30); c.lineTo(winX + 50, 110); c.stroke();
        c.beginPath(); c.moveTo(winX, 70); c.lineTo(winX + 100, 70); c.stroke();
        /* scrolling shelf in background */
        var shelfX = ((250 - this.scrollX * 0.1) % (W + 300)) - 150;
        c.fillStyle = "rgba(180,160,130,0.2)";
        rr(c, shelfX, 60, 120, 10, 3);
        c.fill();
        /* ceiling line */
        c.strokeStyle = "rgba(180,160,130,0.15)";
        c.lineWidth = 2;
        c.beginPath(); c.moveTo(0, 30); c.lineTo(W, 30); c.stroke();
        /* speed lines when going fast */
        if (this.scrollSpeed > 180) {
          c.save();
          c.globalAlpha = Math.min(0.15, (this.scrollSpeed - 180) * 0.001);
          c.strokeStyle = "rgba(200,180,160,1)";
          c.lineWidth = 1;
          for (var sli = 0; sli < 6; sli++) {
            var sly = 80 + sli * 90 + Math.sin(game.time * 3 + sli) * 20;
            c.beginPath(); c.moveTo(0, sly); c.lineTo(W, sly); c.stroke();
          }
          c.restore();
        }
        /* ── draw obstacles ── */
        /* obstacle preview — faint silhouettes at right edge */
        for (var pi = 0; pi < this.obstacles.length; pi++) {
          var pob = this.obstacles[pi];
          if (pob.x > W - 60 && pob.x < W + 40) {
            c.save();
            c.globalAlpha = 0.15;
            c.fillStyle = "#8A7060";
            c.fillRect(W - 8, 0, 8, pob.gapY - pob.gapSize / 2);
            c.fillRect(W - 8, pob.gapY + pob.gapSize / 2, 8, H - (pob.gapY + pob.gapSize / 2));
            c.restore();
          }
        }
        for (var oi = 0; oi < this.obstacles.length; oi++) {
          var ob = this.obstacles[oi];
          var topH = ob.gapY - ob.gapSize / 2;
          var botY = ob.gapY + ob.gapSize / 2;
          var botH = H - botY;
          /* top obstacle */
          if (ob.type === "shelf") {
            c.fillStyle = "#B08860";
            rr(c, ob.x, 0, ob.w, topH, 4);
            c.fill();
            c.fillStyle = "#C8A070";
            c.fillRect(ob.x - 4, topH - 6, ob.w + 8, 6);
            /* books on shelf */
            var bookColors = ["#D04040", "#4080D0", "#40A040", "#E8A020"];
            for (var bi = 0; bi < 3; bi++) {
              c.fillStyle = bookColors[bi];
              rr(c, ob.x + 8 + bi * 14, topH - 30, 10, 24, 2);
              c.fill();
            }
          } else if (ob.type === "cushions") {
            c.fillStyle = "#C8A0B0";
            rr(c, ob.x, 0, ob.w, topH, 6);
            c.fill();
            c.fillStyle = "#D8B0C0";
            c.beginPath(); c.ellipse(ob.x + ob.w / 2, topH - 4, ob.w / 2 + 4, 10, 0, 0, Math.PI * 2); c.fill();
          } else if (ob.type === "scratcher") {
            c.fillStyle = "#B89868";
            c.fillRect(ob.x + 10, 0, ob.w - 20, topH);
            /* rope wrap texture */
            c.strokeStyle = "rgba(160,130,80,0.5)";
            c.lineWidth = 2;
            for (var ri = 0; ri < Math.floor(topH / 12); ri++) {
              c.beginPath(); c.moveTo(ob.x + 10, ri * 12); c.lineTo(ob.x + ob.w - 10, ri * 12 + 6); c.stroke();
            }
            c.fillStyle = "#D2B48C";
            c.beginPath(); c.ellipse(ob.x + ob.w / 2, topH, ob.w / 2 + 6, 8, 0, 0, Math.PI * 2); c.fill();
          } else {
            /* blanket fort */
            c.fillStyle = "#A0C0D8";
            c.beginPath(); c.moveTo(ob.x, 0); c.lineTo(ob.x + ob.w, 0); c.lineTo(ob.x + ob.w / 2, topH); c.closePath(); c.fill();
            c.fillStyle = "rgba(255,255,255,0.15)";
            for (var si = 0; si < 3; si++) {
              c.beginPath(); c.moveTo(ob.x + si * ob.w / 3, 0); c.lineTo(ob.x + ob.w / 2, topH); c.stroke();
            }
          }
          /* bottom obstacle */
          if (ob.type === "shelf") {
            c.fillStyle = "#B08860";
            rr(c, ob.x, botY, ob.w, botH, 4);
            c.fill();
            c.fillStyle = "#C8A070";
            c.fillRect(ob.x - 4, botY, ob.w + 8, 6);
          } else if (ob.type === "cushions") {
            c.fillStyle = "#C8A0B0";
            rr(c, ob.x, botY, ob.w, botH, 6);
            c.fill();
            c.fillStyle = "#D8B0C0";
            c.beginPath(); c.ellipse(ob.x + ob.w / 2, botY + 4, ob.w / 2 + 4, 10, 0, 0, Math.PI * 2); c.fill();
          } else if (ob.type === "scratcher") {
            c.fillStyle = "#B89868";
            c.fillRect(ob.x + 10, botY, ob.w - 20, botH);
            c.strokeStyle = "rgba(160,130,80,0.5)";
            c.lineWidth = 2;
            for (var ri = 0; ri < Math.floor(botH / 12); ri++) {
              c.beginPath(); c.moveTo(ob.x + 10, botY + ri * 12); c.lineTo(ob.x + ob.w - 10, botY + ri * 12 + 6); c.stroke();
            }
            c.fillStyle = "#D2B48C";
            c.beginPath(); c.ellipse(ob.x + ob.w / 2, botY, ob.w / 2 + 6, 8, 0, 0, Math.PI * 2); c.fill();
          } else {
            c.fillStyle = "#A0C0D8";
            c.beginPath(); c.moveTo(ob.x, H); c.lineTo(ob.x + ob.w, H); c.lineTo(ob.x + ob.w / 2, botY); c.closePath(); c.fill();
          }
          /* gap highlight — safe zone glow */
          c.save();
          c.globalAlpha = 0.08;
          c.fillStyle = "#FFD700";
          c.fillRect(ob.x - 2, ob.gapY - ob.gapSize / 2, ob.w + 4, ob.gapSize);
          c.restore();
        }
        /* ── draw string from anchor to lure ── */
        c.save();
        c.strokeStyle = "rgba(140,100,60,0.6)";
        c.lineWidth = 2;
        c.beginPath();
        c.moveTo(this.anchor.x, this.anchor.y);
        /* catenary curve approximation */
        var mx = (this.anchor.x + this.lure.x) / 2;
        var my = (this.anchor.y + this.lure.y) / 2 + 20;
        c.quadraticCurveTo(mx, my, this.lure.x, this.lure.y);
        c.stroke();
        c.restore();
        /* ── draw wand handle at anchor ── */
        c.save();
        c.translate(this.anchor.x, this.anchor.y);
        var wandAngle = Math.atan2(this.lure.y - this.anchor.y, this.lure.x - this.anchor.x) * 0.3;
        c.rotate(wandAngle);
        c.fillStyle = "#8B6914";
        c.fillRect(-3, -40, 6, 42);
        c.fillStyle = "#A08030";
        c.beginPath(); c.arc(0, -40, 4, 0, Math.PI * 2); c.fill();
        c.restore();
        /* ── draw lure (fuzzy mouse toy) ── */
        c.save();
        c.translate(this.lure.x, this.lure.y);
        var swing = Math.sin(game.time * 6) * 0.15;
        c.rotate(swing);
        /* body */
        c.fillStyle = "#E8A0B0";
        c.beginPath(); c.ellipse(0, 0, 14, 10, 0, 0, Math.PI * 2); c.fill();
        /* fuzzy texture */
        c.fillStyle = "rgba(255,255,255,0.3)";
        if (this.lure.fuzz) {
          for (var fi = 0; fi < this.lure.fuzz.length; fi++) {
            var fz = this.lure.fuzz[fi];
            c.beginPath(); c.arc(fz.x + Math.sin(game.time * 2 + fi) * 0.5, fz.y + Math.cos(game.time * 1.5 + fi) * 0.3, fz.r, 0, Math.PI * 2); c.fill();
          }
        }
        /* ears */
        c.fillStyle = "#D08090";
        c.beginPath(); c.arc(-7, -8, 4, 0, Math.PI * 2); c.fill();
        c.beginPath(); c.arc(7, -8, 4, 0, Math.PI * 2); c.fill();
        /* eyes */
        c.fillStyle = "#333";
        c.beginPath(); c.arc(-4, -1, 2, 0, Math.PI * 2); c.fill();
        c.beginPath(); c.arc(4, -1, 2, 0, Math.PI * 2); c.fill();
        /* tail string */
        c.strokeStyle = "#D08090";
        c.lineWidth = 2;
        c.beginPath(); c.moveTo(0, 10); c.quadraticCurveTo(10, 20 + Math.sin(game.time * 8) * 4, 5, 26); c.stroke();
        c.restore();
        /* ── draw Luna ── */
        var lunaScale = 0.85 + this.luna.excitement * 0.15;
        var lunaPose = this.gameOver ? "sit" : (Math.abs(this.luna.vy) > 100 ? "stalk" : "topdown");
        drawLuna(c, this.luna.x, this.luna.y, lunaScale, {
          pose: lunaPose,
          tail: Math.sin(game.time * 3),
          earTwitch: this.luna.excitement > 0.5 ? 1 : earSignal(game.time),
          wiggle: this.luna.excitement * 0.08,
          blink: this.gameOver ? true : blinkSignal(game.time + 0.5, 0.6),
          facing: this.luna.facing
        });
        /* near-miss sparkle */
        if (this.nearMissTimer > 0) {
          c.save();
          c.globalAlpha = this.nearMissTimer;
          c.fillStyle = "#FF69B4";
          c.font = '14px "Fredoka One", sans-serif';
          c.textAlign = "center";
          c.fillText("Close!", this.luna.x, this.luna.y - 40);
          c.restore();
        }
        /* score popups */
        for (var spi = 0; spi < this.scorePopups.length; spi++) {
          var sp = this.scorePopups[spi];
          c.save();
          c.globalAlpha = clamp(sp.life / 0.3, 0, 1);
          c.font = '16px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.textAlign = "center";
          c.strokeStyle = "rgba(60,40,20,0.6)";
          c.lineWidth = 3;
          c.strokeText(sp.text, sp.x, sp.y);
          c.fillStyle = sp.text.includes("Close") ? "#FF69B4" : COLORS.gold;
          c.fillText(sp.text, sp.x, sp.y);
          c.restore();
        }
        /* game over overlay */
        if (this.gameOver) {
          c.save();
          c.globalAlpha = clamp(this.gameOverTimer / 0.5, 0, 0.6);
          c.fillStyle = "rgba(60,40,30,1)";
          c.fillRect(0, 0, W, H);
          c.globalAlpha = clamp(this.gameOverTimer / 0.8, 0, 1);
          c.fillStyle = "#FFF8F0";
          c.font = '28px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.textAlign = "center";
          c.fillText("Bonk!", W / 2, H / 2 - 20);
          c.font = '16px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.fillText("Obstacles cleared: " + this.passed, W / 2, H / 2 + 20);
          c.restore();
        }
        /* HUD: obstacles passed counter */
        if (!this.gameOver) {
          c.fillStyle = "rgba(255,248,240,0.7)";
          rr(c, W / 2 - 60, H - SAFE - 26, 120, 26, 10);
          c.fill();
          c.fillStyle = "#7A4E36";
          c.font = '13px "Fredoka One", "Comic Sans MS", cursive, sans-serif';
          c.textAlign = "center";
          c.fillText("Cleared: " + this.passed, W / 2, H - SAFE - 8);
        }
      }
      drawInstructionIcon(c, x, y) {
        c.save(); c.translate(x, y);
        /* wand stick */
        c.fillStyle = "#8B6914";
        c.fillRect(-2, -20, 4, 22);
        /* string */
        c.strokeStyle = "rgba(140,100,60,0.6)";
        c.lineWidth = 1.5;
        c.beginPath(); c.moveTo(0, 2); c.quadraticCurveTo(10, 14, 6, 22); c.stroke();
        /* fuzzy mouse */
        c.fillStyle = "#E8A0B0";
        c.beginPath(); c.ellipse(6, 24, 6, 4, 0, 0, Math.PI * 2); c.fill();
        c.restore();
      }
      drawResultCharacter(c) {
        drawLuna(c, 400, 410, 1.5, {
          pose: "sit",
          tail: Math.sin(game.time * 2),
          earTwitch: earSignal(game.time),
          blink: blinkSignal(game.time + 1, 0.4),
          facing: 1
        });
      }
    }
    SceneRegistry.register("wildwand", () => new WildWandScene());


    // ═══ 20-navigation.js ═══
    function blinkSignal(t, offset = 0.6) {
      const mod = (t + offset) % 4.2;
      return mod < 0.20 || (mod > 2.4 && mod < 2.62);
    }
    function earSignal(t) {
      const mod = t % 3.8;
      if (mod < 0.18) return Math.sin(mod / 0.18 * Math.PI);
      return 0;
    }

    function spawnTrail(x, y, color) {
      if (game.particles.length > 280) return;
      if (Math.random() < 0.55) {
        game.particles.push({
          x: x + rand(-4, 4),
          y: y + rand(-4, 4),
          vx: rand(-8, 8),
          vy: rand(-15, -5),
          life: 0.35,
          maxLife: 0.35,
          size: rand(3, 5),
          rot: rand(0, Math.PI * 2),
          vr: rand(-2, 2),
          shape: "star",
          color
        });
      }
    }

    function transitionTo(nextScene) {
      nextScene.enter();
      game.transition = {
        from: game.scene,
        to: nextScene,
        t: 0,
        duration: 0.6
      };
    }



    // ═══ 21-loop.js ═══
    function drawMuteIcon(c) {
      const rect = { x: W - SAFE - 28, y: SAFE, w: 28, h: 28 };
      const hovered = pointInRect(game.mouse.x, game.mouse.y, rect);
      drawSpeakerIcon(c, rect.x, rect.y, store.muted, hovered);
    }

    function handleMuteClick(x, y) {
      const rect = { x: W - SAFE - 28, y: SAFE, w: 28, h: 28 };
      if (pointInRect(x, y, rect)) {
        audio.ensure();
        store.muted = !store.muted;
        saveBool("muted", store.muted);
        if (!store.muted) { audio.menu(); if (game.scene && (game.scene.name === "hangout" || game.scene.name === "backyard")) audio.startAmbient(); }
        else { audio.stopAmbient(); }
        return true;
      }
      return false;
    }

    function loop(ts) {
      if (!game.last) game.last = ts;
      let dt = (ts - game.last) / 1000;
      game.last = ts;
      dt = clamp(dt, 0, 0.033);
      game.time += dt;

      updateSharedParticles(dt);

      if (game.transition) {
        game.transition.t += dt;
        if (game.transition.from) game.transition.from.update(dt);
        if (game.transition.t >= game.transition.duration) {
          game.scene = game.transition.to;
          game.transition = null;
        }
      } else if (game.scene) {
        game.scene.update(dt);
      }

      /* screen shake */
      if (game.shake > 0) {
        game.shake -= dt;
        const intensity = game.shakeIntensity * clamp(game.shake / 0.1, 0, 1);
        game.shakeX = (Math.random() - 0.5) * intensity * 2;
        game.shakeY = (Math.random() - 0.5) * intensity * 2;
      } else {
        game.shakeX = 0;
        game.shakeY = 0;
      }

      ctx.clearRect(0, 0, W, H);
      ctx.save();
      ctx.translate(game.shakeX, game.shakeY);
      if (game.transition) {
        const p = clamp(game.transition.t / game.transition.duration, 0, 1);
        if (game.transition.from) {
          ctx.save();
          ctx.globalAlpha = 1 - p;
          ctx.translate(W/2, H/2); ctx.scale(1 - p*0.03, 1 - p*0.03); ctx.translate(-W/2, -H/2);
          game.transition.from.draw(ctx);
          drawMuteIcon(ctx);
          ctx.restore();
        }
        ctx.save();
        ctx.globalAlpha = p;
        ctx.translate(W/2, H/2); ctx.scale(0.97 + p*0.03, 0.97 + p*0.03); ctx.translate(-W/2, -H/2);
        game.transition.to.draw(ctx);
        drawMuteIcon(ctx);
        ctx.restore();
      } else if (game.scene) {
        game.scene.draw(ctx);
        drawMuteIcon(ctx);
      }
      drawSharedParticles(ctx);

      /* warm vignette */
      ctx.save();
      const vg = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)*0.35, W/2, H/2, Math.max(W,H)*0.72);
      vg.addColorStop(0, "rgba(0,0,0,0)");
      vg.addColorStop(1, "rgba(40,25,15,0.18)");
      ctx.fillStyle = vg;
      ctx.fillRect(0, 0, W, H);
      ctx.restore();

      ctx.restore(); /* end screen shake transform */

      if (game.scene || game.transition) {
        const activeScene = game.transition ? game.transition.from : game.scene;
        const overMute = pointInRect(game.mouse.x, game.mouse.y, { x: W - 54, y: 12, w: 40, h: 40 });
        canvas.style.cursor = (overMute || (activeScene && activeScene.interactiveAt(game.mouse.x, game.mouse.y))) ? "pointer" : "default";
      }

  
    // TEST HOOK: expose current scene name globally
    window.__getScene = () => {
      if (game.transition) return 'transition:' + (game.transition.to && game.transition.to.name ? game.transition.to.name : 'unknown');
      if (game.scene) return game.scene.name || 'unknown';
      return 'none';
    };
    window.__getSceneDetails = () => {
      const s = game.scene;
      if (!s) return { name: 'none' };
      const result = { name: s.name || 'unknown' };
      if (s.menuOpen !== undefined) result.menuOpen = s.menuOpen;
      if (s.decorOpen !== undefined) result.decorOpen = s.decorOpen;
      if (s.wardrobeOpen !== undefined) result.wardrobeOpen = s.wardrobeOpen;
      if (s.scrapbookOpen !== undefined) result.scrapbookOpen = s.scrapbookOpen;
      if (s.dedication !== undefined) result.dedication = !!s.dedication;
      if (s.dailyGift !== undefined) result.dailyGift = !!s.dailyGift;
      if (s.phase !== undefined) result.phase = s.phase;
      if (s.paused !== undefined) result.paused = s.paused;
      if (s.timer !== undefined) result.timer = s.timer;
      if (s.foodBowl) result.foodBowl = {x: s.foodBowl.x, y: s.foodBowl.y, fill: s.foodBowl.fill};
      if (s.waterBowl) result.waterBowl = {x: s.waterBowl.x, y: s.waterBowl.y, fill: s.waterBowl.fill};
      if (s.obi) result.obi = {x: s.obi.x, y: s.obi.y, joy: s.obi.joy};
      if (s.luna) result.luna = {x: s.luna.x, y: s.luna.y, joy: s.luna.joy, perch: s.luna.perch};
      if (s.annie) result.annie = {x: s.annie.x, y: s.annie.y, pose: s.annie.pose};
      if (s.tree) result.tree = {x: s.tree.x, y: s.tree.y};
      if (s.pool) result.pool = {x: s.pool.x, y: s.pool.y};
      if (s.feeder) result.feeder = {x: s.feeder.x, y: s.feeder.y};
      if (s.garden) result.garden = {x: s.garden.x, y: s.garden.y};
      if (s.byDecorButton) result.byDecorButton = s.byDecorButton;
      return result;
    };
    /* Direct scene modification hook for testing */
    window.__modifyScene = (fn) => {
      const s = game.scene;
      if (!s) return false;
      try { fn(s); return true; } catch(e) { return e.message; }
    };
    /* Direct scene transition hook for testing */
    window.__goToScene = (key) => {
      try { transitionTo(SceneRegistry.create(key)); return true; } catch(e) { return e.message; }
    };
    /* Phase A.4 synthetic test hook for drawPanelTabs / panelTabHit geometry */
    window.__panelTabsTest = () => {
      var panel = { x: 100, y: 70, w: 600, h: 480 };
      var tabs = [{ key: "a" }, { key: "b" }, { key: "c" }, { key: "d" }];
      return {
        hitTabA: panelTabHit(panel, tabs, 200, 140),
        hitTabC: panelTabHit(panel, tabs, 410, 140),
        hitMissY: panelTabHit(panel, tabs, 200, 200),
        hitMissX: panelTabHit(panel, tabs, 90, 140)
      };
    };

    requestAnimationFrame(loop);
    }


    // ═══ 22-input.js ═══
    canvas.addEventListener("mousemove", (e) => {
      const r = canvas.getBoundingClientRect();
      game.mouse.x = (e.clientX - r.left) * (canvas.width / r.width);
      game.mouse.y = (e.clientY - r.top) * (canvas.height / r.height);
      const activeScene = game.transition ? game.transition.from : game.scene;
      if (activeScene && activeScene.onMouseMove) activeScene.onMouseMove(game.mouse.x, game.mouse.y);
    });
    canvas.addEventListener("mousedown", () => { game.mouse.down = true; });
    window.addEventListener("mouseup", () => { game.mouse.down = false; });
    canvas.addEventListener("mouseleave", () => { game.mouse.down = false; });

    var lastTouchTime = 0;
    canvas.addEventListener("click", (e) => {
      /* skip click if it was triggered by a recent touch (prevents double-fire on mobile) */
      if (Date.now() - lastTouchTime < 500) return;
      const r = canvas.getBoundingClientRect();
      const x = (e.clientX - r.left) * (canvas.width / r.width);
      const y = (e.clientY - r.top) * (canvas.height / r.height);
      game.mouse.x = x;
      game.mouse.y = y;
      audio.ensure();
      if (game.transition) return;
      if (handleMuteClick(x, y)) return;
      const activeScene = game.scene;
      if (activeScene && activeScene.onClick) activeScene.onClick(x, y);
    });

    /* ── Touch support ── */
    function touchCoords(e) {
      const t = e.changedTouches[0];
      const r = canvas.getBoundingClientRect();
      return {
        x: (t.clientX - r.left) * (canvas.width / r.width),
        y: (t.clientY - r.top) * (canvas.height / r.height)
      };
    }
    canvas.addEventListener("touchstart", (e) => {
      e.preventDefault();
      lastTouchTime = Date.now();
      const { x, y } = touchCoords(e);
      game.mouse.x = x;
      game.mouse.y = y;
      game.mouse.down = true;
      audio.ensure();
      if (game.transition) return;
      const activeScene = game.scene;
      if (activeScene && activeScene.onMouseMove) activeScene.onMouseMove(x, y);
      if (handleMuteClick(x, y)) return;
      if (activeScene && activeScene.onClick) activeScene.onClick(x, y);
    }, { passive: false });
    canvas.addEventListener("touchmove", (e) => {
      e.preventDefault();
      const { x, y } = touchCoords(e);
      game.mouse.x = x;
      game.mouse.y = y;
      const activeScene = game.transition ? game.transition.from : game.scene;
      if (activeScene && activeScene.onMouseMove) activeScene.onMouseMove(x, y);
    }, { passive: false });
    canvas.addEventListener("touchend", (e) => {
      e.preventDefault();
      game.mouse.down = false;
    }, { passive: false });
    canvas.addEventListener("touchcancel", (e) => {
      e.preventDefault();
      game.mouse.down = false;
    }, { passive: false });

    window.addEventListener("keydown", (e) => {
      game.keys[e.key] = true;
      const activeScene = game.transition ? game.transition.from : game.scene;
      if (activeScene && activeScene.onKeyDown) activeScene.onKeyDown(e.key);
      if ([" ", "ArrowLeft", "ArrowRight", "Escape"].includes(e.key)) e.preventDefault();
    });
    window.addEventListener("keyup", (e) => { game.keys[e.key] = false; });

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        const activeScene = game.transition ? game.transition.from : game.scene;
        if (activeScene instanceof BaseMinigameScene && activeScene.phase === "play") activeScene.paused = true;
        if (activeScene && activeScene.saveSessionMemory) activeScene.saveSessionMemory();
      }
    });


    // ═══ 23-main.js ═══
    buildStaticCaches();
    loadCozyArt();
    game.scene = SceneRegistry.create("title");
    game.scene.enter();
    requestAnimationFrame(loop);


})();
  </script>
</body>
